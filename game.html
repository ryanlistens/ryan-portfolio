        ctx.beginPath();
        ctx.moveTo(elvX + 12, elvY + elvH * 0.6);
        ctx.lineTo(elvX + elvW - 12, elvY + elvH * 0.6);
        ctx.stroke();
    } else {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(elvX, elvY, elvW, elvH);
    }
    // Door panels (slide open/closed)
    if (halfW > 1) {
        const doorGrad = ctx.createLinearGradient(elvX, elvY, elvX + halfW, elvY);
        doorGrad.addColorStop(0, '#c8c8c8');
        doorGrad.addColorStop(0.5, '#e0e0e0');
        doorGrad.addColorStop(1, '#a0a0a0');
        ctx.fillStyle = doorGrad;
        ctx.fillRect(elvX, elvY, halfW, elvH);
        const doorGrad2 = ctx.createLinearGradient(elvX + elvW - halfW, elvY, elvX + elvW, elvY);
        doorGrad2.addColorStop(0, '#a0a0a0');
        doorGrad2.addColorStop(0.5, '#e0e0e0');
        doorGrad2.addColorStop(1, '#c8c8c8');
        ctx.fillStyle = doorGrad2;
        ctx.fillRect(elvX + elvW - halfW, elvY, halfW, elvH);
        // Center seam line
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(elvX + halfW, elvY + 4);
        ctx.lineTo(elvX + halfW, elvY + elvH - 4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(elvX + elvW - halfW, elvY + 4);
        ctx.lineTo(elvX + elvW - halfW, elvY + elvH - 4);
        ctx.stroke();
    }
    // Engraved letters on doors: "PI" | "PE"
    if (halfW > 18) {
        ctx.fillStyle = '#d4af37';
        ctx.font = 'bold 22px serif';
        ctx.textAlign = 'center';
        ctx.fillText('PI', elvX + halfW / 2, elvY + elvH / 2 + 8);
        ctx.fillText('PE', elvX + elvW - halfW / 2, elvY + elvH / 2 + 8);
    }
    // Frame outline
    ctx.strokeStyle = '#8a7a2a';
    ctx.lineWidth = 3;
    ctx.strokeRect(elvX - 2, elvY - 2, elvW + 4, elvH + 4);
    // LED floor indicator above door (wider)
    ctx.fillStyle = '#111';
    ctx.fillRect(elvX + elvW / 2 - 22, elvY - 20, 44, 16);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(elvX + elvW / 2 - 22, elvY - 20, 44, 16);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('B1', elvX + elvW / 2, elvY - 8);
    // Call button panel (right of door)
    ctx.fillStyle = '#555';
    ctx.fillRect(elvX + elvW + 8, elvY + elvH / 2 - 16, 18, 32);
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 1;
    ctx.strokeRect(elvX + elvW + 8, elvY + elvH / 2 - 16, 18, 32);
    // Up arrow button
    ctx.fillStyle = player.x < 130 ? '#ffd700' : '#444';
    ctx.beginPath();
    const cbx = elvX + elvW + 17;
    ctx.moveTo(cbx, elvY + elvH / 2 - 8);
    ctx.lineTo(cbx - 5, elvY + elvH / 2);
    ctx.lineTo(cbx + 5, elvY + elvH / 2);
    ctx.closePath();
    ctx.fill();
    // Down arrow button
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.moveTo(cbx, elvY + elvH / 2 + 10);
    ctx.lineTo(cbx - 5, elvY + elvH / 2 + 2);
    ctx.lineTo(cbx + 5, elvY + elvH / 2 + 2);
    ctx.closePath();
    ctx.fill();

    // Direction prompts — dark background pill for readability against light wall
    if(player.x < 130) {
        const promptText = 'ACTION: ELEVATOR';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        const ptX = elvX + elvW / 2 + 10, ptY = elvY - 30;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(ptX - 90, ptY - 14, 180, 22);
        ctx.fillStyle = '#fff';
        ctx.fillText(promptText, ptX, ptY);
    }

    if(player.x < 50) {
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(10, 350, 110, 20);
        ctx.fillStyle = '#ff6666';
        ctx.fillText('\u2190 HALLWAY', 65, 364);
    }

    if(player.x > 620 && !level6.supercomputerUnlocked) {
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(550 - 115, 280 - 16, 230, 24);
        ctx.fillStyle = '#ffd700';
        ctx.fillText('[ ACTION ] - ENTER CODE', 550, 280);
    } else if(player.x > 620 && level6.supercomputerUnlocked) {
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(550 - 90, 280 - 16, 180, 24);
        ctx.fillStyle = '#00ff88';
        ctx.fillText('ACCESS GRANTED →', 550, 280);
    }
}

function drawLevel6MegacomputerRoom() {
    // Dark room background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-GX, -GY, CANVAS_W, CANVAS_H);

    // Floor
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-GX, 400, CANVAS_W, CANVAS_H);

    for(let i = -4; i < 24; i++) {
        for(let j = 0; j < 3; j++) {
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            ctx.strokeRect(i * 35, 400 + j * 33, 35, 33);
        }
    }

    // Death Star trapezoidal blast door on left — matching pipe room gateway
    const mcDoorX = 20, mcDoorY = 275, mcDoorW = 70, mcDoorH = 125;
    drawDeathStarBlastDoor(mcDoorX, mcDoorY, mcDoorW, mcDoorH, 'left', level6.bladeDoorMega.openPct, false, true);

    // Wall-mounted brutalist slogan painted wall to wall
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Creating a new fission of the future.', 350, 60);

    // Yellow pipe running from left wall gasket to center
    const pipeY = 180; // Same relative height as Level 5 hallway

    // Left wall gasket - curved mount with round bolted bevel (matching pipe room style)
    const gasketX = 17;

    // Outer bevel ring (mounted in wall)
    ctx.fillStyle = '#999';
    ctx.beginPath();
    ctx.arc(gasketX, pipeY, 18, 0, Math.PI * 2);
    ctx.fill();

    // Inner gasket plate (recessed)
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(gasketX, pipeY, 14, 0, Math.PI * 2);
    ctx.fill();

    // Center pipe opening
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(gasketX, pipeY, 8, 0, Math.PI * 2);
    ctx.fill();

    // Round bolts around the bevel (6 bolts evenly spaced)
    for(let b = 0; b < 6; b++) {
        const angle = (b / 6) * Math.PI * 2;
        const boltX = gasketX + Math.cos(angle) * 12;
        const boltY = pipeY + Math.sin(angle) * 12;

        // Bolt head
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(boltX, boltY, 3, 0, Math.PI * 2);
        ctx.fill();

        // Bolt shadow/depth
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(boltX, boltY, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Nuclear-powered AI Megacomputer
    const compX = 350;
    const compY = 350;
    const reservoirY = compY - 60; // 290
    const reservoirX = compX - 50;

    // Right-angle yellow pipe from gasket to reservoir top (L-shape: horizontal then vertical)
    const endX = reservoirX + 20; // Pipe connects to reservoir
    const endY = reservoirY;
    const cornerX = endX; // Corner point for right angle
    const cornerY = pipeY; // Keep same Y until corner

    ctx.strokeStyle = COLORS[3].hex; // Yellow
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(gasketX, pipeY);

    // Right angle: horizontal from gasket, then vertical down to reservoir
    ctx.lineTo(cornerX, cornerY); // Horizontal segment
    ctx.lineTo(endX, endY); // Vertical segment down
    ctx.stroke();

    // Pipe shine following the right-angle path
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(gasketX, pipeY - 4);
    ctx.lineTo(cornerX, cornerY - 4); // Horizontal segment
    ctx.lineTo(endX, endY - 4); // Vertical segment down
    ctx.stroke();

    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';

    // Main computer body (bulky 80s sci-fi style)
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(compX - 80, compY - 80, 160, 100);

    // Darker panels
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(compX - 75, compY - 75, 70, 90);
    ctx.fillRect(compX + 5, compY - 75, 70, 90);

    // Nuclear reactor reservoir with glowing green liquid
    // reservoirX and reservoirY already declared above at lines 2662 and 2661
    const reservoirW = 40;
    const reservoirH = 70;

    // Glass container outline
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    ctx.strokeRect(reservoirX, reservoirY, reservoirW, reservoirH);

    // Glowing green bubbling liquid (brighter, more volatile)
    const liquidLevel = reservoirH - 10;
    const bubbleTime = Date.now() / 200; // Faster bubbling

    // Bright glowing liquid with pulsing effect
    const pulseBrightness = 0.85 + Math.sin(Date.now() / 400) * 0.15;
    ctx.fillStyle = '#00ff00';
    ctx.globalAlpha = pulseBrightness;
    ctx.fillRect(reservoirX + 2, reservoirY + (reservoirH - liquidLevel), reservoirW - 4, liquidLevel);
    ctx.globalAlpha = 1;

    // Stronger glow effect around liquid
    ctx.shadowColor = '#00ff00';
    ctx.shadowBlur = 25;
    ctx.fillStyle = 'rgba(0, 255, 0, 0.5)';
    ctx.fillRect(reservoirX - 2, reservoirY, reservoirW + 4, reservoirH);
    ctx.shadowBlur = 0;

    // More volatile bubbles rising in liquid
    for(let b = 0; b < 6; b++) { // More bubbles
        const bubbleY = reservoirY + reservoirH - ((bubbleTime * 1.5 + b * 20) % liquidLevel);
        const bubbleX = reservoirX + 8 + Math.sin(bubbleTime / 5 + b) * 12 + b * 4;
        ctx.fillStyle = 'rgba(200, 255, 200, 0.8)';
        ctx.beginPath();
        ctx.arc(bubbleX, bubbleY, 2 + (b % 3), 0, Math.PI * 2);
        ctx.fill();
    }

    // Monitor screen with blinking green prompt (moved higher to avoid overlap)
    const screenX = compX + 15;
    const screenY = compY - 65;
    const screenW = 50;
    const screenH = 35;

    // Screen bezel
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(screenX - 3, screenY - 3, screenW + 6, screenH + 6);

    // Screen display
    ctx.fillStyle = '#001a00';
    ctx.fillRect(screenX, screenY, screenW, screenH);

    // Blinking green text
    const textBlink = Math.floor(Date.now() / 700) % 2;
    if(textBlink) {
        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Awaiting', screenX + screenW / 2, screenY + 12);
        ctx.fillText('executive', screenX + screenW / 2, screenY + 20);
        ctx.fillText('command...', screenX + screenW / 2, screenY + 28);
    }

    // Biohazard warning sticker on nuclear reservoir tank
    const stickerX = reservoirX + reservoirW / 2;
    const stickerY = reservoirY + 8;

    // Yellow warning sticker background (smaller to fit within tank)
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(stickerX - 14, stickerY, 28, 28);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(stickerX - 14, stickerY, 28, 28);

    // Biohazard symbol
    ctx.fillStyle = '#000';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('☢', stickerX, stickerY + 19);

    // Warning text below sticker - better spaced for readability
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 6px Arial';
    ctx.fillText('WARNING', stickerX, stickerY + 36);
    ctx.font = '5px Arial';
    ctx.fillText('HAZARDOUS', stickerX, stickerY + 42);
    ctx.fillText('Gear required', stickerX, stickerY + 48);

    // Bundled and organized wiring - more precise arrangement
    const wireColors = ['#e74c3c', '#27ae60', '#005f99', '#b8860b'];
    const bundleX = compX - 65;
    const bundleY = compY + 15;

    // Wire bundle runs from bottom of computer to liquid tank
    for(let i = 0; i < 4; i++) {
        ctx.strokeStyle = wireColors[i];
        ctx.lineWidth = 2.5;
        ctx.beginPath();

        // Organized parallel routing with slight offset
        const wireOffset = i * 3 - 4.5;
        ctx.moveTo(bundleX + wireOffset, bundleY);
        ctx.lineTo(bundleX + wireOffset, compY - 40); // Up to tank level

        // Curve into tank
        ctx.quadraticCurveTo(
            bundleX + wireOffset + 5, compY - 50,
            reservoirX - 5, compY - 55 + i * 3
        );

        ctx.stroke();

        // Wire connectors at tank
        ctx.fillStyle = wireColors[i];
        ctx.beginPath();
        ctx.arc(reservoirX - 5, compY - 55 + i * 3, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Vintage Star Trek style blinking buttons
    const buttonTime = Date.now() / 500;
    const buttonColors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
    for(let i = 0; i < 12; i++) {
        const btnX = compX - 70 + (i % 6) * 12;
        const btnY = compY + 28 + Math.floor(i / 6) * 12;
        const blinkState = Math.floor(buttonTime + i) % 2;
        ctx.fillStyle = blinkState ? buttonColors[i % buttonColors.length] : '#333';
        ctx.beginPath();
        ctx.arc(btnX, btnY, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Radiation glow zone indicator (where player takes damage)
    if(player.x > 233 && player.x < 467) {
        ctx.fillStyle = 'rgba(255, 255, 0, 0.1)';
        ctx.fillRect(233, 0, 234, 500);

        // Show radiation warning overlay on player
        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(player.x, player.y, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    // Dead private detective - lying on ground (90° from standing position)
    // Body positioned horizontally, head to the left, feet to the right
    // Right arm raised holding note (upward from body)
    const detectiveX = 540; // Center point of body
    const detectiveY = 445; // Ground level
    const s = 2; // Scale factor to match other NPCs

    // Simple blood pool (no active splatter - he's been dead for hours)
    ctx.fillStyle = '#6b0000';
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.ellipse(detectiveX, detectiveY + 2, 60, 25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Darker center of dried blood pool
    ctx.fillStyle = '#4a0000';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.ellipse(detectiveX, detectiveY + 2, 40, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // DETECTIVE CHARACTER - Pixel art style like mullet pro/bald boss
    // Lying flat on back (90° from standing position)
    // Complete horizontal body from head (left) to feet (right)

    // Define skin tone (pale/dead)
    const detectiveSkin = '#c9b5a0';

    // Back/far leg (left leg, behind) - repositioned to connect with torso
    ctx.fillStyle = '#2a2a3d'; // Dark blue suit pants
    ctx.fillRect(detectiveX + 6*s, detectiveY - 2*s, 16*s, 4*s); // Upper leg - connects to torso
    ctx.fillRect(detectiveX + 20*s, detectiveY - 3*s, 14*s, 4*s); // Lower leg

    // Back shoe
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(detectiveX + 33*s, detectiveY - 4*s, 5*s, 4*s);

    // Left arm (down by side)
    ctx.fillStyle = '#1a1a4d'; // Dark blue detective suit
    ctx.fillRect(detectiveX - 10*s, detectiveY - 8*s, 12*s, 3*s); // Left arm along body
    ctx.fillStyle = detectiveSkin;
    ctx.fillRect(detectiveX - 11*s, detectiveY - 9*s, 3*s, 3*s); // Left hand

    // HEAD - lying flat, face up
    ctx.fillStyle = detectiveSkin;
    ctx.fillRect(detectiveX - 18*s, detectiveY - 16*s, 10*s, 11*s); // Head

    // Short dark hair (detective style)
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(detectiveX - 18*s, detectiveY - 17*s, 10*s, 4*s); // Hair top
    ctx.fillRect(detectiveX - 19*s, detectiveY - 14*s, 2*s, 6*s); // Hair side
    ctx.fillRect(detectiveX - 8*s, detectiveY - 14*s, 2*s, 6*s); // Hair other side

    // Dead pallor/shading
    ctx.fillStyle = 'rgba(100, 80, 120, 0.15)';
    ctx.fillRect(detectiveX - 18*s, detectiveY - 13*s, 10*s, 8*s);

    // Closed eyes (dead)
    ctx.fillStyle = '#000';
    ctx.fillRect(detectiveX - 16*s, detectiveY - 12*s, 2*s, 1); // Left eye
    ctx.fillRect(detectiveX - 11*s, detectiveY - 12*s, 2*s, 1); // Right eye

    // Nose
    ctx.fillStyle = '#b59f8a';
    ctx.fillRect(detectiveX - 14*s, detectiveY - 10*s, 3*s, 2*s);

    // Mouth (slightly open, dead)
    ctx.fillStyle = '#4a2a2a';
    ctx.fillRect(detectiveX - 15*s, detectiveY - 7*s, 4*s, 1);

    // Small blood trickle from mouth
    ctx.fillStyle = '#660000';
    ctx.fillRect(detectiveX - 11*s, detectiveY - 7*s, 1, 2*s);

    // Fedora fallen beside head (on ground) — disappears once picked up
    const hatX = detectiveX - 24*s;
    const hatY = detectiveY - 8*s;
    if(!level6.hasDetectiveHat) {
        ctx.fillStyle = '#3a3a3a'; // Dark gray fedora
        ctx.beginPath();
        ctx.ellipse(hatX, hatY, 14, 10, -0.1, 0, Math.PI * 2);
        ctx.fill();

        // Hat crown
        ctx.fillStyle = '#2a2a2a';
        ctx.beginPath();
        ctx.ellipse(hatX - 1, hatY, 8, 6, -0.1, 0, Math.PI * 2);
        ctx.fill();

        // Hat band
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(hatX - 7, hatY - 1, 12, 2);
    }

    // Neck - connecting head to torso
    ctx.fillStyle = detectiveSkin;
    ctx.fillRect(detectiveX - 10*s, detectiveY - 8*s, 5*s, 4*s); // Neck piece

    // TORSO - lying flat, facing up (extended to connect with legs)
    ctx.fillStyle = '#1a1a4d'; // Dark blue detective suit jacket
    ctx.fillRect(detectiveX - 8*s, detectiveY - 14*s, 20*s, 14*s); // Extended torso to connect with legs

    // Suit jacket lapels and details
    ctx.fillStyle = '#14143d'; // Darker blue for shading
    ctx.fillRect(detectiveX + 8*s, detectiveY - 14*s, 4*s, 10*s); // Right lapel shadow
    ctx.fillRect(detectiveX - 8*s, detectiveY - 14*s, 4*s, 10*s); // Left lapel shadow

    // White shirt at collar
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(detectiveX - 4*s, detectiveY - 12*s, 8*s, 3*s);

    // Burgundy tie
    ctx.fillStyle = '#8b1a1a';
    ctx.fillRect(detectiveX - 2*s, detectiveY - 11*s, 4*s, 10*s);

    // Six bullet holes in torso (2 rows of 3)
    for(let i = 0; i < 6; i++) {
        const row = Math.floor(i / 3);
        const col = i % 3;
        const holeX = detectiveX - 4*s + col * 4*s;
        const holeY = detectiveY - 10*s + row * 5*s;

        // Bullet hole
        ctx.fillStyle = '#660000';
        ctx.beginPath();
        ctx.arc(holeX, holeY, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Darker center
        ctx.fillStyle = '#330000';
        ctx.beginPath();
        ctx.arc(holeX, holeY, 1, 0, Math.PI * 2);
        ctx.fill();
    }

    // Front/near leg (right leg, in front) - repositioned to connect with torso
    ctx.fillStyle = '#2a2a3d';
    ctx.fillRect(detectiveX + 6*s, detectiveY - 1*s, 16*s, 4*s); // Upper leg - connects to torso
    ctx.fillRect(detectiveX + 20*s, detectiveY - 2*s, 14*s, 4*s); // Lower leg

    // Front shoe
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(detectiveX + 33*s, detectiveY - 2*s, 5*s, 4*s);

    // Right arm RAISED holding note (extends upward from body)
    ctx.fillStyle = '#1a1a4d'; // Suit sleeve
    ctx.fillRect(detectiveX + 10*s, detectiveY - 16*s, 3*s, 8*s); // Upper arm vertical
    ctx.fillRect(detectiveX + 11*s, detectiveY - 24*s, 3*s, 10*s); // Forearm raised

    // Right hand holding note
    ctx.fillStyle = detectiveSkin;
    ctx.fillRect(detectiveX + 10*s, detectiveY - 26*s, 4*s, 4*s); // Hand

    // Yellow note in raised hand
    const noteX = detectiveX + 10*s;
    const noteY = detectiveY - 30*s;
    ctx.fillStyle = '#f4e5a8'; // Yellow legal pad color
    ctx.fillRect(noteX, noteY, 18, 24);

    // Note lines
    ctx.strokeStyle = '#c0c0c0';
    ctx.lineWidth = 0.5;
    for(let i = 0; i < 7; i++) {
        ctx.beginPath();
        ctx.moveTo(noteX + 2, noteY + 3 + i * 3);
        ctx.lineTo(noteX + 16, noteY + 3 + i * 3);
        ctx.stroke();
    }

    // Blood splatter on note
    ctx.fillStyle = '#660000';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(noteX + 12, noteY + 18, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Detective hat pickup prompt — hat becomes interactable after pistol is picked up
    if(level6.pistol.pickedUp && !level6.hasDetectiveHat) {
        // Highlight the fedora on ground
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(hatX, hatY, 16, 12, -0.1, 0, Math.PI * 2);
        ctx.stroke();
        // Prompt
        if(Math.abs(player.x - hatX) < 50 && Math.abs(player.y - hatY) < 60) {
            ctx.fillStyle = 'rgba(0,0,0,0.82)';
            ctx.fillRect(hatX - 85, hatY - 32, 170, 24);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('[ ACTION ] - TAKE HAT', hatX, hatY - 14);
        }
    }
    // Hide hat from detective body once picked up (already wearing it)
    // (The fedora drawing above is skipped implicitly since we don't modify it —
    //  but visually the hat on ground is the one the player takes)

    // Interaction prompt for note (when not viewing) - aligned with note center
    const noteInteractX = noteX + 9; // Center of note
    const noteInteractY = noteY + 12; // Center of note
    if(!level6.viewingDetectiveNote && Math.abs(player.x - noteInteractX) < 50 && Math.abs(player.y - noteInteractY) < 50) {
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(noteInteractX - 100, noteY - 36, 200, 24);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';

    // Dropped pistol near detective

        ctx.fillRect(gx + 5, gy + 3, 8, 12);
        ctx.fillStyle = '#444';
        ctx.fillRect(gx - 14, gy - 4, 4, 8);

        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(gx, gy - 8, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Pickup prompt

            ctx.fillRect(gx - 100, gy - 34, 200, 24);

            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';

        }
    }

}

function drawLevel6CloningRoom() {
    const t = Date.now();
    // Dark industrial room
    ctx.fillStyle = '#222';
    ctx.fillRect(-GX, -GY, CANVAS_W, CANVAS_H);

    // Industrial floor
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-GX, 400, CANVAS_W, CANVAS_H);
    for(let i = -4; i < 24; i++) {
        for(let j = 0; j < 3; j++) {
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            ctx.strokeRect(i * 35, 400 + j * 33, 35, 33);
        }
    }

    // === LEFT WALL GASKET (BEHIND pipes — design rule) ===
    const gasketY = 35;
    const gasketX = 17;
    ctx.fillStyle = '#999';
    ctx.beginPath();
    ctx.arc(gasketX, gasketY, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(gasketX, gasketY, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(gasketX, gasketY, 8, 0, Math.PI * 2);
    ctx.fill();
    for(let b = 0; b < 6; b++) {
        const angle = (b / 6) * Math.PI * 2;
        const bx = gasketX + Math.cos(angle) * 12;
        const by = gasketY + Math.sin(angle) * 12;
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(bx, by, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // === 4 STEEL VATS with colored ooze and floating fetal PMs ===
    const vatColors = ['#ff3333', '#33cc33', '#3388ff', '#ffcc00'];
    const vatDarkColors = ['#990000', '#006600', '#003388', '#996600'];
    const vatX0 = 160;
    for (let vi = 0; vi < 4; vi++) {
        const vx = vatX0 + vi * 95;
        const vy = 80, vw = 50, vh = 140;

        // Steel vat body
        const vatGrad = ctx.createLinearGradient(vx, 0, vx + vw, 0);
        vatGrad.addColorStop(0, '#555');
        vatGrad.addColorStop(0.3, '#888');
        vatGrad.addColorStop(0.5, '#999');
        vatGrad.addColorStop(0.7, '#888');
        vatGrad.addColorStop(1, '#555');
        ctx.fillStyle = vatGrad;
        ctx.fillRect(vx, vy, vw, vh);

        // Steel rim top & bottom
        ctx.fillStyle = '#aaa';
        ctx.fillRect(vx - 3, vy - 4, vw + 6, 8);
        ctx.fillRect(vx - 3, vy + vh - 4, vw + 6, 8);
        ctx.fillStyle = '#777';
        ctx.fillRect(vx - 2, vy - 2, vw + 4, 4);
        ctx.fillRect(vx - 2, vy + vh - 2, vw + 4, 4);

        // Clear window panel
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(vx + 8, vy + 20, vw - 16, vh - 40);
        // Colored genetic ooze
        const oozeAlpha = 0.5 + Math.sin(t / 1000 + vi * 1.5) * 0.15;
        ctx.fillStyle = vatColors[vi];
        ctx.globalAlpha = oozeAlpha;
        ctx.fillRect(vx + 9, vy + 22, vw - 18, vh - 44);
        ctx.globalAlpha = 1;

        // Floating fetal PM silhouette — bobbing animation
        const fetalY = vy + 55 + Math.sin(t / 800 + vi * 2) * 12;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        // Head
        ctx.beginPath();
        ctx.arc(vx + vw/2, fetalY, 7, 0, Math.PI * 2);
        ctx.fill();
        // Curled body
        ctx.beginPath();
        ctx.arc(vx + vw/2, fetalY + 12, 9, 0, Math.PI);
        ctx.fill();
        // Tiny arm buds
        ctx.fillRect(vx + vw/2 - 12, fetalY + 6, 5, 3);
        ctx.fillRect(vx + vw/2 + 7, fetalY + 6, 5, 3);

        // Bubbles
        for (let b = 0; b < 3; b++) {
            const bx = vx + 14 + (b * 10) + Math.sin(t / 500 + vi + b) * 3;
            const by = vy + 30 + ((t / 15 + b * 40 + vi * 20) % (vh - 50));
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(bx, by, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // === PIPE from vat going UP then LEFT to merge ===
        ctx.strokeStyle = vatColors[vi];
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        // Vertical from vat top upward
        ctx.moveTo(vx + vw/2, vy - 4);
        ctx.lineTo(vx + vw/2, 50);
        // Curve left
        ctx.quadraticCurveTo(vx + vw/2, 35, vx + vw/2 - 20, 35);
        // Horizontal to left wall gasket center
        ctx.lineTo(gasketX, 35);
        ctx.stroke();
        // Highlight
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(vx + vw/2, vy - 2);
        ctx.lineTo(vx + vw/2, 50);
        ctx.quadraticCurveTo(vx + vw/2, 37, vx + vw/2 - 20, 37);
        ctx.lineTo(gasketX, 37);
        ctx.stroke();

        // === ALUMINUM DRYER VENT TUBE from vat to centrifuge ===
        const centX = 350, centY = 310;
        const tubeEndX = centX - 60 + vi * 30;
        const tubeEndY = centY - 20;
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 8;
        ctx.setLineDash([6, 3]); // Corrugated vent look
        ctx.beginPath();
        ctx.moveTo(vx + vw/2, vy + vh);
        ctx.quadraticCurveTo(vx + vw/2, tubeEndY + 30, tubeEndX, tubeEndY);
        ctx.stroke();
        ctx.setLineDash([]);
        // Tube shadow
        ctx.strokeStyle = '#777';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(vx + vw/2 + 3, vy + vh);
        ctx.quadraticCurveTo(vx + vw/2 + 3, tubeEndY + 32, tubeEndX + 2, tubeEndY + 2);
        ctx.stroke();
    }

    // === ROTATING CENTRIFUGE (PM Printer core) ===
    const centX = 350, centY = 330, centR = 55;
    const rotation = (t / 2000) % (Math.PI * 2);

    // Centrifuge housing — large steel drum
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(centX, centY, centR + 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(centX, centY, centR + 10, 0, Math.PI * 2);
    ctx.stroke();
    // Inner drum
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(centX, centY, centR, 0, Math.PI * 2);
    ctx.fill();

    // Heat lamp glow in center
    const lampGlow = 0.4 + Math.sin(t / 300) * 0.15;
    ctx.fillStyle = `rgba(255, 120, 30, ${lampGlow})`;
    ctx.beginPath();
    ctx.arc(centX, centY, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff8844';
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(centX, centY, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Easter egg pod capsules — 4 rotating around center
    for (let ei = 0; ei < 4; ei++) {
        const eggAngle = rotation + (ei / 4) * Math.PI * 2;
        const eggX = centX + Math.cos(eggAngle) * (centR - 18);
        const eggY = centY + Math.sin(eggAngle) * (centR - 18);

        // Egg capsule — oval with color tint
        ctx.fillStyle = vatColors[ei];
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.ellipse(eggX, eggY, 12, 16, eggAngle, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Shiny highlight
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(eggX - 3, eggY - 4, 4, 6, eggAngle, 0, Math.PI * 2);
        ctx.fill();
        // PM silhouette visible through egg
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.arc(eggX, eggY - 3, 4, 0, Math.PI * 2); // head
        ctx.fill();
        ctx.fillRect(eggX - 3, eggY + 1, 6, 8); // body
    }

    // Centrifuge steel bolts around rim
    for (let bi = 0; bi < 8; bi++) {
        const ba = (bi / 8) * Math.PI * 2;
        const bx = centX + Math.cos(ba) * (centR + 5);
        const by = centY + Math.sin(ba) * (centR + 5);
        ctx.fillStyle = '#888';
        ctx.beginPath();
        ctx.arc(bx, by, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // === PM PRINTER LABEL (mounted on wall above pipes) ===
    ctx.fillStyle = '#444';
    ctx.fillRect(275, -8, 150, 26);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.strokeRect(275, -8, 150, 26);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PM PRINTER', 350, 12);

    // === CONCEALED DOOR — left wall sliding brick panel ===
    const cdX = 0, cdY = 280, cdW = 60, cdH = 120;
    const slideOffset = level6.cloningDoorOpen * cdW; // slides right to reveal

    if (level6.cloningDoorOpen < 1) {
        // Brick wall section that slides — matches dark room wall
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(cdX + slideOffset, cdY, cdW - slideOffset, cdH);
        // Brick pattern (subtle, matching wall tone)
        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 3; col++) {
                const brickX = cdX + slideOffset + col * 22 + (row % 2) * 11;
                const brickY = cdY + row * 20;
                if (brickX < cdX + cdW) {
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(brickX, brickY, 20, 18);
                }
            }
        }
        // OSHA safety compliance poster on brick wall (slides with door)
        const posterX = cdX + slideOffset + 5;
        const posterY = cdY + 15;
        const posterW = 42;
        const posterH = 54;
        ctx.save();
        ctx.beginPath();
        ctx.rect(cdX + slideOffset, cdY, cdW - slideOffset, cdH);
        ctx.clip();
        if(oshaPosterImg && oshaPosterImg.complete && oshaPosterImg.naturalWidth > 0) {
            // White border frame
            ctx.fillStyle = '#ddd';
            ctx.fillRect(posterX - 2, posterY - 2, posterW + 4, posterH + 4);
            ctx.drawImage(oshaPosterImg, posterX, posterY, posterW, posterH);
        } else {
            // Fallback: simple OSHA poster
            ctx.fillStyle = '#fff';
            ctx.fillRect(posterX, posterY, posterW, posterH);
            ctx.fillStyle = '#cc0000';
            ctx.font = 'bold 7px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('LAB SAFETY', posterX + posterW/2, posterY + 20);
            ctx.fillText('FIRST', posterX + posterW/2, posterY + 30);
        }
        // Tack pins
        ctx.fillStyle = '#cc0000';
        ctx.beginPath();
        ctx.arc(posterX + 4, posterY + 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(posterX + posterW - 4, posterY + 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    if (level6.cloningDoorOpen > 0.1) {
        // Dark passage revealed behind
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(cdX, cdY, slideOffset, cdH);
        // Green LED strips inside passage
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 6;
        ctx.fillRect(cdX, cdY, 2, cdH);
        ctx.shadowBlur = 0;
    }

    // Door outline visible even when closed
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 2;
    ctx.strokeRect(cdX, cdY, cdW, cdH);

    // Keycard reader beside concealed door
    if (!level6.cloningDoorUnlocked) {
        const krX = cdW + 8, krY = cdY + 40;
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(krX, krY, 18, 30);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(krX + 2, krY + 2, 14, 26);
        // Card slot
        ctx.fillStyle = '#333';
        ctx.fillRect(krX + 4, krY + 8, 10, 3);
        // LED — red when locked
        ctx.fillStyle = '#ff3333';
        ctx.shadowColor = '#ff3333';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(krX + 9, krY + 20, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (player.x < 80 && level6.hasKeycard) {
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(0,0,0,0.82)';
            ctx.fillRect(50 - 90, cdY + cdH + 6, 180, 24);
            ctx.fillStyle = '#ffd700';
            ctx.fillText('[ ACTION ] - USE KEYCARD', 50, cdY + cdH + 23);
        } else if (player.x < 80 && !level6.hasKeycard) {
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(0,0,0,0.82)';
            ctx.fillRect(50 - 80, cdY + cdH + 6, 160, 24);
            ctx.fillStyle = '#ff6666';
            ctx.fillText('KEYCARD REQUIRED', 50, cdY + cdH + 23);
        }
    } else {
        // Unlocked reader — green
        const krX = cdW + 8 + level6.cloningDoorOpen * cdW, krY = cdY + 40;
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(krX, krY, 18, 30);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(krX + 2, krY + 2, 14, 26);
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(krX + 9, krY + 20, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // === CLONING BOSS — Lab Supervisor patrolling in front of centrifuge ===
    const cb = level6.cloningBoss;
    if (cb.alive) {
        const bx = cb.x, by = cb.y;
        const walkCycle = cb.paused ? 0 : Math.sin(Date.now() / 150) * 5;
        const bob = cb.paused ? 0 : Math.abs(Math.sin(Date.now() / 150)) * 1.5;

        // White safety helmet (rounded construction hard hat)
        // Dome
        ctx.fillStyle = '#f0f0f0';
        ctx.beginPath();
        ctx.moveTo(bx - 14, by - 50 - bob);
        ctx.quadraticCurveTo(bx - 14, by - 66 - bob, bx, by - 66 - bob);
        ctx.quadraticCurveTo(bx + 14, by - 66 - bob, bx + 14, by - 50 - bob);
        ctx.closePath();
        ctx.fill();
        // Highlight on dome
        ctx.fillStyle = '#fafafa';
        ctx.beginPath();
        ctx.moveTo(bx - 6, by - 52 - bob);
        ctx.quadraticCurveTo(bx - 6, by - 63 - bob, bx + 2, by - 63 - bob);
        ctx.quadraticCurveTo(bx + 6, by - 63 - bob, bx + 6, by - 56 - bob);
        ctx.closePath();
        ctx.fill();
        // Brim (short lip at base)
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(bx - 16, by - 52 - bob, 32, 3);
        // Brim shadow
        ctx.fillStyle = '#ccc';
        ctx.fillRect(bx - 15, by - 49 - bob, 30, 1);

        // Head
        ctx.fillStyle = '#f5d5a8';
        ctx.fillRect(bx - 11, by - 50 - bob, 22, 22);
        // Eyes — stern expression
        ctx.fillStyle = '#000';
        ctx.fillRect(bx - 7, by - 44 - bob, 4, 4);
        ctx.fillRect(bx + 3, by - 44 - bob, 4, 4);
        // Angry eyebrows
        ctx.strokeStyle = '#4a3520';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bx - 8, by - 48 - bob); ctx.lineTo(bx - 3, by - 46 - bob);
        ctx.moveTo(bx + 8, by - 48 - bob); ctx.lineTo(bx + 3, by - 46 - bob);
        ctx.stroke();
        // Mouth — frown
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(bx, by - 34 - bob, 4, 0.2, Math.PI - 0.2);
        ctx.stroke();

        // Red shirt (full torso — no lab coat)
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(bx - 14, by - 28 - bob, 28, 36);
        // Shirt collar notch
        ctx.fillStyle = '#b01e1e';
        ctx.beginPath();
        ctx.moveTo(bx - 8, by - 28 - bob);
        ctx.lineTo(bx, by - 22 - bob);
        ctx.lineTo(bx + 8, by - 28 - bob);
        ctx.closePath();
        ctx.fill();
        // Black tie (prominent)
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.moveTo(bx - 4, by - 28 - bob);
        ctx.lineTo(bx + 4, by - 28 - bob);
        ctx.lineTo(bx + 3, by - 6 - bob);
        ctx.lineTo(bx, by - 1 - bob);
        ctx.lineTo(bx - 3, by - 6 - bob);
        ctx.closePath();
        ctx.fill();
        // Tie knot
        ctx.fillStyle = '#222';
        ctx.fillRect(bx - 3, by - 28 - bob, 6, 4);

        // Arms — animated swing when walking (red shirt sleeves)
        const armSwing = walkCycle * 0.6;
        // Left arm
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(bx - 20, by - 26 - bob + armSwing, 6, 18);
        ctx.fillStyle = '#f5d5a8';
        ctx.fillRect(bx - 20, by - 8 - bob + armSwing, 6, 8);
        // Right arm
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(bx + 14, by - 26 - bob - armSwing, 6, 18);
        ctx.fillStyle = '#f5d5a8';
        ctx.fillRect(bx + 14, by - 8 - bob - armSwing, 6, 8);

        // Dark pants
        ctx.fillStyle = '#2a2a2a';
        const legOffset = walkCycle;
        ctx.fillRect(bx - 10, by + 8 - bob, 9, 18 + legOffset);
        ctx.fillRect(bx + 1, by + 8 - bob, 9, 18 - legOffset);
        // Black steel-toe boots
        ctx.fillStyle = '#111';
        ctx.fillRect(bx - 12, by + 26 - bob + legOffset, 12, 5);
        ctx.fillRect(bx, by + 26 - bob - legOffset, 12, 5);
        // Boot steel toe caps
        ctx.fillStyle = '#444';
        ctx.fillRect(bx - 12, by + 26 - bob + legOffset, 4, 3);
        ctx.fillRect(bx + 8, by + 26 - bob - legOffset, 4, 3);

    } else if (cb.deathTime > 0) {
        // Dead boss — collapsed on ground (larger, lab coat visible)
        const bx = cb.x, by = 392;
        // Body on ground
        ctx.fillStyle = '#f5f5f5'; // lab coat
        ctx.fillRect(bx - 18, by - 2, 36, 8);
        // Head
        ctx.fillStyle = '#f5d5a8';
        ctx.fillRect(bx - 10, by - 8, 16, 10);
        // Hard hat knocked off (rounded helmet on ground)
        ctx.fillStyle = '#f0f0f0';
        ctx.beginPath();
        ctx.arc(bx + 23, by - 2, 7, Math.PI, 0);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(bx + 14, by - 2, 18, 2);
        // X eyes
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(bx - 6, by - 6); ctx.lineTo(bx - 2, by - 2);
        ctx.moveTo(bx - 2, by - 6); ctx.lineTo(bx - 6, by - 2);
        ctx.moveTo(bx + 2, by - 6); ctx.lineTo(bx + 6, by - 2);
        ctx.moveTo(bx + 6, by - 6); ctx.lineTo(bx + 2, by - 2);
        ctx.stroke();
        // Red shirt visible
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(bx - 6, by, 12, 4);
        // Black tie askew
        ctx.fillStyle = '#111';
        ctx.fillRect(bx - 1, by - 1, 3, 6);
    }

    // === DROPPED KEYCARD ===
    if (level6.keycardOnGround) {
        const kx = level6.keycardX, ky = level6.keycardY;
        // Card body
        ctx.fillStyle = '#ddd';
        ctx.fillRect(kx - 12, ky - 4, 24, 14);
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        ctx.strokeRect(kx - 12, ky - 4, 24, 14);
        // Magnetic stripe
        ctx.fillStyle = '#333';
        ctx.fillRect(kx - 10, ky + 4, 20, 3);
        // Blinking glow
        const cardGlow = Math.sin(t / 300) > 0;
        if (cardGlow) {
            ctx.fillStyle = '#00ccff';
            ctx.shadowColor = '#00ccff';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(kx, ky - 8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        if (Math.abs(player.x - kx) < 50) {
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(0,0,0,0.82)';
            ctx.fillRect(kx - 100, ky - 28, 200, 24);
            ctx.fillStyle = '#ffd700';
            ctx.fillText('[ ACTION ] - TAKE KEYCARD', kx, ky - 10);
        }
    }

    // Direction prompts
    if (player.x > 620) {
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(660 - 55, 360, 110, 20);
        ctx.fillStyle = '#fff';
        ctx.fillText('LOBBY →', 660, 376);
    }
}

// === Level 6 Furnace Room — dark industrial furnace with evidence of CEO's escape ===
function drawL6FurnaceRoom() {
    // Dark industrial walls
    ctx.fillStyle = '#2b2520';
    ctx.fillRect(-GX, -GY, CANVAS_W, CANVAS_H);

    // Dark floor tiles
    ctx.fillStyle = '#1a1815';
    ctx.fillRect(-GX, 400, CANVAS_W, CANVAS_H);
    for(let i = -4; i < 24; i++) {
        for(let j = 0; j < 3; j++) {
            ctx.strokeStyle = '#0a0a08';
            ctx.lineWidth = 1;
            ctx.strokeRect(i * 35, 400 + j * 33, 35, 33);
        }
    }

    // === FURNACE (center-right, prominent) ===
    const fx = 420, fy = 340;
    // Radial heat glow
    const glowPhase = Math.sin(Date.now() / 800) * 0.3 + 0.7;
    const gradient = ctx.createRadialGradient(fx, fy, 20, fx, fy, 140);
    gradient.addColorStop(0, `rgba(255,100,0,${glowPhase * 0.5})`);
    gradient.addColorStop(0.5, `rgba(255,50,0,${glowPhase * 0.2})`);
    gradient.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(fx, fy, 140, 0, Math.PI * 2);
    ctx.fill();

    // Furnace body (industrial steel)
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(fx - 65, fy - 45, 130, 90);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(fx - 55, fy - 35, 110, 70);
    // Fire window
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(fx - 42, fy - 22, 84, 44);
    // Perpetual glow inside
    ctx.fillStyle = `rgba(255,100,0,${glowPhase})`;
    ctx.fillRect(fx - 38, fy - 18, 76, 36);
    // Flickering flames
    for(let i = 0; i < 6; i++) {
        const flameX = fx - 30 + i * 12;
        const flameH = 20 + Math.sin(Date.now() / 150 + i * 1.3) * 10;
        const flameY = fy + 10 - flameH;
        ctx.fillStyle = `rgba(255,${150 + i * 15},0,0.8)`;
        ctx.fillRect(flameX, flameY, 6, flameH);
    }
    // Chimney/exhaust pipe going up
    ctx.fillStyle = '#444';
    ctx.fillRect(fx - 12, fy - 130, 24, 90);
    ctx.fillStyle = '#555';
    ctx.fillRect(fx - 15, fy - 135, 30, 10);
    // Heat shimmer from chimney
    ctx.fillStyle = `rgba(255,80,0,${0.15 + Math.sin(Date.now() / 400) * 0.1})`;
    ctx.fillRect(fx - 8, fy - 180, 16, 50);
    // Steel rivets on furnace
    for(let r = 0; r < 4; r++) {
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(fx - 55 + r * 38, fy - 40, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(fx - 55 + r * 38, fy + 40, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    // FURNACE label
    ctx.fillStyle = '#cc8844';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('INCINERATOR', fx, fy + 55);

    // === DISCARDED RED JUMPSUIT on floor in front of furnace ===
    const jsX = fx - 30, jsY = 388;
    // Crumpled jumpsuit body — irregularly shaped heap
    ctx.fillStyle = '#cc2222';
    // Main body mass
    ctx.beginPath();
    ctx.moveTo(jsX, jsY);
    ctx.lineTo(jsX + 35, jsY - 4);
    ctx.lineTo(jsX + 40, jsY + 8);
    ctx.lineTo(jsX + 32, jsY + 16);
    ctx.lineTo(jsX + 10, jsY + 18);
    ctx.lineTo(jsX - 5, jsY + 12);
    ctx.closePath();
    ctx.fill();
    // Darker fold shadows
    ctx.fillStyle = '#991a1a';
    ctx.beginPath();
    ctx.moveTo(jsX + 8, jsY + 2);
    ctx.lineTo(jsX + 22, jsY);
    ctx.lineTo(jsX + 25, jsY + 10);
    ctx.lineTo(jsX + 12, jsY + 12);
    ctx.closePath();
    ctx.fill();
    // Sleeve hanging out
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(jsX + 36, jsY + 2, 14, 6);
    ctx.fillStyle = '#991a1a';
    ctx.fillRect(jsX + 36, jsY + 4, 14, 2);
    // Collar detail
    ctx.fillStyle = '#e63333';
    ctx.fillRect(jsX + 10, jsY - 4, 12, 5);
    // PipeTech logo patch (small white square on shoulder area)
    ctx.fillStyle = '#ddd';
    ctx.fillRect(jsX + 28, jsY, 6, 5);
    ctx.fillStyle = '#cc2222';
    ctx.font = '3px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PT', jsX + 31, jsY + 4);

    // === BLOODY WHITE BOOTS next to jumpsuit ===
    const bx1 = fx + 18, by1 = 392;
    // Left boot
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(bx1, by1, 10, 14);
    ctx.fillRect(bx1 - 3, by1 + 10, 16, 5);
    // Boot sole
    ctx.fillStyle = '#333';
    ctx.fillRect(bx1 - 3, by1 + 14, 16, 2);
    // Blood stains on left boot
    ctx.fillStyle = '#8b0000';
    ctx.fillRect(bx1, by1 + 6, 6, 4);
    ctx.fillStyle = '#6a0000';
    ctx.beginPath();
    ctx.arc(bx1 + 2, by1 + 12, 3, 0, Math.PI * 2);
    ctx.fill();
    // Right boot (fallen sideways)
    const bx2 = bx1 + 18, by2 = 394;
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(bx2, by2, 14, 8);
    ctx.fillRect(bx2 + 10, by2 - 3, 5, 14);
    // Boot sole (visible, sideways)
    ctx.fillStyle = '#333';
    ctx.fillRect(bx2, by2 + 7, 14, 2);
    // Blood stains on right boot
    ctx.fillStyle = '#8b0000';
    ctx.fillRect(bx2 + 2, by2 + 2, 8, 3);
    ctx.fillStyle = '#6a0000';
    ctx.beginPath();
    ctx.arc(bx2 + 8, by2 + 5, 2, 0, Math.PI * 2);
    ctx.fill();

    // === BLOODY FOOTPRINTS leading from boots toward secret door (left wall) ===
    const fpSteps = [
        {x: fx + 5, y: 400, rot: -0.3, size: 1},
        {x: fx - 30, y: 398, rot: -0.2, size: 0.95},
        {x: fx - 70, y: 400, rot: -0.15, size: 0.9},
        {x: fx - 115, y: 397, rot: -0.1, size: 0.85},
        {x: fx - 160, y: 399, rot: -0.1, size: 0.8},
        {x: fx - 205, y: 398, rot: -0.05, size: 0.75},
        {x: fx - 245, y: 400, rot: 0, size: 0.7},
        {x: fx - 280, y: 397, rot: 0, size: 0.65},
        {x: fx - 310, y: 399, rot: 0, size: 0.55},
        {x: fx - 340, y: 398, rot: 0, size: 0.45},
    ];
    for(let fp of fpSteps) {
        ctx.save();
        ctx.translate(fp.x, fp.y);
        ctx.rotate(fp.rot);
        ctx.globalAlpha = 0.3 + fp.size * 0.5;
        // Barefoot print — heel + ball + toes
        ctx.fillStyle = '#6a0000';
        const s = fp.size;
        // Heel
        ctx.beginPath();
        ctx.ellipse(0, 6 * s, 4 * s, 5 * s, 0, 0, Math.PI * 2);
        ctx.fill();
        // Ball of foot
        ctx.beginPath();
        ctx.ellipse(0, -4 * s, 5 * s, 4 * s, 0, 0, Math.PI * 2);
        ctx.fill();
        // Toes (5 small dots)
        for(let t = 0; t < 5; t++) {
            const tx = -4 * s + t * 2 * s;
            const ty = -9 * s + Math.abs(t - 2) * 0.5 * s;
            ctx.beginPath();
            ctx.arc(tx, ty, 1.2 * s, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // === SECRET DOOR (left wall) — concealed panel the CEO escaped through ===
    const sdX = 10, sdY = 300, sdW = 45, sdH = 100;
    // Door outline barely visible — hairline crack in wall
    ctx.strokeStyle = '#3a3530';
    ctx.lineWidth = 1;
    ctx.strokeRect(sdX, sdY, sdW, sdH);
    // Subtle handle scratch marks
    ctx.strokeStyle = '#4a4540';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(sdX + sdW - 5, sdY + 40);
    ctx.lineTo(sdX + sdW - 5, sdY + 60);
    ctx.stroke();
    // Bloody handprint on wall near secret door
    ctx.fillStyle = 'rgba(106,0,0,0.4)';
    ctx.fillRect(sdX + sdW + 5, sdY + 30, 14, 18);
    // Finger smears
    for(let f = 0; f < 4; f++) {
        ctx.fillRect(sdX + sdW + 7 + f * 3, sdY + 20, 2, 12);
    }
    // Fading bloody footprints disappear into door crack
    ctx.fillStyle = 'rgba(106,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(sdX + sdW/2, sdY + sdH - 8, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(106,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(sdX + sdW/2 - 6, sdY + sdH - 3, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // === STILL-BURNING CIGAR next to secret wall door ===
    const cigX = sdX + sdW + 25, cigY = sdY + sdH - 15;
    // Cigar body — brown cylinder
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(cigX, cigY, 18, 5);
    // Cigar band — gold ring
    ctx.fillStyle = '#d4af37';
    ctx.fillRect(cigX + 4, cigY, 4, 5);
    // Ash tip — gray
    ctx.fillStyle = '#aaa';
    ctx.fillRect(cigX - 3, cigY + 1, 4, 3);
    // Burning ember at tip
    const emberGlow = 0.6 + Math.sin(Date.now() / 300) * 0.4;
    ctx.fillStyle = `rgba(255,100,0,${emberGlow})`;
    ctx.beginPath();
    ctx.arc(cigX - 2, cigY + 2.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Smoke wisps rising from cigar
    for(let sw = 0; sw < 3; sw++) {
        const smokeY = cigY - 8 - sw * 12;
        const smokeX = cigX - 2 + Math.sin(Date.now() / 600 + sw * 1.5) * 6;
        const smokeAlpha = 0.25 - sw * 0.07;
        ctx.fillStyle = `rgba(180,180,180,${smokeAlpha})`;
        ctx.beginPath();
        ctx.arc(smokeX, smokeY, 3 + sw * 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Left door — wooden door to hallway (same style as Level 5)
    const ldX = 55, ldY = 340, ldW = 50, ldH = 60;
    ctx.fillStyle = '#654321';
    ctx.fillRect(ldX - 10, ldY, ldW, ldH);
    ctx.fillStyle = '#4a3a1a';
    ctx.fillRect(ldX - 5, ldY + 5, ldW - 10, ldH - 10);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(ldX + 30, ldY + 30, 3, 0, Math.PI * 2);
    ctx.fill();
    // Highlight when near
    if(player.x < 100) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.strokeRect(ldX - 12, ldY - 2, ldW + 4, ldH + 4);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('\u2190 HALLWAY', ldX + 15, ldY - 10);
    }

    // === OPEN WALL DOOR on right side (passage back to cloning room) ===
    const rdX = 655, rdY = 300, rdW = 45, rdH = 100;
    // Dark interior of open doorway
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(rdX, rdY, rdW, rdH);
    // Door frame — concrete edges
    ctx.fillStyle = '#3a3530';
    ctx.fillRect(rdX - 3, rdY - 3, 3, rdH + 6);
    ctx.fillRect(rdX, rdY - 3, rdW, 3);
    ctx.fillRect(rdX, rdY + rdH, rdW, 3);
    // Green LED strip on doorframe edge
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(rdX - 2, rdY, 1, rdH);
    // Dim light spilling from doorway
    ctx.fillStyle = 'rgba(0,255,136,0.05)';
    ctx.fillRect(rdX - 20, rdY, 20, rdH);

    // Right exit direction prompt (back to cloning room)
    if(player.x > 600) {
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(660 - 55, 350, 110, 20);
        ctx.fillStyle = '#fff';
        ctx.fillText('CLONING \u2192', 660, 366);
    }

    // Ambient label
    if(player.x > 200 && player.x < 500) {
        ctx.fillStyle = 'rgba(255,200,150,0.5)';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Someone discarded their uniform here...', 350, 280);
    }
}

function drawLevel6UnderbellyHallway() {
    const t = Date.now();

    // === TRANSITION HALLWAY — industrial to crude underbelly ===
    // Left half: crude cobblestone/brick, Right half: industrial tile (fading transition)

    // Wall — dingy, water-stained concrete
    ctx.fillStyle = '#3a3530';
    ctx.fillRect(-GX, -GY, CANVAS_W, CANVAS_H);
    // Wall grime streaks
    for(let i = 0; i < 6; i++) {
        ctx.fillStyle = `rgba(20,25,15,${0.2 + i * 0.03})`;
        ctx.fillRect(80 + i * 110, 30 + i * 8, 3, 200);
        ctx.fillStyle = `rgba(15,20,10,0.12)`;
        ctx.fillRect(83 + i * 110, 50 + i * 12, 5, 170);
    }

    // === FLOOR — transition from industrial tile (right) to cobblestone (left) ===
    const floorY = 400;
    // Right side: dark industrial tile matching employee lobby
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(375, floorY, 400, CANVAS_H);
    for(let i = 10; i < 24; i++) {
        for(let j = 0; j < 3; j++) {
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            ctx.strokeRect(i * 35, floorY + j * 33, 35, 33);
        }
    }
    // Left side: cobblestone — aged stone floor
    ctx.fillStyle = '#3a3228';
    ctx.fillRect(-GX, floorY, 378 + GX, CANVAS_H);
    // Cobblestone pattern — filled stones with grout
    for(let row = 0; row < 4; row++) {
        for(let col = -2; col < 12; col++) {
            const cx = col * 32 + (row % 2) * 16;
            const cy = floorY + row * 24 + 2;
            if(cx > 370) continue;
            // Stone face
            const shade = ((row * 13 + col * 7) & 7);
            ctx.fillStyle = `rgb(${68 + shade * 3},${60 + shade * 2},${48 + shade})`;
            ctx.beginPath();
            ctx.roundRect(cx + 1, cy + 1, 30, 22, 4);
            ctx.fill();
            // Stone edge highlight (top)
            ctx.fillStyle = `rgba(255,255,255,0.06)`;
            ctx.fillRect(cx + 3, cy + 2, 26, 2);
            // Stone outline grout
            ctx.strokeStyle = '#2a2418';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(cx + 1, cy + 1, 30, 22, 4);
            ctx.stroke();
        }
    }
    // Metal threshold strip at transition
    ctx.fillStyle = '#6a6a6a';
    ctx.fillRect(370, floorY, 5, CANVAS_H - floorY);
    ctx.fillStyle = '#888';
    ctx.fillRect(371, floorY, 1, CANVAS_H - floorY);
    ctx.fillStyle = '#555';
    ctx.fillRect(374, floorY, 1, CANVAS_H - floorY);
    // Floor grime along wall edge
    ctx.fillStyle = 'rgba(20,18,12,0.12)';
    ctx.fillRect(-GX, floorY, CANVAS_W, 3);
    // Mold patches on cobblestone
    ctx.fillStyle = 'rgba(40,80,30,0.2)';
    ctx.beginPath(); ctx.ellipse(120, floorY + 15, 25, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(35,70,25,0.15)';
    ctx.beginPath(); ctx.ellipse(280, floorY + 40, 18, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Damp puddle
    ctx.fillStyle = 'rgba(30,60,40,0.25)';
    ctx.beginPath(); ctx.ellipse(200, floorY + 30, 30, 5, 0, 0, Math.PI * 2); ctx.fill();

    // === LEAKING OVERHEAD PIPES ===
    const pipeColors = ['#666','#777','#555','#6a6a6a'];
    for(let p = 0; p < 4; p++) {
        const py = 35 + p * 25;
        ctx.fillStyle = pipeColors[p % 4];
        ctx.fillRect(-GX, py, CANVAS_W, 8);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(-GX, py, CANVAS_W, 2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(-GX, py + 6, CANVAS_W, 2);
        // Rust patches
        ctx.fillStyle = 'rgba(139,90,43,0.35)';
        ctx.fillRect(100 + p * 150, py + 1, 20, 5);
        ctx.fillRect(400 + p * 60, py + 2, 15, 4);
    }
    // Dripping water from pipes
    for(let d = 0; d < 3; d++) {
        const dripPhase = ((t / 800 + d * 0.33) % 1);
        const dx = 150 + d * 200;
        const dy = 60 + dripPhase * (floorY - 70);
        if(dripPhase < 0.9) {
            ctx.fillStyle = `rgba(100,180,120,${0.5 * (1 - dripPhase)})`;
            ctx.beginPath();
            ctx.ellipse(dx, dy, 1.5, 3, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // === RUSTY PIPE STACKS (derelict, piled against left wall) ===
    const pileX = 60, pileY = 376; // bottom circle (r=10,y+14) reaches y=400 (floor)
    // Stack of old rusty pipes — cross-section view (circles)
    const pipeStack = [
        {x:0,y:0,r:10},{x:18,y:-3,r:9},{x:8,y:-16,r:8},
        {x:-12,y:-10,r:10},{x:25,y:-14,r:7},{x:-5,y:14,r:9},
        {x:15,y:12,r:8},{x:30,y:5,r:7},{x:-15,y:8,r:6}
    ];
    for(let p of pipeStack) {
        // Outer pipe (rusty)
        ctx.fillStyle = `rgb(${120 + p.r * 3},${70 + p.r * 2},${30 + p.r})`;
        ctx.beginPath(); ctx.arc(pileX + p.x, pileY + p.y, p.r, 0, Math.PI * 2); ctx.fill();
        // Inner bore (dark)
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath(); ctx.arc(pileX + p.x, pileY + p.y, p.r * 0.55, 0, Math.PI * 2); ctx.fill();
        // Rust streaks
        ctx.strokeStyle = 'rgba(160,80,20,0.4)';
        ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.arc(pileX + p.x + 1, pileY + p.y - 1, p.r * 0.75, 0.5, 2.5); ctx.stroke();
    }
    // Floor shadow under pipe pile
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(pileX + 10, pileY + 22, 35, 5, 0, 0, Math.PI * 2); ctx.fill();

    // === STORAGE CRATES ===
    const crateLabels = ['IRS', 'BRANDED\nASSETS', 'UNIFORMS', 'X-MAS\nPARTY'];
    const cratePositions = [
        {x: 220, y: 355, w: 55, h: 45}, // bottom at 400 (floor)
        {x: 290, y: 350, w: 50, h: 50}, // bottom at 400
        {x: 240, y: 308, w: 48, h: 42}, // stacked on top of first crate (y=355-42=313, close)
        {x: 360, y: 355, w: 52, h: 45}  // bottom at 400
    ];
    for(let ci = 0; ci < cratePositions.length; ci++) {
        const cr = cratePositions[ci];
        // Wooden crate body
        ctx.fillStyle = '#6a5a3a';
        ctx.fillRect(cr.x, cr.y, cr.w, cr.h);
        // Side shading
        ctx.fillStyle = '#5a4a2a';
        ctx.fillRect(cr.x + cr.w - 6, cr.y, 6, cr.h);
        // Top edge highlight
        ctx.fillStyle = '#7a6a4a';
        ctx.fillRect(cr.x, cr.y, cr.w, 3);
        // Plank lines
        ctx.strokeStyle = '#4a3a1a';
        ctx.lineWidth = 0.8;
        for(let pl = 1; pl < 3; pl++) {
            ctx.beginPath();
            ctx.moveTo(cr.x, cr.y + pl * (cr.h / 3));
            ctx.lineTo(cr.x + cr.w, cr.y + pl * (cr.h / 3));
            ctx.stroke();
        }
        // Corner metal brackets
        ctx.fillStyle = '#555';
        ctx.fillRect(cr.x, cr.y, 6, 6);
        ctx.fillRect(cr.x + cr.w - 6, cr.y, 6, 6);
        ctx.fillRect(cr.x, cr.y + cr.h - 6, 6, 6);
        ctx.fillRect(cr.x + cr.w - 6, cr.y + cr.h - 6, 6, 6);
        // Label (stenciled text)
        ctx.fillStyle = '#222';
        ctx.fillRect(cr.x + 6, cr.y + cr.h * 0.25, cr.w - 12, cr.h * 0.5);
        ctx.fillStyle = '#c8b888';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        const lines = crateLabels[ci].split('\n');
        for(let li = 0; li < lines.length; li++) {
            ctx.fillText(lines[li], cr.x + cr.w / 2, cr.y + cr.h * 0.45 + li * 10);
        }
    }

    // === CRUDE MACHINERY — old pipe threading machine ===
    const machX = 500, machY = 377; // base platform (machY+23) sits at floor y=400
    // Base platform
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(machX - 30, machY + 15, 60, 8);
    // Machine body (cast iron)
    ctx.fillStyle = '#555';
    ctx.fillRect(machX - 22, machY - 10, 44, 28);
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(machX - 18, machY - 5, 36, 18);
    // Pipe chuck (circular)
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.arc(machX, machY + 2, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.arc(machX, machY + 2, 7, 0, Math.PI * 2); ctx.fill();
    // Handle/lever
    ctx.fillStyle = '#777';
    ctx.fillRect(machX + 18, machY - 20, 4, 25);
    ctx.fillStyle = '#cc3322';
    ctx.beginPath(); ctx.arc(machX + 20, machY - 22, 5, 0, Math.PI * 2); ctx.fill();

    // === INDUSTRIAL FLOOR SCRUBBER/WASHER (parked) ===
    const fwX = 580, fwY = 388; // wheels (fwY+8+r=4) reach y=400 (floor)
    // Body — yellow/orange industrial
    ctx.fillStyle = '#d4940a';
    ctx.fillRect(fwX - 20, fwY - 15, 40, 22);
    // Scrub deck (front)
    ctx.fillStyle = '#888';
    ctx.fillRect(fwX - 25, fwY + 5, 50, 6);
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.ellipse(fwX, fwY + 10, 22, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Handle bar
    ctx.fillStyle = '#555';
    ctx.fillRect(fwX - 2, fwY - 35, 4, 22);
    ctx.fillStyle = '#333';
    ctx.fillRect(fwX - 10, fwY - 38, 20, 5);
    // Wheels
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(fwX - 15, fwY + 8, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(fwX + 15, fwY + 8, 4, 0, Math.PI * 2); ctx.fill();
    // Water tank (translucent)
    ctx.fillStyle = 'rgba(100,150,200,0.3)';
    ctx.fillRect(fwX - 12, fwY - 12, 24, 14);
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(fwX - 12, fwY - 12, 24, 14);

    // === SINGLE DIM LIGHT FIXTURE ===
    const lightX = 350, lightY = 25;
    ctx.fillStyle = '#444';
    ctx.fillRect(lightX - 20, lightY, 40, 6);
    ctx.fillStyle = 'rgba(200,180,120,0.5)';
    ctx.fillRect(lightX - 15, lightY + 6, 30, 3);
    // Dim light cone
    ctx.fillStyle = 'rgba(200,180,120,0.04)';
    ctx.beginPath();
    ctx.moveTo(lightX - 15, lightY + 9);
    ctx.lineTo(lightX - 60, floorY);
    ctx.lineTo(lightX + 60, floorY);
    ctx.lineTo(lightX + 15, lightY + 9);
    ctx.closePath();
    ctx.fill();

    // === DIRECTION PROMPTS ===
    if(player.x < 40) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(10, 350, 120, 20);
        ctx.fillStyle = '#ff6666';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('\u2190 UNDERBELLY', 70, 364);
    }
    if(player.x > 620) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(580, 350, 120, 20);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SMARTWARE \u2192', 640, 364);
    }

    // Atmosphere text
    ctx.fillStyle = 'rgba(120,110,90,0.4)';
    ctx.font = 'italic 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('The air gets heavier...', 350, 160);
}

function drawLevel6Underbelly() {
    const t = Date.now();
    // Flickering overhead light effect
    const flicker = level6.underbellyFlicker;
    const baseDim = flicker > 0 ? 0.3 + Math.random() * 0.4 : 1;
    const dimFactor = baseDim;

    // Dark grimy concrete walls
    ctx.fillStyle = `rgb(${Math.floor(35 * dimFactor)},${Math.floor(30 * dimFactor)},${Math.floor(28 * dimFactor)})`;
    ctx.fillRect(-GX, -GY, CANVAS_W, CANVAS_H);

    // Water stain streaks on walls
    for(let i = 0; i < 8; i++) {
        const sx = 60 + i * 85;
        ctx.fillStyle = `rgba(20,35,20,${0.3 * dimFactor})`;
        ctx.fillRect(sx, 30 + i * 7, 3, 180 + i * 20);
        ctx.fillStyle = `rgba(15,30,15,${0.15 * dimFactor})`;
        ctx.fillRect(sx + 3, 50 + i * 12, 5, 160 + i * 15);
    }

    // Cobblestone floor — crude, uneven stones defining the floor area
    ctx.fillStyle = `rgb(${Math.floor(30 * dimFactor)},${Math.floor(26 * dimFactor)},${Math.floor(22 * dimFactor)})`;
    ctx.fillRect(-GX, 400, CANVAS_W, CANVAS_H);
    // Cobblestone pattern — irregular stones
    for(let row = 0; row < 4; row++) {
        for(let col = -2; col < 22; col++) {
            const stoneW = 28 + (col * 13 + row * 7) % 10;
            const stoneH = 20 + (col * 11 + row * 5) % 8;
            const sx = col * 34 + (row % 2) * 17 - 10;
            const sy = 400 + row * 24 + 2;
            // Stone outline
            ctx.strokeStyle = `rgba(${Math.floor(18 * dimFactor)},${Math.floor(16 * dimFactor)},${Math.floor(14 * dimFactor)},0.8)`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(sx, sy, stoneW, stoneH, 3);
            ctx.stroke();
            // Individual stone shading — slight variation
            const shade = (col * 17 + row * 23) % 12;
            ctx.fillStyle = `rgba(${35 + shade},${30 + shade},${25 + shade},${0.15 * dimFactor})`;
            ctx.fill();
        }
    }
    // Mortar/grout between stones
    ctx.fillStyle = `rgba(15,12,10,${0.3 * dimFactor})`;
    ctx.fillRect(-GX, 400, CANVAS_W, 1.5);
    // Damp puddles (greenish) in stone gaps
    ctx.fillStyle = `rgba(30,80,30,${0.25 * dimFactor})`;
    ctx.beginPath(); ctx.ellipse(200, 412, 30, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(40,90,20,${0.2 * dimFactor})`;
    ctx.beginPath(); ctx.ellipse(480, 415, 22, 3, 0, 0, Math.PI * 2); ctx.fill();
    // Mold in corner crevices
    ctx.fillStyle = `rgba(30,60,20,${0.2 * dimFactor})`;
    ctx.beginPath(); ctx.ellipse(100, 420, 15, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(600, 425, 20, 3, 0, 0, Math.PI * 2); ctx.fill();

    // === LEAKY OVERHEAD PIPES (running horizontally across ceiling) ===
    const pipeColors = ['#666','#777','#555'];
    for(let p = 0; p < 3; p++) {
        const py = 40 + p * 28;
        ctx.fillStyle = pipeColors[p];
        ctx.fillRect(-GX, py, CANVAS_W, 10);
        // Pipe highlight
        ctx.fillStyle = `rgba(255,255,255,${0.15 * dimFactor})`;
        ctx.fillRect(-GX, py, CANVAS_W, 3);
        // Pipe shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-GX, py + 8, CANVAS_W, 2);
        // Rust patches
        ctx.fillStyle = `rgba(139,90,43,${0.4 * dimFactor})`;
        ctx.fillRect(120 + p * 180, py + 2, 25, 6);
        ctx.fillRect(350 + p * 90, py + 1, 18, 7);
    }
    // Dripping water from pipes
    const drips = level6.barrelDrip.drips;
    for(let d = drips.length - 1; d >= 0; d--) {
        const drip = drips[d];
        drip.y += drip.speed;
        if(drip.y > 410) { drips.splice(d, 1); continue; }
        ctx.fillStyle = `rgba(100,180,100,${0.6 * dimFactor})`;
        ctx.beginPath();
        ctx.ellipse(drip.x, drip.y, 1.5, 3, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    // Spawn new drips
    if(t - level6.barrelDrip.lastDrip > 400) {
        level6.barrelDrip.lastDrip = t;
        const drpX = [155, 340, 520, 250, 450][Math.floor(Math.random() * 5)];
        drips.push({ x: drpX + Math.random() * 10 - 5, y: 50 + Math.random() * 40, speed: 1 + Math.random() * 1.5 });
    }

    // === FAULTY FLICKERING LIGHT (center ceiling) ===
    const lightX = 350, lightY = 25;
    // Light fixture housing
    ctx.fillStyle = '#444';
    ctx.fillRect(lightX - 30, lightY, 60, 8);
    // Fluorescent tube
    if(flicker <= 0 || Math.random() > 0.3) {
        ctx.fillStyle = `rgba(255,255,200,${0.8 * dimFactor})`;
        ctx.fillRect(lightX - 25, lightY + 8, 50, 4);
        // Light cone
        ctx.fillStyle = `rgba(255,255,200,${0.06 * dimFactor})`;
        ctx.beginPath();
        ctx.moveTo(lightX - 25, lightY + 12);
        ctx.lineTo(lightX - 80, 400);
        ctx.lineTo(lightX + 80, 400);
        ctx.lineTo(lightX + 25, lightY + 12);
        ctx.closePath();
        ctx.fill();
    } else {
        // Off state — dark tube
        ctx.fillStyle = '#333';
        ctx.fillRect(lightX - 25, lightY + 8, 50, 4);
    }

    // === RADIOACTIVE BARREL (right-center) — glowing, leaking ===
    const brlX = 520, brlY = 355; // bottom (brlY+45=400) sits on floor
    // Barrel glow — larger, brighter radial
    const glowPulse = 0.5 + Math.sin(t / 600) * 0.3;
    const barrelGlow = ctx.createRadialGradient(brlX, brlY, 15, brlX, brlY, 120);
    barrelGlow.addColorStop(0, `rgba(0,255,50,${glowPulse * 0.5 * dimFactor})`);
    barrelGlow.addColorStop(0.5, `rgba(0,255,50,${glowPulse * 0.2 * dimFactor})`);
    barrelGlow.addColorStop(1, 'rgba(0,255,50,0)');
    ctx.fillStyle = barrelGlow;
    ctx.beginPath(); ctx.arc(brlX, brlY, 120, 0, Math.PI * 2); ctx.fill();
    // Barrel body — larger, rusty yellow with dents
    ctx.fillStyle = '#c8a010';
    ctx.beginPath();
    ctx.ellipse(brlX, brlY - 35, 28, 6, 0, 0, Math.PI * 2); // top cap
    ctx.fill();
    ctx.fillStyle = '#b8960e';
    ctx.fillRect(brlX - 26, brlY - 35, 52, 80);
    // Barrel bands — thicker
    ctx.fillStyle = '#8a7008';
    ctx.fillRect(brlX - 28, brlY - 37, 56, 6);
    ctx.fillRect(brlX - 28, brlY + 39, 56, 6);
    ctx.fillRect(brlX - 27, brlY - 2, 54, 5);
    // Barrel body shading (cylindrical look)
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(brlX - 20, brlY - 30, 10, 68);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(brlX + 14, brlY - 30, 10, 68);
    // Dent marks
    ctx.strokeStyle = 'rgba(100,80,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(brlX + 8, brlY + 15, 6, 0.3, 2.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(brlX - 12, brlY + 25, 4, 1, 3.5); ctx.stroke();
    // Radiation trefoil symbol — larger, more visible
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(brlX, brlY - 10, 16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd700';
    for(let s = 0; s < 3; s++) {
        const angle = s * (Math.PI * 2 / 3) - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(brlX, brlY - 10);
        ctx.arc(brlX, brlY - 10, 14, angle - 0.4, angle + 0.4);
        ctx.closePath();
        ctx.fill();
    }
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(brlX, brlY - 10, 5, 0, Math.PI * 2); ctx.fill();
    // "RADIOACTIVE" label on barrel
    ctx.fillStyle = `rgba(255,215,0,${0.7 + Math.sin(t / 400) * 0.2})`;
    ctx.font = 'bold 7px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('RADIOACTIVE', brlX, brlY + 28);

    // Neon sludge — drips from barrel side above floor, pools and flows along floor to drain
    const sludgeStream = Math.sin(t / 200) * 1.5;
    const sewX2 = brlX + 55; // drain x position
    // Drip stream from barrel side (above floor, visible)
    ctx.fillStyle = `rgba(0,255,80,${0.85 + Math.sin(t / 300) * 0.15})`;
    ctx.fillRect(brlX - 20 + sludgeStream, brlY - 10, 5, 14); // from barrel side, above floor
    // Drip blob landing on floor
    ctx.beginPath();
    ctx.ellipse(brlX - 18 + sludgeStream, 400, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Floor puddle at barrel base — at y=400
    const poolPulse = 0.6 + Math.sin(t / 800) * 0.15;
    ctx.fillStyle = `rgba(0,255,80,${poolPulse * 0.75})`;
    ctx.beginPath(); ctx.ellipse(brlX - 10, 400, 22, 5, 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(0,255,80,${poolPulse * 0.5})`;
    ctx.beginPath(); ctx.ellipse(brlX + 8, 400, 18, 4, 0.2, 0, Math.PI * 2); ctx.fill();
    // Sludge river flowing along floor surface toward drain
    ctx.strokeStyle = `rgba(0,255,80,${0.65 + Math.sin(t / 500) * 0.2})`;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(brlX + 20, 399);
    ctx.quadraticCurveTo(brlX + 38, 397, sewX2 - 5, 400);
    ctx.stroke();
    // Bright inner core
    ctx.strokeStyle = `rgba(100,255,150,${0.45 + Math.sin(t / 350) * 0.15})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(brlX + 20, 399);
    ctx.quadraticCurveTo(brlX + 38, 397, sewX2 - 5, 400);
    ctx.stroke();

    // === FLOOR DRAIN (ground, right of barrel) — toxic sludge pouring in ===
    const sewX = brlX + 55, sewY = 400;
    // Drain surround — recessed concrete ring
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(sewX, sewY, 30, 10, 0, 0, Math.PI * 2); ctx.fill();
    // Drain grate — circular manhole with visible grate pattern
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath(); ctx.ellipse(sewX, sewY, 24, 8, 0, 0, Math.PI * 2); ctx.fill();
    // Grate lines — thicker, more visible
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2.5;
    for(let g = -3; g <= 3; g++) {
        ctx.beginPath();
        ctx.moveTo(sewX + g * 6, sewY - 6);
        ctx.lineTo(sewX + g * 6, sewY + 6);
        ctx.stroke();
    }
    // Cross bars
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(sewX - 22, sewY); ctx.lineTo(sewX + 22, sewY); ctx.stroke();
    // Neon glow seeping up from drain — brighter, larger
    const sewerGlow = 0.4 + Math.sin(t / 700) * 0.25;
    ctx.fillStyle = `rgba(0,255,80,${sewerGlow * dimFactor})`;
    ctx.beginPath(); ctx.ellipse(sewX, sewY, 26, 9, 0, 0, Math.PI * 2); ctx.fill();
    // Bright inner glow
    ctx.fillStyle = `rgba(100,255,150,${sewerGlow * 0.5 * dimFactor})`;
    ctx.beginPath(); ctx.ellipse(sewX, sewY, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Steam/vapor wisps from drain — taller, more visible
    for(let v = 0; v < 5; v++) {
        const vx = sewX - 12 + v * 6 + Math.sin(t / 400 + v * 2) * 6;
        const vy = sewY - 12 - v * 10 - Math.sin(t / 300 + v) * 5;
        ctx.fillStyle = `rgba(0,220,70,${(0.25 - v * 0.04) * dimFactor})`;
        ctx.beginPath(); ctx.arc(vx, vy, 5 + v * 2.5, 0, Math.PI * 2); ctx.fill();
    }
    // "DRAIN" label etched into floor
    ctx.fillStyle = `rgba(80,80,70,${0.5 * dimFactor})`;
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('DRAIN', sewX, sewY + 18);

    // === INDUSTRIAL DUMPSTER labeled "PM WASTE" (left side) — larger, more prominent ===
    const dmpX = 110, dmpY = 340; // wheels (dmpY+53+7=400) sit on floor
    // Dumpster body — larger, brighter green industrial
    ctx.fillStyle = '#3a6a3a';
    ctx.fillRect(dmpX - 50, dmpY - 25, 100, 75);
    // Body side shading
    ctx.fillStyle = '#2a5a2a';
    ctx.fillRect(dmpX + 30, dmpY - 25, 20, 75);
    // Dumpster lid — slightly open, visible hinge
    ctx.fillStyle = '#2e5e2e';
    ctx.fillRect(dmpX - 52, dmpY - 30, 104, 8);
    // Lid slightly ajar (rotated) — more visible opening
    ctx.save();
    ctx.translate(dmpX - 52, dmpY - 30);
    ctx.rotate(-0.2);
    ctx.fillStyle = '#2e5e2e';
    ctx.fillRect(0, -6, 104, 7);
    ctx.restore();
    // Dumpster ridges — vertical corrugations
    ctx.strokeStyle = '#285828';
    ctx.lineWidth = 2;
    for(let r = 0; r < 4; r++) {
        ctx.beginPath();
        ctx.moveTo(dmpX - 45 + r * 24, dmpY - 20);
        ctx.lineTo(dmpX - 45 + r * 24, dmpY + 45);
        ctx.stroke();
    }
    // Horizontal band
    ctx.strokeStyle = '#1e4e1e';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(dmpX - 50, dmpY + 10); ctx.lineTo(dmpX + 50, dmpY + 10); ctx.stroke();
    // Dumpster wheels — larger

    ctx.fillRect(dmpX - 38, dmpY - 30, 5, 12);

    ctx.fillStyle = 'rgba(180,100,110,0.7)';
    ctx.beginPath(); ctx.ellipse(dmpX + 5, dmpY - 40, 6, 4, -0.2, 0, Math.PI * 2); ctx.fill();
    // Umbilical-like tubing

    ctx.beginPath();
    ctx.moveTo(dmpX - 10, dmpY - 34);

    ctx.beginPath(); ctx.ellipse(dmpX, dmpY + 58, 45, 5, 0, 0, Math.PI * 2); ctx.fill();

    // === MUTANT PM IN CAGE (center) — overgrown, red jumpsuit, disgruntled ===
    const pm = level6.mutantPM;

    const pmShakeX = shake > 0 ? (Math.random() - 0.5) * shake : 0;
    const pmShakeY = shake > 0 ? (Math.random() - 0.5) * shake * 0.5 : 0;

    // Cage — industrial steel bars

    ctx.fillRect(mx - 14, my - 32 + breathe, 28, 5);

    ctx.fillRect(mx + 10, my - 20 + breathe, 8, 6);
    ctx.fillStyle = '#333';
    ctx.font = '4px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PT', mx + 14, my - 15 + breathe);

    // Head — oversized, angry
    ctx.fillStyle = '#c4a882';
    ctx.fillRect(mx - 14, my - 55 + breathe, 28, 26);
    // Bulging forehead
    ctx.fillStyle = '#b89a72';
    ctx.fillRect(mx - 16, my - 58 + breathe, 32, 10);
    // Angry eyes — red-rimmed
    ctx.fillStyle = '#600';
    ctx.fillRect(mx - 10, my - 48 + breathe, 7, 6);
    ctx.fillRect(mx + 3, my - 48 + breathe, 7, 6);
    ctx.fillStyle = '#ff3300';
    ctx.fillRect(mx - 8, my - 46 + breathe, 4, 3);
    ctx.fillRect(mx + 5, my - 46 + breathe, 4, 3);
    // Pupils — darting
    const pupilOffset = Math.sin(t / 1200) * 2;
    ctx.fillStyle = '#000';
    ctx.fillRect(mx - 7 + pupilOffset, my - 45 + breathe, 2, 2);
    ctx.fillRect(mx + 6 + pupilOffset, my - 45 + breathe, 2, 2);
    // Angry thick eyebrows

    ctx.fillRect(mx - 11, my - 52 + breathe, 9, 3);
    ctx.fillRect(mx + 2, my - 52 + breathe, 9, 3);
    // Gritted teeth / snarl
    ctx.fillStyle = '#ddd';
    ctx.fillRect(mx - 6, my - 36 + breathe, 12, 4);
    ctx.fillStyle = '#333';
    for(let tooth = 0; tooth < 4; tooth++) {
        ctx.fillRect(mx - 5 + tooth * 3, my - 36 + breathe, 1, 4);
    }
    // Veins on temple
    ctx.strokeStyle = `rgba(180,0,0,${0.4 + Math.sin(t / 400) * 0.2})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mx - 14, my - 52 + breathe);
    ctx.lineTo(mx - 18, my - 48 + breathe);
    ctx.lineTo(mx - 16, my - 42 + breathe);
    ctx.stroke();

    // Oversized arms gripping cage bars
    // Left arm
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(mx - 30, my - 25 + breathe, 10, 30);
    ctx.fillStyle = '#c4a882';
    ctx.fillRect(mx - 32, my + 2 + breathe, 10, 12);
    // Right arm
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(mx + 20, my - 25 + breathe, 10, 30);
    ctx.fillStyle = '#c4a882';
    ctx.fillRect(mx + 22, my + 2 + breathe, 10, 12);

    // Legs — thick, hunched posture
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(mx - 16, my + 20 + breathe, 14, 24);
    ctx.fillRect(mx + 2, my + 20 + breathe, 14, 24);
    // Heavy boots
    ctx.fillStyle = '#333';
    ctx.fillRect(mx - 18, my + 42 + breathe, 16, 6);
    ctx.fillRect(mx + 2, my + 42 + breathe, 16, 6);

    // Cage bars (front, drawn over PM)
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 4;

        ctx.lineTo(barX, cageY + cageH);

    // Horizontal cage bars
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cageX, cageY + 20); ctx.lineTo(cageX + cageW, cageY + 20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cageX, cageY + cageH - 20); ctx.lineTo(cageX + cageW, cageY + cageH - 20); ctx.stroke();
    // Cage top
    ctx.fillStyle = '#555';
    ctx.fillRect(cageX - 3, cageY - 5, cageW + 6, 8);
    // Padlock on cage
    ctx.fillStyle = '#b8960e';
    ctx.fillRect(cageX + cageW / 2 - 5, cageY + cageH - 3, 10, 12);
    ctx.fillStyle = '#8a7008';
    ctx.beginPath();
    ctx.arc(cageX + cageW / 2, cageY + cageH - 3, 6, Math.PI, 0);
    ctx.stroke();
    // "DANGER" sign on cage
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(cageX + cageW + 5, cageY + 30, 40, 18);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('DANGER', cageX + cageW + 25, cageY + 42);
    ctx.fillStyle = '#ffcc00';
    ctx.font = '7px Arial';
    ctx.fillText('DO NOT FEED', cageX + cageW + 25, cageY + 55);

    // PM rage shake — intermittent
    if(Math.random() < 0.005 && pm.shakeIntensity === 0) {
        pm.shakeIntensity = 6;
        pm.aggroTimer = t;
    }
    if(pm.shakeIntensity > 0 && t - pm.aggroTimer > 1500) {
        pm.shakeIntensity = 0;
    }

    // === DIRECTION PROMPTS ===
    if(player.x > 620) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(580, 310, 120, 20);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('HALLWAY \u2192', 640, 326);
    }

    // Ambient text — gritty atmosphere
    ctx.fillStyle = `rgba(100,100,80,${0.4 * dimFactor})`;
    ctx.font = 'italic 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Something drips... something growls...', 350, 140);
}
