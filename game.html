        ctx.fillRect(x + s, y + 12*s, 4*s, 8*s);

        ctx.fillStyle = '#000';
        const legR = Math.sin(frame * 0.25) * 5;
        ctx.fillRect(x - 5*s, y + 20*s + legR, 4*s, 2*s);
        ctx.fillRect(x + s, y + 20*s - legR, 4*s, 2*s);

    } else {
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 5*s, y - 12*s, 10*s, 10*s);
        ctx.fillStyle = '#e8d4b8';
        ctx.fillRect(x - 5*s, y - 12*s, 10*s, 3*s);

        ctx.fillStyle = '#000';
        ctx.fillRect(x - 3*s, y - 9*s, 2*s, 2*s);
        ctx.fillRect(x + s, y - 9*s, 2*s, 2*s);
        ctx.fillRect(x - 2*s, y - 5*s, 4*s, s);

        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 7*s, y - 2*s, 14*s, 10*s);
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(x - 7*s, y - 2*s, 2*s, 10*s);

        ctx.fillStyle = '#800020';
        ctx.fillRect(x - 2*s, y - 2*s, 4*s, 10*s);

        // Arms - raised if holding, extended if hasGun, otherwise hanging
        ctx.fillStyle = '#fff';
        if(holding) {
            // Raised arms to carry doc
            ctx.fillRect(x - 9*s, y - 14*s, 2*s, 14*s);
            ctx.fillRect(x + 7*s, y - 14*s, 2*s, 14*s);
            // Hands at doc level
            ctx.fillStyle = skinColor;
            ctx.fillRect(x - 9*s, y - 16*s, 2*s, 2*s);
            ctx.fillRect(x + 7*s, y - 16*s, 2*s, 2*s);
        } else if(hasGun) {
            // Gun-holding: hide right arm (will be drawn by gun function), show left arm hanging
            ctx.fillRect(x - 9*s, y, 2*s, 7*s);
            ctx.fillStyle = skinColor;
            ctx.fillRect(x - 9*s, y + 6*s, 2*s, 2*s);
        } else {
            // Normal hanging arms
            ctx.fillRect(x - 9*s, y, 2*s, 7*s);
            ctx.fillRect(x + 7*s, y, 2*s, 7*s);
            ctx.fillStyle = skinColor;
            ctx.fillRect(x - 9*s, y + 6*s, 2*s, 2*s);
            ctx.fillRect(x + 7*s, y + 6*s, 2*s, 2*s);
        }

        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x - 7*s, y + 8*s, 14*s, 4*s);
        ctx.fillRect(x - 5*s, y + 12*s, 4*s, 8*s);
        ctx.fillRect(x + s, y + 12*s, 4*s, 8*s);

        ctx.fillStyle = '#000';
        const leg = Math.sin(frame * 0.25) * 5;
        ctx.fillRect(x - 5*s, y + 20*s + leg, 4*s, 2*s);
        ctx.fillRect(x + s, y + 20*s - leg, 4*s, 2*s);
    }

    // === DETECTIVE FEDORA HAT — drawn on top when wearing ===
    if(typeof level6 !== 'undefined' && level6.hasDetectiveHat) {
        const hatTopY = y - 13*s; // Just above bald head
        // Hat brim — wide dark gray ellipse
        ctx.fillStyle = '#3a3a3a';
        ctx.beginPath();
        ctx.ellipse(x, hatTopY + 2, 14, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Hat crown — pinched fedora shape
        ctx.fillStyle = '#2a2a2a';
        ctx.beginPath();
        ctx.moveTo(x - 9, hatTopY);
        ctx.lineTo(x - 5, hatTopY - 8);
        ctx.lineTo(x - 1, hatTopY - 5);
        ctx.lineTo(x + 1, hatTopY - 5);
        ctx.lineTo(x + 5, hatTopY - 8);
        ctx.lineTo(x + 9, hatTopY);
        ctx.closePath();
        ctx.fill();
        // Hat band
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(x - 8, hatTopY - 1, 16, 2);
    }
}

// Draw pipe manager from back - colored jumpsuit with white sneakers
function drawPipeManagerBack(x, y, color, animOffset) {
    const s = 2;

    // Shadow — at foot level (y+44 = sole bottom)
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + 44, 10, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sprite outline — dark drop shadow so NPC doesn't blend into wall
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.75)';
    ctx.shadowBlur = 2;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;

    // Hood (back of head) - colored
    ctx.fillStyle = color.hex;
    ctx.fillRect(x - 5*s, y - 12*s, 10*s, 10*s);

    // Hood shadow/depth at top
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x - 5*s, y - 12*s, 10*s, 2*s);

    // Colored jumpsuit torso
    ctx.fillStyle = color.hex;
    ctx.fillRect(x - 7*s, y - 2*s, 14*s, 10*s);

    // Darker stripe down center (back seam)
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x - s, y - 2*s, 2*s, 10*s);

    // Arms - animated turning motion
    const armSwing = Math.sin(animOffset) * 3;

    // Left arm
    ctx.fillStyle = color.hex;
    ctx.fillRect(x - 9*s, y + armSwing, 2*s, 7*s);
    // Left hand/glove
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x - 9*s, y + 6*s + armSwing, 2*s, 2*s);

    // Right arm
    ctx.fillStyle = color.hex;
    ctx.fillRect(x + 7*s, y - armSwing, 2*s, 7*s);
    // Right hand/glove
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x + 7*s, y + 6*s - armSwing, 2*s, 2*s);

    // Pants (darker shade of jumpsuit color) with walking leg animation
    const legSwing = Math.sin(animOffset) * 5;
    ctx.fillStyle = color.hex;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(x - 7*s, y + 8*s, 14*s, 4*s);
    ctx.fillRect(x - 5*s, y + 12*s + legSwing * 0.4, 4*s, 8*s);
    ctx.fillRect(x + s,   y + 12*s - legSwing * 0.4, 4*s, 8*s);
    ctx.globalAlpha = 1;

    // White sneakers (follow leg swing)
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 5*s, y + 20*s + legSwing, 4*s, 2*s);
    ctx.fillRect(x + s,   y + 20*s - legSwing, 4*s, 2*s);

    // Sneaker soles (gray)
    ctx.fillStyle = '#999';
    ctx.fillRect(x - 5*s, y + 22*s + legSwing, 4*s, 1);
    ctx.fillRect(x + s,   y + 22*s - legSwing, 4*s, 1);

    ctx.restore(); // end sprite outline shadow
}


// SECTION 7: Boss and NPC Drawing Functions
function drawBoss(x, y, facing) {
    const s = 2;

    // Shadow — at foot level (y+50 ≈ shoe bottom)
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + 50, 12, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    const skinColor = boss.angry ? '#cc0000' : '#f5c89a';
    
    if(facing === 'left') {
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 5*s, y - 12*s, 10*s, 10*s);
        
        ctx.fillStyle = '#000';
        if(boss.angry) {
            ctx.fillRect(x - 2*s, y - 10*s, 3*s, s);
            ctx.fillRect(x - 2*s, y - 9*s, 2*s, 2*s);
            ctx.fillRect(x - 2*s, y - 6*s, 2*s, s);
        } else {
            ctx.fillRect(x - 2*s, y - 9*s, 2*s, 2*s);
            ctx.fillRect(x - 3*s, y - 6*s, 3*s, s);
        }
        
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 2*s, y - 2*s, 4*s, 3*s);
        
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 7*s, y + s, 14*s, 11*s);
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(x + 5*s, y + s, 2*s, 11*s);
        
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x - 2*s, y + s, 4*s, 11*s);
        
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 9*s, y + 2*s, 2*s, 7*s);
        ctx.fillRect(x + 7*s, y + 2*s, 2*s, 7*s);
        
        ctx.fillStyle = '#2b2b2b';
        ctx.fillRect(x - 7*s, y + 12*s, 14*s, 4*s);
        ctx.fillRect(x - 5*s, y + 16*s, 4*s, 8*s);
        ctx.fillRect(x + s, y + 16*s, 4*s, 8*s);
        
        ctx.fillStyle = '#1a1a1a';
        const legL = boss.walking ? Math.sin(frame * 0.25) * 5 : 0;
        ctx.fillRect(x - 5*s, y + 24*s + legL, 4*s, 2*s);
        ctx.fillRect(x + s, y + 24*s - legL, 4*s, 2*s);
        
    } else if(facing === 'right') {
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 5*s, y - 12*s, 10*s, 10*s);
        
        ctx.fillStyle = '#000';
        if(boss.angry) {
            ctx.fillRect(x - s, y - 10*s, 3*s, s);
            ctx.fillRect(x, y - 9*s, 2*s, 2*s);
            ctx.fillRect(x, y - 6*s, 2*s, s);
        } else {
            ctx.fillRect(x, y - 9*s, 2*s, 2*s);
            ctx.fillRect(x, y - 6*s, 3*s, s);
        }
        
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 2*s, y - 2*s, 4*s, 3*s);
        
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 7*s, y + s, 14*s, 11*s);
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(x - 7*s, y + s, 2*s, 11*s);
        
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x - 2*s, y + s, 4*s, 11*s);
        
        ctx.fillStyle = skinColor;
        ctx.fillRect(x - 9*s, y + 2*s, 2*s, 7*s);
        ctx.fillRect(x + 7*s, y + 2*s, 2*s, 7*s);
        
        ctx.fillStyle = '#2b2b2b';
        ctx.fillRect(x - 7*s, y + 12*s, 14*s, 4*s);
        ctx.fillRect(x - 5*s, y + 16*s, 4*s, 8*s);
        ctx.fillRect(x + s, y + 16*s, 4*s, 8*s);
        
        ctx.fillStyle = '#1a1a1a';
        const legR = boss.walking ? Math.sin(frame * 0.25) * 5 : 0;
        ctx.fillRect(x - 5*s, y + 24*s + legR, 4*s, 2*s);
        ctx.fillRect(x + s, y + 24*s - legR, 4*s, 2*s);
    }
    
    if(boss.needsColor) {
        const col = COLORS.find(c => c.name === boss.needsColor);
        // Dynamic bubble width based on text length
        ctx.font = 'bold 18px Arial';
        const textW = ctx.measureText(col.name).width;
        const bubbleW = Math.max(60, textW + 20);
        const bubbleX = facing === 'right' ? x + 10 : x - bubbleW - 10;

        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(bubbleX, y - 55, bubbleW, 30, 8);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(bubbleX + (facing === 'right' ? 5 : bubbleW - 5), y - 25);
        ctx.lineTo(bubbleX + (facing === 'right' ? 0 : bubbleW), y - 18);
        ctx.lineTo(bubbleX + (facing === 'right' ? 15 : bubbleW - 15), y - 25);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.fillText(col.name, bubbleX + bubbleW / 2, y - 35);
    }
}

function drawNPC(npc) {
    let x = npc.x;
    let y = npc.y;
    const s = 2;

    // Pipe manager animations based on pipe stress level
    let isJumping = false;
    let isPacing = false;
    if(npc.needsDoc) {
        let pct = 0;
        // Check cracks array (levels 1-4, level 6 employee pipe room)
        const crack = cracks.find(c => c.npc === npc);
        if(crack) {
            pct = Math.min((Date.now() - crack.time) / crack.max, 1);
        }
        // Check crackStartTime (level 5)
        else if(npc.crackStartTime) {
            pct = Math.min((Date.now() - npc.crackStartTime) / 15000, 1);
        }

        if(pct >= 0.66) {
            // About to burst - jumping up and down frantically
            isJumping = true;
            y += -Math.abs(Math.sin(Date.now() / 80)) * 16;
        } else if(pct > 0) {
            // Pipe starting to swell - pacing back and forth
            isPacing = true;
            x += Math.sin(Date.now() / 250) * 12;
        }
    }

    // Animate climbing position
    const isClimbing = npc.state === 'climbing_up' || npc.state === 'climbing_down';
    if(isClimbing && npc.climbStartTime) {
        const elapsed = Date.now() - npc.climbStartTime;
        const duration = 1500; // 1.5s to climb
        const t = Math.min(elapsed / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // ease in-out
        y = npc.climbStartY + (npc.climbTargetY - npc.climbStartY) * eased;
        npc.y = y; // update actual position for ladder standing-rung calc
        if(t >= 1) {
            npc.y = npc.climbTargetY;
            if(npc.state === 'climbing_up') {
                // Reached the top — start fixing
                npc.state = 'fixing';
                npc.fixAnim = 0;
                npc.fixStartTime = Date.now();
            } else {
                // Reached the bottom — done
                npc.state = 'happy';
            }
        }
        x = npc.x;
    }

    // Shadow stays on ground (uses npc.x, not animated x)
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(npc.x, 400 - 2, 10, 3, 0, 0, Math.PI * 2); // always at floor
    ctx.fill();

    // Sprite outline — dark drop shadow on all parts so NPCs don't blend into walls
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.75)';
    ctx.shadowBlur = 2;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;

    // Draw wrench BEHIND the PM (on the pipe) before drawing sprite
    if(npc.state === 'fixing') {
        // Animate fix timer and trigger climb-down when done
        if(npc.fixStartTime) {
            npc.fixAnim += 0.02;
            const fixElapsed = Date.now() - npc.fixStartTime;
            if(fixElapsed >= 2000) {
                cracks = cracks.filter(c => c.npc !== npc);
                npc.state = 'climbing_down';
                npc.climbStartTime = Date.now();
                npc.climbStartY = npc.y;
                npc.climbTargetY = npc.groundY || 368;
            }
        }
        // Pipe wrench clamped on the pipe — handle sticks out with strong rocking motion
        const wrenchX = npc.x;
        const wrenchY = y - 2;
        const rock = Math.sin(npc.fixAnim * 5) * 0.45; // big visible rock
        ctx.save();
        ctx.translate(wrenchX, wrenchY);
        ctx.rotate(rock);
        // Thick bright-red handle (wider for visibility)
        ctx.fillStyle = '#e03020';
        ctx.beginPath();
        ctx.moveTo(4, -5);
        ctx.lineTo(56, -3.5);
        ctx.lineTo(58, 0);
        ctx.lineTo(56, 3.5);
        ctx.lineTo(4, 5);
        ctx.closePath();
        ctx.fill();
        // Bright highlight stripe
        ctx.fillStyle = '#ff5544';
        ctx.fillRect(8, -3.5, 46, 2);
        // Grip ridges — darker for contrast
        ctx.strokeStyle = '#881100';
        ctx.lineWidth = 1.2;
        for(let r = 0; r < 10; r++) {
            const rx = 10 + r * 4.5;
            ctx.beginPath();
            ctx.moveTo(rx, -4.5);
            ctx.lineTo(rx, 4.5);
            ctx.stroke();
        }
        // End cap
        ctx.fillStyle = '#881100';
        ctx.fillRect(55, -4, 4, 8);
        // Adjustment nut at head (spins with fixAnim)
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(2, 0, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1;
        for(let k = 0; k < 6; k++) {
            const ka = (k / 6) * Math.PI * 2 + npc.fixAnim * 5;
            ctx.beginPath();
            ctx.moveTo(2 + Math.cos(ka) * 2.5, Math.sin(ka) * 2.5);
            ctx.lineTo(2 + Math.cos(ka) * 5, Math.sin(ka) * 5);
            ctx.stroke();
        }
        ctx.restore();
    }

    if(isClimbing || npc.state === 'fixing') {
        // === BACK-FACING POSE — hooded jumpsuit, facing the pipe ===
        const climbCycle = isClimbing ? Math.sin(Date.now() / 200) * 4 : 0;
        const isFix = npc.state === 'fixing';
        // Torquing motion: arms rock side-to-side when fixing
        const torque = isFix ? Math.sin(npc.fixAnim * 4) * 3 : 0;

        // Torso (back view — jumpsuit)
        ctx.fillStyle = npc.color.hex;
        ctx.fillRect(x - 6*s, y - 5*s, 12*s, 11*s);

        // Hood (same color as jumpsuit, covers head)
        ctx.fillStyle = npc.color.hex;
        ctx.beginPath();
        ctx.moveTo(x - 6*s, y - 5*s);
        ctx.lineTo(x - 5*s, y - 14*s);
        ctx.quadraticCurveTo(x, y - 17*s, x + 5*s, y - 14*s);
        ctx.lineTo(x + 6*s, y - 5*s);
        ctx.closePath();
        ctx.fill();
        // Hood seam down center back
        ctx.strokeStyle = npc.color.shadow || '#00000033';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, y - 16*s);
        ctx.lineTo(x, y - 5*s);
        ctx.stroke();

        if(isFix) {
            // Arms reaching forward toward pipe, rocking with torque
            ctx.fillStyle = npc.color.hex;
            ctx.fillRect(x - 7*s + torque, y - 4*s, 2*s, 7*s); // left arm
            ctx.fillRect(x + 5*s + torque, y - 4*s, 2*s, 7*s); // right arm
            // Hands disappear behind body (reaching into pipe)
        } else {
            // Climbing: arms alternate up/down on ladder
            ctx.fillStyle = npc.color.hex;
            ctx.fillRect(x - 8*s, y - 5*s - climbCycle, 2*s, 8*s);
            ctx.fillRect(x + 6*s, y - 5*s + climbCycle, 2*s, 8*s);
            ctx.fillStyle = '#f5c89a';
            ctx.fillRect(x - 8*s, y - 6*s - climbCycle, 2*s, 3*s);
            ctx.fillRect(x + 6*s, y - 6*s + climbCycle, 2*s, 3*s);
        }

        // Legs (jumpsuit color)
        ctx.fillStyle = npc.color.hex;
        ctx.fillRect(x - 4*s, y + 6*s + climbCycle, 4*s, 7*s);
        ctx.fillRect(x + s, y + 6*s - climbCycle, 4*s, 7*s);
        // Shoes
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 4*s, y + 13*s + climbCycle, 4*s, 3*s);
        ctx.fillRect(x + s, y + 13*s - climbCycle, 4*s, 3*s);
    } else {
        // === NORMAL FRONT-FACING SPRITE ===

        // Hood (wraps around head, connects to torso)
        ctx.fillStyle = npc.color.hex;
        ctx.beginPath();
        ctx.moveTo(x - 6*s, y - 5*s);          // left where torso starts
        ctx.lineTo(x - 6*s, y - 12*s);          // up left side
        ctx.lineTo(x - 5*s, y - 14*s);          // angle inward
        ctx.quadraticCurveTo(x, y - 17*s, x + 5*s, y - 14*s); // rounded top
        ctx.lineTo(x + 6*s, y - 12*s);          // down right side
        ctx.lineTo(x + 6*s, y - 5*s);           // right where torso starts
        ctx.closePath();
        ctx.fill();

        // Face opening (skin-colored inset)
        ctx.fillStyle = '#f5c89a';
        ctx.fillRect(x - 4*s, y - 13*s, 8*s, 8*s);

        // Face
        ctx.fillStyle = '#000';
        if(npc.state === 'stressed' && !isPacing && !isJumping) {
            ctx.fillRect(x - 3*s, y - 10*s, 2*s, 3*s);
            ctx.fillRect(x + s, y - 10*s, 2*s, 3*s);
            ctx.fillRect(x - s, y - 7*s, 2*s, s);
            ctx.fillStyle = '#f5c89a';
            ctx.fillRect(x - 8*s, y - 9*s, 3*s, 4*s);
        } else if(isPacing || isJumping) {
            // Worried face during animations (no static hand)
            ctx.fillRect(x - 3*s, y - 10*s, 2*s, 3*s);
            ctx.fillRect(x + s, y - 10*s, 2*s, 3*s);
            ctx.fillRect(x - s, y - 7*s, 2*s, s);
        } else {
            ctx.fillRect(x - 3*s, y - 10*s, 2*s, 2*s);
            ctx.fillRect(x + s, y - 10*s, 2*s, 2*s);
            ctx.fillRect(x - 2*s, y - 7*s, 4*s, s);
        }

        // Torso
        ctx.fillStyle = npc.color.hex;
        ctx.fillRect(x - 6*s, y - 5*s, 12*s, 11*s);

        if(isPacing) {
            // Pacing: arms and legs use horizontal stride offsets, stay attached to torso
            const stride = Math.sin(Date.now() / 125) * 3;
            // Arms — shift horizontally with stride, anchored to torso
            ctx.fillRect(x - 8*s + stride, y - 3*s, 2*s, 7*s);
            ctx.fillRect(x + 6*s - stride, y - 3*s, 2*s, 7*s);
            // Legs — opposite horizontal stride
            ctx.fillRect(x - 5*s - stride, y + 6*s, 4*s, 7*s);
            ctx.fillRect(x + s + stride, y + 6*s, 4*s, 7*s);
            // Shoes follow legs
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 5*s - stride, y + 13*s, 4*s, 3*s);
            ctx.fillRect(x + s + stride, y + 13*s, 4*s, 3*s);
        } else if(isJumping) {
            // Jumping: everything moves with y offset, arms raised up
            ctx.fillRect(x - 9*s, y - 6*s, 2*s, 6*s);
            ctx.fillRect(x + 7*s, y - 6*s, 2*s, 6*s);
            // Legs together underneath
            ctx.fillRect(x - 5*s, y + 6*s, 4*s, 7*s);
            ctx.fillRect(x + s, y + 6*s, 4*s, 7*s);
            // Shoes
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 5*s, y + 13*s, 4*s, 3*s);
            ctx.fillRect(x + s, y + 13*s, 4*s, 3*s);
        } else {
            // Static pose
            ctx.fillRect(x - 8*s, y - 3*s, 2*s, 7*s);
            ctx.fillRect(x + 6*s, y - 3*s, 2*s, 7*s);
            ctx.fillRect(x - 5*s, y + 6*s, 4*s, 7*s);
            ctx.fillRect(x + s, y + 6*s, 4*s, 7*s);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 5*s, y + 13*s, 4*s, 3*s);
            ctx.fillRect(x + s, y + 13*s, 4*s, 3*s);
        }
    }

    ctx.restore(); // end sprite outline shadow

    if(npc.needsDoc) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 26px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('!', x + 20, y - 26);
    }

}

// Draw industrial bay window with unique outdoor scene per PM color
function drawPipeRoomWindow(cx, wy, colorIndex) {
    const t = Date.now();
    const ww = 64, wh = 80;
    const wx = cx - ww / 2;

    // Sky gradient background
    const skyGrad = ctx.createLinearGradient(wx, wy, wx, wy + wh * 0.5);
    skyGrad.addColorStop(0, '#7ec8e3');
    skyGrad.addColorStop(1, '#b5ddf0');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(wx, wy, ww, wh);

    // Ground area (lower half of window)
    const groundY = wy + wh * 0.55;
    const groundH = wh * 0.45;

    if(colorIndex === 0) {
        // === RED: Apple tree with axe, roosting birds ===
        // Green grass ground
        ctx.fillStyle = '#4a8c3f';
        ctx.fillRect(wx, groundY, ww, groundH);
        ctx.fillStyle = '#3d7a34';
        ctx.fillRect(wx, groundY, ww, 3);

        // Tree trunk (center)
        const tx = cx, ty = groundY - 8;
        ctx.fillStyle = '#6b4226';
        ctx.fillRect(tx - 5, ty - 20, 10, 28);
        // Tree bark texture
        ctx.strokeStyle = '#5a3520';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(tx - 3, ty - 18); ctx.lineTo(tx - 2, ty + 5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx + 2, ty - 15); ctx.lineTo(tx + 3, ty + 2); ctx.stroke();

        // Leafy canopy — lush green with red apples
        ctx.fillStyle = '#2d7a1e';
        ctx.beginPath(); ctx.arc(tx, ty - 28, 18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#35881f';
        ctx.beginPath(); ctx.arc(tx - 10, ty - 22, 12, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx + 10, ty - 22, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#228b22';
        ctx.beginPath(); ctx.arc(tx, ty - 35, 13, 0, Math.PI * 2); ctx.fill();

        // Red apples scattered in canopy
        ctx.fillStyle = '#e74c3c';
        const applePositions = [[-8,-26],[6,-30],[0,-20],[-12,-32],[10,-24]];
        for(let ap of applePositions) {
            ctx.beginPath(); ctx.arc(tx + ap[0], ty + ap[1], 3, 0, Math.PI * 2); ctx.fill();
        }
        // Apple stems
        ctx.strokeStyle = '#4a3520';
        ctx.lineWidth = 0.5;
        for(let ap of applePositions) {
            ctx.beginPath(); ctx.moveTo(tx + ap[0], ty + ap[1] - 3); ctx.lineTo(tx + ap[0] + 1, ty + ap[1] - 5); ctx.stroke();
        }

        // Fallen apples on the ground beneath tree
        const fallenApples = [[-10, 3], [3, 5], [11, 2]];
        for(let fa of fallenApples) {
            // Apple shadow
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath(); ctx.ellipse(tx + fa[0], groundY + fa[1] + 2, 3, 1, 0, 0, Math.PI * 2); ctx.fill();
            // Apple body
            ctx.fillStyle = '#d63031';
            ctx.beginPath(); ctx.arc(tx + fa[0], groundY + fa[1], 2.5, 0, Math.PI * 2); ctx.fill();
            // Highlight
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath(); ctx.arc(tx + fa[0] - 0.6, groundY + fa[1] - 0.8, 1, 0, Math.PI * 2); ctx.fill();
            // Stem
            ctx.strokeStyle = '#4a3520'; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(tx + fa[0], groundY + fa[1] - 2.5); ctx.lineTo(tx + fa[0] + 0.8, groundY + fa[1] - 4); ctx.stroke();
        }
        // One apple rolled closer toward the window
        const rolledX = cx + 20, rolledY = groundY + groundH * 0.55;
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.beginPath(); ctx.ellipse(rolledX, rolledY + 2.5, 3.5, 1, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.arc(rolledX, rolledY, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(rolledX - 0.8, rolledY - 1, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#4a3520'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(rolledX, rolledY - 3); ctx.lineTo(rolledX + 1, rolledY - 4.5); ctx.stroke();
        // Tiny leaf on rolled apple
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.ellipse(rolledX + 1.3, rolledY - 4.8, 1.5, 0.7, 0.5, 0, Math.PI * 2); ctx.fill();

        // Red axe wedged into trunk — hidden after CEO letter or RED email opened
        if(!level5.ceoLetterOpened && !level5.redEmailRead) {
        ctx.globalAlpha = 1;
        const axX = tx + 6, axY = ty - 5;
        // Axe handle
        ctx.fillStyle = '#8B6914';
        ctx.save();
        ctx.translate(axX, axY);
        ctx.rotate(0.6);
        ctx.fillRect(0, -1, 16, 3);
        ctx.restore();
        // Axe head (red)
        ctx.fillStyle = '#cc2222';
        ctx.save();
        ctx.translate(axX, axY);
        ctx.rotate(0.6);
        ctx.beginPath();
        ctx.moveTo(0, -5);
        ctx.lineTo(-4, 0);
        ctx.lineTo(0, 5);
        ctx.lineTo(3, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        }

        // Birds — fly out of tree and back in (not just hopping)
        const birdCount = 3;
        for(let b = 0; b < birdCount; b++) {
            const birdPeriod = 4000 + b * 1500; // each bird has different flight cycle
            const birdCycle = ((t + b * 1700) % birdPeriod) / birdPeriod; // 0 to 1
            let bx, by, isFlying;
            if(birdCycle < 0.15) {
                // Perched in tree
                bx = tx + (b - 1) * 8;
                by = ty - 28 + b * 4;
                isFlying = false;
            } else if(birdCycle < 0.45) {
                // Flying out of tree toward window edge
                const flyPct = (birdCycle - 0.15) / 0.3;
                bx = tx + (b - 1) * 8 + flyPct * (b < 1 ? -28 : 28);
                by = ty - 30 - flyPct * 15 + Math.sin(flyPct * Math.PI) * 8;
                isFlying = true;
            } else if(birdCycle < 0.55) {
                // Soaring at peak (far from tree)
                const soarPct = (birdCycle - 0.45) / 0.1;
                bx = tx + (b < 1 ? -28 : 28) + soarPct * (b < 1 ? -4 : 4);
                by = ty - 45 + Math.sin(soarPct * Math.PI) * 3;
                isFlying = true;
            } else if(birdCycle < 0.85) {
                // Flying back to tree
                const retPct = (birdCycle - 0.55) / 0.3;
                bx = tx + (b < 1 ? -32 : 32) * (1 - retPct) + (b - 1) * 8 * retPct;
                by = ty - 45 + retPct * 17 + Math.sin(retPct * Math.PI) * 6;
                isFlying = true;
            } else {
                // Settling back in tree
                bx = tx + (b - 1) * 8;
                by = ty - 28 + b * 4;
                isFlying = false;
            }
            // Only draw if within window bounds
            if(bx > wx + 4 && bx < wx + ww - 4 && by > wy + 4 && by < wy + wh - 4) {
                if(isFlying) {
                    const wingFlap = Math.sin(t / 60 + b * 3) * 5;
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.moveTo(bx - 5, by + wingFlap * 0.5);
                    ctx.lineTo(bx, by);
                    ctx.lineTo(bx + 5, by + wingFlap * 0.5);
                    ctx.stroke();
                } else {
                    // Perched — wings folded
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(bx - 2, by - 1);
                    ctx.lineTo(bx, by);
                    ctx.lineTo(bx + 2, by - 1);
                    ctx.stroke();
                }
                // Bird body dot
                ctx.fillStyle = '#333';
                ctx.beginPath(); ctx.arc(bx, by + 1, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }

    } else if(colorIndex === 1) {
        // === GREEN: Grass lawn with riding lawnmower ===
        // Lush green lawn
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(wx, groundY, ww, groundH);
        // Mowed stripe pattern
        for(let s = 0; s < 8; s++) {
            ctx.fillStyle = s % 2 === 0 ? '#45a049' : '#4CAF50';
            ctx.fillRect(wx, groundY + s * (groundH / 8), ww, groundH / 8);
        }
        // Decorative hedged bushes with depth and leaf detail
        const bushPositions = [
            {x: wx + 4, w: 11, h: 8},
            {x: wx + 18, w: 13, h: 9},
            {x: wx + 36, w: 10, h: 7},
            {x: wx + 50, w: 12, h: 8}
        ];
        for(let b of bushPositions) {
            const bcx = b.x + b.w / 2, bcy = groundY;
            // Bush shadow on ground
            ctx.fillStyle = '#1e5c20';
            ctx.beginPath(); ctx.ellipse(bcx, bcy + 2, b.w / 2 + 1, b.h * 0.25, 0, 0, Math.PI * 2); ctx.fill();
            // Main bush body
            ctx.fillStyle = '#2e7d32';
            ctx.beginPath(); ctx.ellipse(bcx, bcy - b.h * 0.3, b.w / 2, b.h * 0.5, 0, 0, Math.PI * 2); ctx.fill();
            // Side leaf clusters
            ctx.fillStyle = '#338e38';
            ctx.beginPath(); ctx.arc(bcx - b.w * 0.25, bcy - b.h * 0.2, b.w * 0.22, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(bcx + b.w * 0.25, bcy - b.h * 0.25, b.w * 0.2, 0, Math.PI * 2); ctx.fill();
            // Top highlight
            ctx.fillStyle = '#43a047';
            ctx.beginPath(); ctx.ellipse(bcx - 1, bcy - b.h * 0.45, b.w * 0.25, b.h * 0.2, -0.3, 0, Math.PI * 2); ctx.fill();
            // Subtle leaf texture
            ctx.fillStyle = '#3d9141';
            ctx.beginPath(); ctx.arc(bcx, bcy - b.h * 0.5, b.w * 0.15, 0, Math.PI * 2); ctx.fill();
        }

        // Riding lawnmower — moves back and forth, disappearing off edges
        const mowerCycle = (t / 3000) % 2; // 0-2 cycle
        let mowerX;
        if(mowerCycle < 1) {
            mowerX = wx - 15 + (ww + 30) * mowerCycle; // left to right
        } else {
            mowerX = wx + ww + 15 - (ww + 30) * (mowerCycle - 1); // right to left
        }
        const mowerFacing = mowerCycle < 1 ? 1 : -1;
        // Only draw visible portion
        if(mowerX > wx - 12 && mowerX < wx + ww + 12) {
            ctx.save();
            ctx.beginPath();
            ctx.rect(wx, wy, ww, wh);
            ctx.clip();

            const my = groundY + 8;
            // Use canvas transform to flip when facing left — draw always as right-facing
            ctx.save();
            ctx.translate(mowerX, my);
            ctx.scale(mowerFacing, 1);
            // Grass collection bag (mounted on back/rear of mower, drawn first so mower body overlaps)
            ctx.fillStyle = '#333';
            ctx.fillRect(-14, -10, 7, 12);
            ctx.fillStyle = '#2a5a2a';
            ctx.fillRect(-13, -9, 5, 10);
            // Bag mesh texture
            ctx.strokeStyle = '#3a6a3a';
            ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(-13, -7); ctx.lineTo(-8, -7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-13, -4); ctx.lineTo(-8, -4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-13, -1); ctx.lineTo(-8, -1); ctx.stroke();
            // Mower body — green (John Deere style)
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(-8, -8, 16, 10);
            // Hood (front, right side)
            ctx.fillStyle = '#388e3c';
            ctx.fillRect(4, -10, 8, 6);
            // Seat (behind driver)
            ctx.fillStyle = '#f9a825';
            ctx.fillRect(-6, -12, 5, 5);
            // Rear wheel (larger)
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.arc(-6, 3, 3.5, 0, Math.PI * 2); ctx.fill();
            // Front wheel (smaller)
            ctx.beginPath(); ctx.arc(8, 3, 2.5, 0, Math.PI * 2); ctx.fill();
            // Yellow wheel rim
            ctx.fillStyle = '#f9a825';
            ctx.beginPath(); ctx.arc(-6, 3, 1.5, 0, Math.PI * 2); ctx.fill();
            // Tiny driver (seated)
            ctx.fillStyle = '#f5d5a8';
            ctx.fillRect(-3, -16, 4, 5);
            ctx.fillStyle = '#2e7d32'; // green cap
            ctx.fillRect(-4, -18, 6, 3);
            // Steering wheel
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.arc(1, -12, 2.5, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(1, -9.5); ctx.lineTo(2, -8); ctx.stroke();
            // Exhaust pipe
            ctx.fillStyle = '#555';
            ctx.fillRect(6, -13, 1.5, 4);
            // Exhaust puff
            ctx.fillStyle = `rgba(160,160,160,${0.3 + Math.sin(t/200) * 0.15})`;
            ctx.beginPath(); ctx.arc(6.5, -15, 1.8 + Math.sin(t/300) * 0.5, 0, Math.PI * 2); ctx.fill();
            // Front headlight
            ctx.fillStyle = '#ffe44d';
            ctx.beginPath(); ctx.arc(11, -5, 1.2, 0, Math.PI * 2); ctx.fill();
            // John Deere stripe on body
            ctx.fillStyle = '#f9a825';
            ctx.fillRect(-7, -4, 14, 1.5);
            // Front wheel rim
            ctx.fillStyle = '#f9a825';
            ctx.beginPath(); ctx.arc(8, 3, 1, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            // Grass clipping spray (behind mower in world space)
            if(mowerX > wx + 5 && mowerX < wx + ww - 5) {
                for(let g = 0; g < 4; g++) {
                    const gx = mowerX - mowerFacing * (10 + g * 3) + Math.random() * 4;
                    const gy = my - 2 + Math.random() * 6;
                    ctx.fillStyle = `rgba(76,175,80,${0.5 + Math.random() * 0.3})`;
                    ctx.fillRect(gx, gy, 2, 1);
                }
            }
            ctx.restore();
        }

    } else if(colorIndex === 2) {
        // === BLUE: Koi pond with rocks and splashing fish ===
        const blueRainy = level5.blueEmailRead;

        if(blueRainy) {
            // Gray overcast sky for rainy scene (after reading email)
            const rainSkyGrad = ctx.createLinearGradient(wx, wy, wx, wy + wh * 0.55);
            rainSkyGrad.addColorStop(0, '#7a8a94');
            rainSkyGrad.addColorStop(1, '#95a5a6');
            ctx.fillStyle = rainSkyGrad;
            ctx.fillRect(wx, wy, ww, wh * 0.55);
            // Gray rain clouds — smooth layered shapes
            ctx.fillStyle = '#7a8a99';
            ctx.beginPath();
            ctx.moveTo(wx, wy + 14);
            ctx.bezierCurveTo(wx + ww * 0.1, wy + 2, wx + ww * 0.3, wy - 2, wx + ww * 0.45, wy + 6);
            ctx.bezierCurveTo(wx + ww * 0.55, wy, wx + ww * 0.75, wy + 2, wx + ww, wy + 14);
            ctx.lineTo(wx + ww, wy + 20);
            ctx.lineTo(wx, wy + 20);
            ctx.closePath();
            ctx.fill();
            // Top highlights — lighter upper band
            ctx.fillStyle = '#8d9dae';
            ctx.beginPath();
            ctx.moveTo(wx + ww * 0.15, wy + 10);
            ctx.bezierCurveTo(wx + ww * 0.25, wy + 2, wx + ww * 0.45, wy, wx + ww * 0.55, wy + 6);
            ctx.bezierCurveTo(wx + ww * 0.65, wy + 2, wx + ww * 0.8, wy + 4, wx + ww * 0.85, wy + 10);
            ctx.lineTo(wx + ww * 0.85, wy + 14);
            ctx.lineTo(wx + ww * 0.15, wy + 14);
            ctx.closePath();
            ctx.fill();
            // Darker underbelly — shaped to match cloud base
            const bellyGrad2 = ctx.createLinearGradient(wx, wy + 14, wx, wy + 20);
            bellyGrad2.addColorStop(0, 'rgba(85,102,119,0.4)');
            bellyGrad2.addColorStop(1, '#4a5a6a');
            ctx.fillStyle = bellyGrad2;
            ctx.fillRect(wx, wy + 14, ww, 6);
            // Rain streaks
            ctx.strokeStyle = 'rgba(180,200,220,0.5)';
            ctx.lineWidth = 0.7;
            for(let r = 0; r < 15; r++) {
                const rx = wx + 3 + r * 4.2 + Math.sin(t / 300 + r) * 2;
                const rainY = ((t / 140 + r * 41) % (wh * 0.6)) + wy + 20;
                if(rainY < wy + wh - 3) {
                    ctx.beginPath();
                    ctx.moveTo(rx, rainY);
                    ctx.lineTo(rx - 0.5, rainY + 6);
                    ctx.stroke();
                }
            }
        } else {
            // Blue sky (before reading email) — matches pipe room sky quality
            // Sky already drawn by parent function (lines 1804-1809)
            // White fluffy clouds drifting right, wrapping from offscreen left
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            const cPad1 = 15;
            const cRange1 = ww + cPad1 * 2;
            const c1x = (wx - cPad1) + ((t / 12000) % 1) * cRange1;
            ctx.beginPath(); ctx.arc(c1x, wy + 12, 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(c1x + 7, wy + 10, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(c1x - 4, wy + 13, 4, 0, Math.PI * 2); ctx.fill();
            const cRange2 = ww + cPad1 * 2;
            const c2x = (wx - cPad1) + ((t / 16000 + 0.5) % 1) * cRange2;
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.beginPath(); ctx.arc(c2x, wy + 18, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(c2x + 6, wy + 16, 4, 0, Math.PI * 2); ctx.fill();
        }

        // Sandy/stone ground
        ctx.fillStyle = '#8B7D6B';
        ctx.fillRect(wx, groundY, ww, groundH);

        // Pond water — blue oval
        const pondCx = cx, pondCy = groundY + groundH * 0.35;
        const pondRx = 24, pondRy = 12;
        // Pond water
        ctx.fillStyle = blueRainy ? '#1a5f8a' : '#1a6fa0';
        ctx.beginPath(); ctx.ellipse(pondCx, pondCy, pondRx, pondRy, 0, 0, Math.PI * 2); ctx.fill();
        // Water shimmer
        ctx.fillStyle = `rgba(100,200,255,${0.3 + Math.sin(t / 600) * 0.15})`;
        ctx.beginPath(); ctx.ellipse(pondCx - 5, pondCy - 3, 8, 4, -0.3, 0, Math.PI * 2); ctx.fill();
        // Lily pad
        ctx.fillStyle = '#228b22';
        ctx.beginPath(); ctx.ellipse(pondCx + 8, pondCy + 2, 5, 3, 0.2, 0, Math.PI * 1.8); ctx.fill();

        // Surrounding rocks
        const rocks = [
            [-22, -4, 6, 4], [-16, -8, 5, 3], [18, -6, 7, 4], [22, 0, 5, 3],
            [-20, 6, 5, 3], [14, 8, 6, 3], [-8, 10, 4, 3], [6, 11, 5, 3]
        ];
        for(let r of rocks) {
            ctx.fillStyle = '#666';
            ctx.beginPath(); ctx.ellipse(pondCx + r[0], pondCy + r[1], r[2], r[3], 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#777';
            ctx.beginPath(); ctx.ellipse(pondCx + r[0] - 1, pondCy + r[1] - 1, r[2] * 0.6, r[3] * 0.6, 0, 0, Math.PI * 2); ctx.fill();
        }

        // Koi fish splash — periodic (stops when rainy sky)
        const splashCycle = (t / 2500) % 1;
        if(!blueRainy && splashCycle > 0.4 && splashCycle < 0.7) {
            const splashPct = (splashCycle - 0.4) / 0.3;
            const fishX = pondCx - 4 + Math.sin(t / 800) * 6;
            const fishY = pondCy - 4 - Math.sin(splashPct * Math.PI) * 14;
            // Determine fish facing based on horizontal velocity
            const fishVx = Math.cos(t / 800); // derivative of sin
            const fishDir = fishVx >= 0 ? 1 : -1;
            // Fish body — orange/white koi
            ctx.fillStyle = '#ff6633';
            ctx.save();
            ctx.translate(fishX, fishY);
            ctx.scale(fishDir, 1);
            ctx.rotate(-0.5 + splashPct);
            // Body
            ctx.beginPath(); ctx.ellipse(0, 0, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
            // White patches
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.ellipse(2, -1, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
            // Tail
            ctx.fillStyle = '#ff6633';
            ctx.beginPath();
            ctx.moveTo(-4, 0);
            ctx.lineTo(-8, -3);
            ctx.lineTo(-8, 3);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            // Water droplets
            if(splashPct > 0.1 && splashPct < 0.9) {
                for(let d = 0; d < 5; d++) {
                    const dx = fishX + (Math.random() - 0.5) * 16;
                    const dy = pondCy - 2 - Math.sin(splashPct * Math.PI) * (4 + d * 2);
                    ctx.fillStyle = `rgba(100,180,255,${0.5 * (1 - splashPct)})`;
                    ctx.beginPath(); ctx.arc(dx, dy, 1, 0, Math.PI * 2); ctx.fill();
                }
            }
            // Splash rings on water surface
            const ringSize = splashPct * 10;
            ctx.strokeStyle = `rgba(150,220,255,${0.4 * (1 - splashPct)})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.ellipse(fishX, pondCy, ringSize, ringSize * 0.4, 0, 0, Math.PI * 2); ctx.stroke();
        }

        // Rain dimples on pond surface — only when rainy
        if(blueRainy) {
            for(let sp = 0; sp < 7; sp++) {
                const spCycle = ((t / 400 + sp * 97) % 1);
                const spAngle = sp * 0.9 + Math.sin(sp * 3.7) * 0.5;
                const spDist = 0.3 + (sp % 3) * 0.25;
                const spX = pondCx + Math.cos(spAngle) * pondRx * spDist;
                const spY = pondCy + Math.sin(spAngle) * pondRy * spDist;
                if(spCycle < 0.7) {
                    const progress = spCycle / 0.7;
                    // Outer ring
                    const outerSize = spCycle * 6;
                    ctx.strokeStyle = `rgba(200,230,255,${0.5 * (1 - progress)})`;
                    ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.ellipse(spX, spY, outerSize, outerSize * 0.35, 0, 0, Math.PI * 2); ctx.stroke();
                    // Inner ring
                    if(spCycle > 0.12) {
                        const innerSize = (spCycle - 0.12) * 4;
                        ctx.strokeStyle = `rgba(200,230,255,${0.35 * (1 - progress)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.ellipse(spX, spY, innerSize, innerSize * 0.35, 0, 0, Math.PI * 2); ctx.stroke();
                    }
                }
                // Impact splash droplet
                if(spCycle < 0.1) {
                    ctx.fillStyle = `rgba(220,240,255,${0.7 * (1 - spCycle / 0.1)})`;
                    ctx.beginPath(); ctx.arc(spX, spY - spCycle * 18, 1, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

    } else if(colorIndex === 3) {
        // === YELLOW: Sun shining on wheatfield, blowing in breeze ===
        // Warm sky tint
        ctx.fillStyle = 'rgba(255,240,200,0.3)';
        ctx.fillRect(wx, wy, ww, wh * 0.55);

        // Sun — bright golden
        const sunX = cx + 12, sunY = wy + 15;
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 3, sunX, sunY, 20);
        sunGlow.addColorStop(0, 'rgba(255,240,100,0.9)');
        sunGlow.addColorStop(0.5, 'rgba(255,220,50,0.3)');
        sunGlow.addColorStop(1, 'rgba(255,200,0,0)');
        ctx.fillStyle = sunGlow;
        ctx.beginPath(); ctx.arc(sunX, sunY, 20, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffe44d';
        ctx.beginPath(); ctx.arc(sunX, sunY, 7, 0, Math.PI * 2); ctx.fill();
        // Sun rays
        ctx.strokeStyle = 'rgba(255,230,80,0.4)';
        ctx.lineWidth = 1;
        for(let r = 0; r < 8; r++) {
            const angle = r * Math.PI / 4 + t / 8000;
            ctx.beginPath();
            ctx.moveTo(sunX + Math.cos(angle) * 9, sunY + Math.sin(angle) * 9);
            ctx.lineTo(sunX + Math.cos(angle) * 16, sunY + Math.sin(angle) * 16);
            ctx.stroke();
        }

        // Wheat field — golden stalks rippling in wind
        ctx.fillStyle = '#c8a84e';
        ctx.fillRect(wx, groundY, ww, groundH);
        // Darker ground underneath
        ctx.fillStyle = '#a08030';
        ctx.fillRect(wx, groundY + groundH - 5, ww, 5);

        // Wheat stalks with wind animation
        const windPhase = t / 500;
        for(let s = 0; s < 22; s++) {
            const stalkX = wx + 3 + s * 3;
            const windOffset = Math.sin(windPhase + s * 0.4) * 3;
            const stalkH = 14 + Math.sin(s * 1.7) * 4;
            // Stalk
            ctx.strokeStyle = '#b8942e';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(stalkX, groundY + 4);
            ctx.quadraticCurveTo(stalkX + windOffset * 0.5, groundY - stalkH / 2, stalkX + windOffset, groundY - stalkH + 4);
            ctx.stroke();
            // Wheat head
            ctx.fillStyle = '#dab94e';
            ctx.beginPath();
            ctx.ellipse(stalkX + windOffset, groundY - stalkH + 3, 2, 4, windOffset * 0.1, 0, Math.PI * 2);
            ctx.fill();
        }
        // Wind particle streaks
        const windStreakX = (t / 8 + 100) % (ww + 40) + wx - 20;
        if(windStreakX > wx && windStreakX < wx + ww - 10) {
            ctx.strokeStyle = 'rgba(255,255,200,0.25)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(windStreakX, groundY - 5);
            ctx.lineTo(windStreakX + 12, groundY - 6);
            ctx.stroke();
        }

        // Occasional tumbleweed rolling left to right
        const twCycle = (t / 9000) % 1; // ~9 second cycle
        if(twCycle > 0.05 && twCycle < 0.85) {
            const twPct = (twCycle - 0.05) / 0.8;
            const twX = wx - 10 + (ww + 20) * twPct;
            const twY = groundY + 5 + Math.sin(twPct * 14) * 3; // bouncing
            const twR = 10; // large enough to see
            const twRot = twPct * Math.PI * 14;
            if(twX > wx && twX < wx + ww) {
                ctx.save();
                ctx.translate(twX, twY);
                ctx.rotate(twRot);
                // Outer tangle — dried hay/straw color
                ctx.strokeStyle = '#c8a050';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, twR, 0, Math.PI * 2); ctx.stroke();
                // Inner cross-tangles — lighter straw
                ctx.strokeStyle = '#d4b860';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(0, 0, twR * 0.7, twR * 0.4, 0.6, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(0, 0, twR * 0.4, twR * 0.75, -0.4, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(0, 0, twR * 0.6, twR * 0.5, 1.2, 0, Math.PI * 2); ctx.stroke();
                // Core wisps — tan
                ctx.strokeStyle = '#b8942a';
                ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.moveTo(-5, -2); ctx.lineTo(5, 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-2, 5); ctx.lineTo(2, -5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(-2, 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(4, -2); ctx.lineTo(-4, 3); ctx.stroke();
                // Tiny hay bits
                ctx.fillStyle = '#c8a050';
                ctx.beginPath(); ctx.ellipse(-4, 0, 2, 1, 0.8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(3, -3, 1.5, 0.8, -0.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                // Dust trail
                for(let d = 0; d < 4; d++) {
                    const dustX = twX - 14 - d * 7;
                    const dustY = twY + 4 + Math.sin(t / 200 + d) * 2;
                    if(dustX > wx) {
                        ctx.fillStyle = `rgba(180,150,60,${0.25 - d * 0.05})`;
                        ctx.beginPath(); ctx.arc(dustX, dustY, 4 - d * 0.5, 0, Math.PI * 2); ctx.fill();
                    }
                }
            }
        }
    }

    // === Industrial steel window frame (no curtains) ===
    // Outer steel frame
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 5;
    ctx.strokeRect(wx, wy, ww, wh);
    // Inner frame line
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.strokeRect(wx + 3, wy + 3, ww - 6, wh - 6);
    // Cross bars (industrial muntin)
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx, wy); ctx.lineTo(cx, wy + wh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx, wy + wh * 0.5); ctx.lineTo(wx + ww, wy + wh * 0.5); ctx.stroke();
    // Corner rivets
    const rivetPositions = [[wx + 4, wy + 4],[wx + ww - 4, wy + 4],[wx + 4, wy + wh - 4],[wx + ww - 4, wy + wh - 4]];
    for(let rv of rivetPositions) {
        ctx.fillStyle = '#777';
        ctx.beginPath(); ctx.arc(rv[0], rv[1], 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(rv[0], rv[1], 1, 0, Math.PI * 2); ctx.fill();
    }
    // Steel sill at bottom
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(wx - 3, wy + wh, ww + 6, 5);
    ctx.fillStyle = '#555';
    ctx.fillRect(wx - 2, wy + wh + 1, ww + 4, 2);
}

// Draw wide parking lot bay window for pipe rooms — the shared "work" view
function drawParkingLotWindow(wx, wy, ww, wh) {
    const t = Date.now();

    ctx.save();
    ctx.beginPath();
    ctx.rect(wx, wy, ww, wh);
    ctx.clip();

    // === SKY ===
    const skyGrad = ctx.createLinearGradient(wx, wy, wx, wy + wh * 0.35);
    skyGrad.addColorStop(0, '#7ec8e3');
    skyGrad.addColorStop(1, '#b5ddf0');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(wx, wy, ww, wh);

    // Floating clouds
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    const c1x = ((t / 10000) % 1.4 - 0.2) * ww + wx;
    ctx.beginPath(); ctx.arc(c1x, wy + 10, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c1x + 10, wy + 8, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c1x - 6, wy + 11, 5, 0, Math.PI*2); ctx.fill();
    const c2x = ((t / 14000 + 0.55) % 1.4 - 0.2) * ww + wx;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(c2x, wy + 16, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c2x + 8, wy + 14, 5, 0, Math.PI*2); ctx.fill();

    // === LAYOUT BANDS (top to bottom) ===
    const bldgTop = wy + wh * 0.18;
    const bldgBot = wy + wh * 0.38;
    const streetTop = bldgBot;
    const streetBot = wy + wh * 0.48;
    const curbTop = streetBot;
    const curbBot = wy + wh * 0.52;
    const lotTop = curbBot;
    const lotBot = wy + wh;

    // === BUILDING ACROSS THE STREET — industrial office complex ===
    const bldgH = bldgBot - bldgTop;
    // Main facade
    ctx.fillStyle = '#7a7068';
    ctx.fillRect(wx, bldgTop, ww, bldgH);
    // Concrete panel grid lines (horizontal)
    ctx.strokeStyle = '#6a6058';
    ctx.lineWidth = 0.5;
    for(let py = 0; py < 3; py++) {
        const ly = bldgTop + 2 + py * (bldgH / 3);
        ctx.beginPath(); ctx.moveTo(wx, ly); ctx.lineTo(wx + ww, ly); ctx.stroke();
    }
    // Vertical panel seams
    for(let px = 0; px < 8; px++) {
        const lx = wx + px * (ww / 7);
        ctx.beginPath(); ctx.moveTo(lx, bldgTop); ctx.lineTo(lx, bldgBot); ctx.stroke();
    }
    // Roof parapet with cornice
    ctx.fillStyle = '#5e564e';
    ctx.fillRect(wx, bldgTop - 1, ww, 3);
    ctx.fillStyle = '#8a8078';
    ctx.fillRect(wx, bldgTop + 1, ww, 1);
    // Upper row of windows
    const winRow1Y = bldgTop + 3;
    for(let col = 0; col < 16; col++) {
        const bwx = wx + 8 + col * 23;
        ctx.fillStyle = '#4a4438';
        ctx.fillRect(bwx, winRow1Y, 16, 5);
        const lit = ((col * 7) % 5) < 2;
        ctx.fillStyle = lit ? 'rgba(200,220,240,0.7)' : 'rgba(80,120,150,0.5)';
        ctx.fillRect(bwx + 1, winRow1Y + 1, 14, 3);
        // Window sill
        ctx.fillStyle = '#6a6058';
        ctx.fillRect(bwx - 1, winRow1Y + 5, 18, 1);
    }
    // Lower row of windows
    const winRow2Y = bldgTop + (bldgH * 0.45);
    for(let col = 0; col < 16; col++) {
        const bwx = wx + 8 + col * 23;
        ctx.fillStyle = '#4a4438';
        ctx.fillRect(bwx, winRow2Y, 16, 5);
        const lit2 = ((col * 5 + 3) % 7) < 3;
        ctx.fillStyle = lit2 ? 'rgba(200,220,240,0.65)' : 'rgba(80,120,150,0.45)';
        ctx.fillRect(bwx + 1, winRow2Y + 1, 14, 3);
        ctx.fillStyle = '#6a6058';
        ctx.fillRect(bwx - 1, winRow2Y + 5, 18, 1);
    }
    // Ground floor — darker facade with entrance
    ctx.fillStyle = '#5a5248';
    ctx.fillRect(wx, bldgBot - 6, ww, 6);
    // Main entrance with awning
    const entX = wx + ww * 0.5 - 14;
    ctx.fillStyle = '#3a342e';
    ctx.fillRect(entX, bldgBot - 6, 28, 6);
    // Glass double doors
    ctx.fillStyle = 'rgba(120,160,200,0.6)';
    ctx.fillRect(entX + 3, bldgBot - 5, 10, 4);
    ctx.fillRect(entX + 15, bldgBot - 5, 10, 4);
    // Door frame highlight
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(entX + 3, bldgBot - 5, 10, 4);
    ctx.strokeRect(entX + 15, bldgBot - 5, 10, 4);
    // Awning over entrance
    ctx.fillStyle = '#4a4438';
    ctx.fillRect(entX - 4, bldgBot - 7, 36, 2);
    ctx.fillStyle = '#5a5448';
    ctx.fillRect(entX - 3, bldgBot - 7, 34, 1);

    // === STREET — single lane, one direction (right), no opposing traffic ===
    ctx.fillStyle = '#3e3e3e';
    ctx.fillRect(wx, streetTop, ww, streetBot - streetTop);
    // White edge line at top of road (near sidewalk)
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(wx, streetTop + 1); ctx.lineTo(wx + ww, streetTop + 1); ctx.stroke();
    // Street traffic — single car driving right
    const carSpeed = (t / 5000) % 1;
    const trafficX = wx - 30 + (ww + 60) * carSpeed;
    if(trafficX > wx - 20 && trafficX < wx + ww + 20) {
        const carY = (streetTop + streetBot) / 2;
        // Side profile car: body, roof, windshield, rear window, wheels
        ctx.fillStyle = '#b0b0b0';
        ctx.fillRect(trafficX - 14, carY - 3, 28, 7);
        ctx.fillStyle = '#999';
        ctx.fillRect(trafficX - 5, carY - 6, 14, 4);
        ctx.fillStyle = 'rgba(150,200,240,0.5)';
        ctx.fillRect(trafficX - 3, carY - 5, 5, 3);
        ctx.fillRect(trafficX + 3, carY - 5, 5, 3);
        // Tail light
        ctx.fillStyle = '#cc3333';
        ctx.fillRect(trafficX - 14, carY - 2, 2, 3);
        // Headlight
        ctx.fillStyle = '#ffe';
        ctx.fillRect(trafficX + 12, carY - 2, 2, 3);
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(trafficX - 8, carY + 4, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(trafficX + 8, carY + 4, 2, 0, Math.PI*2); ctx.fill();
    }

    // === CURB / SIDEWALK ===
    ctx.fillStyle = '#aaa';
    ctx.fillRect(wx, curbTop, ww, curbBot - curbTop);
    ctx.fillStyle = '#bbb';
    ctx.fillRect(wx, curbTop, ww, 1.5);

    // === PIPETECH ENTRANCE SIGN — on this side of the street, at parking lot entrance ===
    const signPostX = wx + 22;
    const signPostBot = lotTop + (lotBot - lotTop) * 0.6; // base planted in parking lot
    const signPostTop = streetTop - 2; // extends above street level
    const ibeamH = signPostBot - signPostTop;
    // Steel I-beam post — wide-flange profile
    // Left flange
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(signPostX - 7, signPostTop, 4, ibeamH);
    // Right flange
    ctx.fillRect(signPostX + 3, signPostTop, 4, ibeamH);
    // Web (center)
    ctx.fillStyle = '#555';
    ctx.fillRect(signPostX - 3, signPostTop, 6, ibeamH);
    // Web highlight
    ctx.fillStyle = '#666';
    ctx.fillRect(signPostX - 1, signPostTop, 2, ibeamH);
    // Left flange highlight
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(signPostX - 6, signPostTop, 2, ibeamH);
    // Right flange highlight
    ctx.fillRect(signPostX + 4, signPostTop, 2, ibeamH);
    // Weld beads along flanges (industrial detail)
    ctx.fillStyle = '#6a6a6a';
    for(let wy = signPostTop + 5; wy < signPostBot - 10; wy += 12) {
        ctx.fillRect(signPostX - 7, wy, 1, 3);
        ctx.fillRect(signPostX + 6, wy, 1, 3);
    }
    // Top cap plate (horizontal)
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(signPostX - 9, signPostTop - 2, 18, 3);
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(signPostX - 9, signPostTop - 2, 18, 1);
    // Base plate (ground anchor)
    ctx.fillStyle = '#444';
    ctx.fillRect(signPostX - 10, signPostBot - 2, 20, 5);
    ctx.fillStyle = '#555';
    ctx.fillRect(signPostX - 10, signPostBot - 2, 20, 1);
    // Anchor bolts
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(signPostX - 7, signPostBot + 2, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(signPostX + 7, signPostBot + 2, 1.5, 0, Math.PI*2); ctx.fill();
    // Gusset plates (triangular braces at base)
    ctx.fillStyle = '#4a4a4a';
    ctx.beginPath(); ctx.moveTo(signPostX - 3, signPostBot - 8); ctx.lineTo(signPostX - 10, signPostBot - 2); ctx.lineTo(signPostX - 3, signPostBot - 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(signPostX + 3, signPostBot - 8); ctx.lineTo(signPostX + 10, signPostBot - 2); ctx.lineTo(signPostX + 3, signPostBot - 2); ctx.fill();

    // Sign panel — centered on steel pole, recessed panel style
    const signW = 90, signH = 26;
    const signY = signPostTop - signH - 1;
    const signLX = signPostX - signW / 2; // centered on the pole
    // Outer recessed panel
    ctx.fillStyle = '#ccc8b8';
    ctx.fillRect(signLX, signY, signW, signH);
    // Inner recessed panel
    ctx.fillStyle = '#d8d4c4';
    ctx.fillRect(signLX + 2, signY + 1, signW - 4, signH - 2);
    // "PIPETECH" text — bold, centered on sign
    ctx.fillStyle = '#2a2a2a';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PIPETECH', signPostX, signY + 12);
    // Text shadow for depth
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillText('PIPETECH', signPostX + 0.5, signY + 12.5);
    // Four colored stripe bands — centered matching pipe room standard
    for(let i = 0; i < 4; i++) {
        ctx.fillStyle = COLORS[i].hex;
        ctx.fillRect(signLX + 5, signY + 15 + i * 2.5, signW - 10, 1.5);
        // Stripe highlight (top edge)
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(signLX + 5, signY + 15 + i * 2.5, signW - 10, 0.5);
    }
    // Mounting brackets (steel pole to sign panel) — centered dual brackets
    ctx.fillStyle = '#555';
    ctx.fillRect(signPostX - 4, signY + signH - 1, 8, 3);
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(signPostX - 3, signY + signH, 6, 2);

    // === PARKING LOT ===
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(wx, lotTop, ww, lotBot - lotTop);
    // Asphalt texture
    ctx.fillStyle = '#525252';
    for(let sp = 0; sp < 30; sp++) {
        ctx.fillRect(wx + (sp * 47 + 13) % ww, lotTop + (sp * 31 + 7) % (lotBot - lotTop), 2, 1);
    }

    // Parking lines
    const lotH = lotBot - lotTop;
    const spotW = ww / 11;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    for(let i = 0; i <= 10; i++) {
        const lx = wx + 8 + i * spotW;
        ctx.beginPath();
        ctx.moveTo(lx, lotTop + 3);
        ctx.lineTo(lx, lotBot - 2);
        ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(wx + 8, lotTop + 3); ctx.lineTo(wx + 8 + 10 * spotW, lotTop + 3); ctx.stroke();

    // === PM COLOR-COORDINATED VW BUGS (yellow absent in level 1 — not hired yet) ===
    const numBugs = (level === 1) ? 3 : 4;
    for(let pi = 0; pi < numBugs; pi++) {
        const bugSpot = pi;
        const bcx = wx + 8 + (bugSpot + 0.5) * spotW;
        const bcy = lotTop + lotH * 0.52;
        const bw = spotW * 0.7;
        const bh = lotH * 0.72;
        const bugCol = COLORS[pi].hex;
        // VW Bug body — distinctively rounded shape (top-down)
        ctx.fillStyle = bugCol;
        ctx.beginPath();
        // Rounded front (nose at top)
        ctx.moveTo(bcx - bw*0.3, bcy - bh/2);
        ctx.quadraticCurveTo(bcx, bcy - bh/2 - 2, bcx + bw*0.3, bcy - bh/2);
        ctx.lineTo(bcx + bw/2, bcy - bh*0.2);
        ctx.lineTo(bcx + bw/2, bcy + bh*0.3);
        // Rounded rear (engine)
        ctx.quadraticCurveTo(bcx + bw*0.4, bcy + bh/2, bcx, bcy + bh/2 + 1);
        ctx.quadraticCurveTo(bcx - bw*0.4, bcy + bh/2, bcx - bw/2, bcy + bh*0.3);
        ctx.lineTo(bcx - bw/2, bcy - bh*0.2);
        ctx.closePath();
        ctx.fill();
        // Windshield (small, rounded — VW Bug style)
        ctx.fillStyle = 'rgba(80,120,160,0.6)';
        ctx.beginPath();
        ctx.ellipse(bcx, bcy - bh*0.18, bw*0.28, bh*0.1, 0, 0, Math.PI * 2);
        ctx.fill();
        // Roof (center dome)
        ctx.fillStyle = bugCol;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.ellipse(bcx, bcy + bh*0.02, bw*0.25, bh*0.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Rear window (small oval — VW style)
        ctx.fillStyle = 'rgba(80,120,160,0.5)';
        ctx.beginPath();
        ctx.ellipse(bcx, bcy + bh*0.28, bw*0.2, bh*0.06, 0, 0, Math.PI * 2);
        ctx.fill();
        // Center ridge line (body seam)
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(bcx, bcy - bh/2 - 1); ctx.lineTo(bcx, bcy + bh/2 + 1); ctx.stroke();
        // Headlights (round, VW style)
        ctx.fillStyle = '#ffe';
        ctx.beginPath(); ctx.arc(bcx - bw*0.3, bcy - bh*0.38, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(bcx + bw*0.3, bcy - bh*0.38, 1.5, 0, Math.PI*2); ctx.fill();
        // Tail lights
        ctx.fillStyle = '#cc2222';
        ctx.beginPath(); ctx.arc(bcx - bw*0.3, bcy + bh*0.4, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(bcx + bw*0.3, bcy + bh*0.4, 1, 0, Math.PI*2); ctx.fill();
    }

    // === SILVER CONVERTIBLE (spot 5) ===
    {
        const cvSpot = 5;
        const cvx = wx + 8 + (cvSpot + 0.5) * spotW;
        const cvy = lotTop + lotH * 0.52;
        const cvw = spotW * 0.72;
        const cvh = lotH * 0.72;
        // Body — silver, sleek
        ctx.fillStyle = '#c0c0c0';
        const cr = 2;
        ctx.beginPath();
        ctx.moveTo(cvx - cvw/2 + cr, cvy - cvh/2);
        ctx.lineTo(cvx + cvw/2 - cr, cvy - cvh/2);
        ctx.quadraticCurveTo(cvx + cvw/2, cvy - cvh/2, cvx + cvw/2, cvy - cvh/2 + cr);
        ctx.lineTo(cvx + cvw/2, cvy + cvh/2 - cr);
        ctx.quadraticCurveTo(cvx + cvw/2, cvy + cvh/2, cvx + cvw/2 - cr, cvy + cvh/2);
        ctx.lineTo(cvx - cvw/2 + cr, cvy + cvh/2);
        ctx.quadraticCurveTo(cvx - cvw/2, cvy + cvh/2, cvx - cvw/2, cvy + cvh/2 - cr);
        ctx.lineTo(cvx - cvw/2, cvy - cvh/2 + cr);
        ctx.quadraticCurveTo(cvx - cvw/2, cvy - cvh/2, cvx - cvw/2 + cr, cvy - cvh/2);
        ctx.fill();
        // No roof — visible interior (tan seats)
        ctx.fillStyle = '#c8a882';
        ctx.fillRect(cvx - cvw*0.32, cvy - cvh*0.1, cvw*0.64, cvh*0.35);
        // Windshield (compact, front only)
        ctx.fillStyle = 'rgba(150,200,240,0.5)';
        ctx.fillRect(cvx - cvw*0.3, cvy - cvh/2 + 2, cvw*0.6, cvh*0.12);
        // Chrome trim along sides
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 0.7;
        ctx.beginPath(); ctx.moveTo(cvx - cvw/2 + 1, cvy); ctx.lineTo(cvx + cvw/2 - 1, cvy); ctx.stroke();
        // Headlights & tail lights
        ctx.fillStyle = '#ffe';
        ctx.fillRect(cvx - cvw*0.35, cvy - cvh/2 + 1, cvw*0.12, 1.5);
        ctx.fillRect(cvx + cvw*0.23, cvy - cvh/2 + 1, cvw*0.12, 1.5);
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(cvx - cvw/2 + 1, cvy + cvh/2 - 2, cvw*0.15, 1.5);
        ctx.fillRect(cvx + cvw/2 - cvw*0.15 - 1, cvy + cvh/2 - 2, cvw*0.15, 1.5);
    }

    // === BLACK CADILLACS (spots 7 and 8) ===
    for(let ci = 0; ci < 2; ci++) {
        const cadSpot = 7 + ci;
        const cdx = wx + 8 + (cadSpot + 0.5) * spotW;
        const cdy = lotTop + lotH * 0.50;
        const cdw = spotW * 0.72;
        const cdh = lotH * 0.82;
        // Long body — black luxury sedan
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.moveTo(cdx - cdw/2 + 1, cdy - cdh/2);
        ctx.lineTo(cdx + cdw/2 - 1, cdy - cdh/2);
        ctx.quadraticCurveTo(cdx + cdw/2, cdy - cdh/2, cdx + cdw/2, cdy - cdh/2 + 2);
        ctx.lineTo(cdx + cdw/2, cdy + cdh/2 - 2);
        ctx.quadraticCurveTo(cdx + cdw/2, cdy + cdh/2, cdx + cdw/2 - 1, cdy + cdh/2);
        ctx.lineTo(cdx - cdw/2 + 1, cdy + cdh/2);
        ctx.quadraticCurveTo(cdx - cdw/2, cdy + cdh/2, cdx - cdw/2, cdy + cdh/2 - 2);
        ctx.lineTo(cdx - cdw/2, cdy - cdh/2 + 2);
        ctx.quadraticCurveTo(cdx - cdw/2, cdy - cdh/2, cdx - cdw/2 + 1, cdy - cdh/2);
        ctx.fill();
        // Windshield
        ctx.fillStyle = 'rgba(40,60,80,0.7)';
        ctx.fillRect(cdx - cdw*0.35, cdy - cdh/2 + 2, cdw*0.7, cdh*0.14);
        // Roof panel
        ctx.fillStyle = '#222';
        ctx.fillRect(cdx - cdw*0.3, cdy - cdh*0.12, cdw*0.6, cdh*0.28);
        // Rear windshield
        ctx.fillStyle = 'rgba(40,60,80,0.6)';
        ctx.fillRect(cdx - cdw*0.28, cdy + cdh*0.2, cdw*0.56, cdh*0.1);
        // Chrome trim
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(cdx - cdw/2 + 1, cdy - cdh*0.05); ctx.lineTo(cdx + cdw/2 - 1, cdy - cdh*0.05); ctx.stroke();
        // Chrome grille (front)
        ctx.fillStyle = '#666';
        ctx.fillRect(cdx - cdw*0.25, cdy - cdh/2 + 1, cdw*0.5, 1);
        // Headlights
        ctx.fillStyle = '#ffe';
        ctx.fillRect(cdx - cdw/2 + 1, cdy - cdh/2 + 1, cdw*0.12, 1.5);
        ctx.fillRect(cdx + cdw/2 - cdw*0.12 - 1, cdy - cdh/2 + 1, cdw*0.12, 1.5);
        // Tail lights
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(cdx - cdw/2 + 1, cdy + cdh/2 - 2, cdw*0.18, 1.5);
        ctx.fillRect(cdx + cdw/2 - cdw*0.18 - 1, cdy + cdh/2 - 2, cdw*0.18, 1.5);
    }

    // === WHITE COMPACT CARGO VAN (spot 10) ===
    const vanSpot = 10;
    const vanCx = wx + 8 + (vanSpot + 0.3) * spotW;
    const vanCy = lotTop + lotH * 0.48;
    const vanW = spotW * 0.82;
    const vanH = lotH * 0.88;
    // Van body — white, boxy
    ctx.fillStyle = '#f0ece4';
    ctx.fillRect(vanCx - vanW/2, vanCy - vanH/2, vanW, vanH);
    // Windshield (narrow, cab front)
    ctx.fillStyle = 'rgba(100,140,180,0.5)';
    ctx.fillRect(vanCx - vanW*0.35, vanCy - vanH/2 + 2, vanW*0.7, vanH*0.1);
    // Cab roof (smaller than cargo area)
    ctx.fillStyle = '#e0dcd0';
    ctx.fillRect(vanCx - vanW*0.3, vanCy - vanH*0.3, vanW*0.6, vanH*0.15);
    // Cargo area (solid, no rear window)
    ctx.fillStyle = '#e8e4d8';
    ctx.fillRect(vanCx - vanW*0.4, vanCy, vanW*0.8, vanH*0.4);
    // Side panel line
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(vanCx - vanW/2 + 1, vanCy - vanH*0.1); ctx.lineTo(vanCx + vanW/2 - 1, vanCy - vanH*0.1); ctx.stroke();
    // Rear doors (double)
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(vanCx, vanCy + vanH*0.1); ctx.lineTo(vanCx, vanCy + vanH/2 - 1); ctx.stroke();
    // Tail lights
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(vanCx - vanW/2 + 1, vanCy + vanH/2 - 2, vanW*0.12, 2);
    ctx.fillRect(vanCx + vanW/2 - vanW*0.12 - 1, vanCy + vanH/2 - 2, vanW*0.12, 2);

    // Glass tint — subtle darkening for contrast so foreground PMs are more visible
    ctx.fillStyle = 'rgba(20, 40, 60, 0.18)';
    ctx.fillRect(wx, wy, ww, wh);

    ctx.restore();

    // === Window frame — heavy industrial steel ===
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 4;
    ctx.strokeRect(wx, wy, ww, wh);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(wx + 3, wy + 3, ww - 6, wh - 6);
    // Horizontal mullion
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(wx, wy + wh * 0.45, ww, 3);
    // Vertical mullions
    ctx.fillRect(wx + ww * 0.33, wy, 3, wh);
    ctx.fillRect(wx + ww * 0.66, wy, 3, wh);
    // Corner rivets
    const rivets = [[wx+6,wy+6],[wx+ww-6,wy+6],[wx+6,wy+wh-6],[wx+ww-6,wy+wh-6]];
    for(let rv of rivets) {
        ctx.fillStyle = '#888';
        ctx.beginPath(); ctx.arc(rv[0], rv[1], 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(rv[0], rv[1], 1, 0, Math.PI*2); ctx.fill();
    }
    // Steel sill at bottom
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(wx - 3, wy + wh, ww + 6, 5);
    ctx.fillStyle = '#555';
    ctx.fillRect(wx - 2, wy + wh + 1, ww + 4, 2);
}

// Hand wheel turn-valve on pipe section (vertical or horizontal orientation)
function drawHandWheelValve(pipeX, pipeY, npc, horizontal) {
    const vx = pipeX;
    const vy = horizontal ? pipeY : pipeY - 4;
    const t = Date.now();
    const valveR = 14;

    // Determine valve state
    let isStressed = false;
    let stressPct = 0;
    let isFixed = npc.state === 'fixing';

    const crack = cracks.find(c => c.npc === npc);
    if(crack) {
        isStressed = true;
        stressPct = Math.min((t - crack.time) / crack.max, 1);
    }
    if(npc.crackStartTime && npc.needsDoc) {
        isStressed = true;
        stressPct = Math.min((t - npc.crackStartTime) / 15000, 1);
    }

    // Valve rotation
    let valveAngle = 0;
    if(isFixed) {
        const fixCycle = (t / 1200) % 2;
        if(fixCycle < 1) {
            valveAngle = -Math.PI * fixCycle;
        } else {
            valveAngle = -Math.PI + Math.PI * (fixCycle - 1);
        }
    } else if(isStressed) {
        valveAngle = Math.sin(t / 300) * 0.2 * stressPct;
    }

    // === Pipe flanges — valve is bolted inline on the pipe ===
    if (horizontal) {
        // Left flange (perpendicular to horizontal pipe)
        ctx.fillStyle = '#777';
        ctx.fillRect(vx - 14, vy - 10, 4, 20);
        ctx.fillStyle = '#888';
        ctx.fillRect(vx - 14, vy - 10, 1.5, 20);
        // Left flange bolts
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(vx - 12, vy - 7, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(vx - 12, vy + 7, 1.5, 0, Math.PI * 2); ctx.fill();
        // Right flange (perpendicular to horizontal pipe)
        ctx.fillStyle = '#777';
        ctx.fillRect(vx + 10, vy - 10, 4, 20);
        ctx.fillStyle = '#888';
        ctx.fillRect(vx + 10, vy - 10, 1.5, 20);
        // Right flange bolts
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(vx + 12, vy - 7, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(vx + 12, vy + 7, 1.5, 0, Math.PI * 2); ctx.fill();

        // Valve body (gate valve housing mounted on horizontal pipe)
        ctx.fillStyle = '#666';
        ctx.fillRect(vx - 8, vy - 8, 16, 16);
        ctx.fillStyle = '#777';
        ctx.fillRect(vx - 4, vy - 9, 8, 18);
        // Body highlight
        ctx.fillStyle = '#888';
        ctx.fillRect(vx - 6, vy - 6, 3, 12);
    } else {
        // Upper flange (above valve on vertical pipe)
        ctx.fillStyle = '#777';
        ctx.fillRect(vx - 10, vy - 14, 20, 4);
        ctx.fillStyle = '#888';
        ctx.fillRect(vx - 10, vy - 14, 20, 1.5);
        // Upper flange bolts
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(vx - 7, vy - 12, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(vx + 7, vy - 12, 1.5, 0, Math.PI * 2); ctx.fill();
        // Lower flange (below valve on vertical pipe)
        ctx.fillStyle = '#777';
        ctx.fillRect(vx - 10, vy + 10, 20, 4);
        ctx.fillStyle = '#888';
        ctx.fillRect(vx - 10, vy + 10, 20, 1.5);
        // Lower flange bolts
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(vx - 7, vy + 12, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(vx + 7, vy + 12, 1.5, 0, Math.PI * 2); ctx.fill();

        // Valve body (gate valve housing mounted on vertical pipe)
        ctx.fillStyle = '#666';
        ctx.fillRect(vx - 8, vy - 8, 16, 16);
        ctx.fillStyle = '#777';
        ctx.fillRect(vx - 9, vy - 4, 18, 8);
        // Body highlight
        ctx.fillStyle = '#888';
        ctx.fillRect(vx - 6, vy - 6, 12, 3);
    }

    // Thin shadow underneath wheel (subtle, no hubcap ring)
    ctx.save();
    ctx.translate(vx, vy);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(1, 2, valveR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Wheel (rotates with valveAngle) — offset by 60° so rest position avoids 12 o'clock notch
    ctx.save();
    ctx.translate(vx, vy);
    ctx.rotate(valveAngle + Math.PI / 3);

    // Spokes drawn first so rim covers their endpoints cleanly (no notch bumps)
    // Three uniform grey spokes — stop short of rim
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 2.5;
    for(let sp = 0; sp < 3; sp++) {
        const a = sp * (Math.PI * 2 / 3);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * (valveR - 5), Math.sin(a) * (valveR - 5));
        ctx.stroke();
    }
    // Outer rim — drawn after spokes so it cleanly covers spoke endpoints
    ctx.strokeStyle = '#c8c8c8';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, valveR, 0, Math.PI * 2);
    ctx.stroke();

    // Center hub
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.arc(-0.5, -0.5, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Water drips when stressed
    if(isStressed && stressPct > 0.2) {
        const dripCount = Math.floor(stressPct * 4);
        for(let d = 0; d < dripCount; d++) {
            const dripPhase = ((t / 600 + d * 200) % 1);
            const dx = vx - 3 + d * 3;
            const dy = vy + 8 + dripPhase * 20;
            const dripAlpha = 0.6 * (1 - dripPhase);
            ctx.fillStyle = `rgba(100,180,255,${dripAlpha})`;
            ctx.beginPath();
            ctx.ellipse(dx, dy, 1.5, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Steam when highly stressed
    if(isStressed && stressPct > 0.5) {
        const steamCount = Math.floor((stressPct - 0.5) * 6);
        for(let s = 0; s < steamCount; s++) {
            const sp = ((t / 800 + s * 300) % 1);
            const sx = vx + 4 + sp * 10;
            const sy = vy - 6 - sp * 12;
            const steamAlpha = 0.35 * (1 - sp);
            ctx.fillStyle = `rgba(220,220,220,${steamAlpha})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 2.5 + sp * 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// Draw color-coordinated step-ladder for pipe managers
function drawStepLadder(x, npcY, color) {
    const s = 2;
    const feetY = npcY + 16 * s; // NPC feet bottom
    const floorY = 400;

    // Ladder extends above window but below valve
    const ladderTop = feetY - 130; // above window (275), below valve (~196)
    const ladderH = floorY - ladderTop;

    if (ladderH < 20) return;

    const topHalfW = 10;
    const botHalfW = 18;

    // Shadow at base
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x, floorY + 1, botHalfW + 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Side rails - color coordinated, taller
    ctx.strokeStyle = color.hex;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    // Left rail
    ctx.beginPath();
    ctx.moveTo(x - topHalfW, ladderTop);
    ctx.lineTo(x - botHalfW, floorY);
    ctx.stroke();

    // Right rail
    ctx.beginPath();
    ctx.moveTo(x + topHalfW, ladderTop);
    ctx.lineTo(x + botHalfW, floorY);
    ctx.stroke();

    // Rungs - metallic gray, more rungs for taller ladder
    const numRungs = 6;
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 2.5;
    for (let i = 1; i <= numRungs; i++) {
        const t = i / (numRungs + 1);
        const rY = ladderTop + t * ladderH;
        const hw = topHalfW + t * (botHalfW - topHalfW);
        ctx.beginPath();
        ctx.moveTo(x - hw, rY);
        ctx.lineTo(x + hw, rY);
        ctx.stroke();
    }

    // Rung where PM stands (highlighted — the rung closest to feet level)
    const standRungIdx = Math.round((feetY - ladderTop) / ladderH * (numRungs + 1));
    const standT = standRungIdx / (numRungs + 1);
    const standY = ladderTop + standT * ladderH;
    const standHW = topHalfW + standT * (botHalfW - topHalfW);
    ctx.strokeStyle = color.hex;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x - standHW, standY);
    ctx.lineTo(x + standHW, standY);
    ctx.stroke();
    // Highlight on standing rung
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - standHW + 1, standY - 1);
    ctx.lineTo(x + standHW - 1, standY - 1);
    ctx.stroke();

    // Top cap (safety rail)
    ctx.fillStyle = color.hex;
    ctx.fillRect(x - topHalfW - 1, ladderTop - 2, (topHalfW + 1) * 2, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(x - topHalfW - 1, ladderTop - 2, (topHalfW + 1) * 2, 2);

    // Rubber feet at bottom
    ctx.fillStyle = '#333';
    ctx.fillRect(x - botHalfW - 1, floorY - 2, 5, 4);
    ctx.fillRect(x + botHalfW - 4, floorY - 2, 5, 4);

    ctx.lineCap = 'butt';
}

// Draw simple industrial table-desk for equipment (doc printer, 3D printer)
function drawTableDesk(x, topY, width) {
    const floorY = 400;
    const halfW = width / 2;
    const legH = floorY - topY;

    // Table surface - industrial metal
    ctx.fillStyle = '#777';
    ctx.fillRect(x - halfW, topY - 1, width, 2);
    ctx.fillStyle = '#666';
    ctx.fillRect(x - halfW, topY + 1, width, 3);
    ctx.fillStyle = '#555';
    ctx.fillRect(x - halfW, topY + 3, width, 1);

    // Metal legs
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(x - halfW + 3, topY + 4, 3, legH - 4);
    ctx.fillRect(x + halfW - 6, topY + 4, 3, legH - 4);

    // Leg highlight
    ctx.fillStyle = '#6a6a6a';
    ctx.fillRect(x - halfW + 4, topY + 4, 1, legH - 4);
    ctx.fillRect(x + halfW - 5, topY + 4, 1, legH - 4);

    // Cross brace for stability
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - halfW + 6, topY + legH * 0.55);
    ctx.lineTo(x + halfW - 6, topY + legH * 0.55);
    ctx.stroke();

    // Feet at bottom
    ctx.fillStyle = '#444';
    ctx.fillRect(x - halfW + 1, floorY - 2, 7, 3);
    ctx.fillRect(x + halfW - 8, floorY - 2, 7, 3);

    // Shadow at base
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(x - halfW - 1, floorY + 1, width + 2, 2);
}

// SECTION 8: Equipment and Object Drawing Functions
function drawComputer(x, y) {
    ctx.fillStyle = '#2b2b2b';
    ctx.fillRect(x - 30, y, 60, 35);
    
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - 25, y - 30, 50, 30);
    
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x - 22, y - 27, 44, 24);
    
    if(ui.show || player.holding) {
        const displayColor = player.holding ? 
            COLORS.find(c => c.name === player.holding).hex : 
            COLORS[ui.selectedColor].hex;
        ctx.fillStyle = displayColor;
    } else {
        ctx.fillStyle = '#004a7c';
    }
    ctx.fillRect(x - 20, y - 25, 40, 20);
    
    if(ui.show || player.holding) {
        ctx.shadowColor = ui.show ? 
            COLORS[ui.selectedColor].hex : 
            COLORS.find(c => c.name === player.holding).hex;
        ctx.shadowBlur = 8;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x - 20, y - 25, 40, 20);
        ctx.shadowBlur = 0;
    }
    
    ctx.fillStyle = 'rgba(255,255,255,0.15)';

    ctx.fillStyle = '#444';
