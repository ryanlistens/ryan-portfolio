}

function draw3DPrinter(x, y) {
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x - 25, y - 35, 50, 50);
    
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x - 20, y - 30, 40, 40);
    
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - 18, y - 28, 36, 36);
    
    ctx.fillStyle = 'rgba(100,150,200,0.3)';
    ctx.fillRect(x - 16, y - 26, 32, 28);
    
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 16, y - 26, 32, 28);
    
    if(ghostGun.printing) {
        const progress = ghostGun.printProgress;
        if(ghostGun.printingHeart) {
            const heartSize = 20 * progress;
            ctx.fillStyle = `rgba(231,76,60,${progress})`;
            ctx.font = `bold ${heartSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('♥', x, y);
        } else {
            // Gun with handle pointing up, barrel pointing left (proper orientation)
            const gunSize = 15 * progress;
            ctx.fillStyle = 'rgba(160,160,160,' + progress + ')';

            // Barrel (horizontal, pointing left)
            ctx.fillRect(x - gunSize * 0.7 + 8, y - 3, gunSize * 0.7, 6);

            // Grip/handle (vertical, pointing up)
            ctx.fillRect(x + 3, y - gunSize * 0.5 + 2, 5, gunSize * 0.5);

            // Trigger guard
            ctx.strokeStyle = `rgba(100,100,100,${progress})`;
            ctx.lineWidth = 1;
            ctx.strokeRect(x + 3, y - gunSize * 0.2, 3, gunSize * 0.2);
        }
    }
    
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(x - 20, y + 5, 4, 4);
    
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x - 25, y + 12, 50, 8);
    
    ctx.fillStyle = '#f5f2ec';
    ctx.font = 'bold 7px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('3D PRINTER', x, y + 18);
}

function drawGhostGun(x, y, facing) {
    // Concealed when static — only draw when moving or actively shooting
    const isActive = player.shootTimer > 0 || Date.now() - player.lastMove < 350;
    if(!isActive) return;
    const skinColor = '#f5c89a';
    const sleeveColor = '#800020'; // Red jacket sleeve

    if(facing === 'left') {
        // LEFT: Proper anatomical arm extended left, gun pointing left

        // Upper arm (shoulder to elbow) - red jacket sleeve
        const shoulderX = x - 9;
        const shoulderY = y - 2;
        const elbowX = x - 17;
        const elbowY = y - 8;

        ctx.fillStyle = sleeveColor;
        ctx.fillRect(shoulderX - 8, shoulderY - 2, 11, 7);

        // Forearm (elbow to wrist)
        const wristX = x - 28;
        const wristY = y - 10;

        ctx.fillStyle = sleeveColor;
        ctx.fillRect(elbowX - 11, elbowY - 2, 13, 6);

        // Hand gripping gun
        ctx.fillStyle = skinColor;
        ctx.fillRect(wristX - 1, wristY - 2, 7, 8);

        // Gun pointing left
        const gunX = x - 28;
        const gunY = y - 10;

        // Barrel pointing left
        ctx.fillStyle = '#999';
        ctx.fillRect(gunX - 10, gunY - 3, 18, 6);

        // Barrel extension

function drawCashSack(x, y) {
    // Cloth sack body - proper knotted sack shape with bulging bottom
    ctx.fillStyle = '#27ae60';
    ctx.beginPath();
    // Bottom bulge
    ctx.ellipse(x, y + 8, 13, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Middle section (slightly narrower)
    ctx.fillStyle = '#2ecc71';
    ctx.beginPath();
    ctx.ellipse(x, y, 11, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Gathered neck section
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(x - 7, y - 8, 14, 8);

    // Sack texture/wrinkles
    ctx.strokeStyle = '#1e8449';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 9, y - 2);
    ctx.lineTo(x - 7, y + 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 9, y);
    ctx.lineTo(x + 7, y + 14);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 3, y + 2);
    ctx.lineTo(x - 2, y + 16);
    ctx.stroke();

    // Tied rope/knot at neck
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(x - 8, y - 10, 16, 3);

    // Prominent rope knot
    ctx.fillStyle = '#6b4904';
    ctx.beginPath();
    ctx.arc(x, y - 9, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x - 2, y - 9, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 2, y - 9, 2, 0, Math.PI * 2);
    ctx.fill();

    // Large $ symbol
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('$', x, y + 10);

    // Outline for definition
    ctx.strokeStyle = '#1e8449';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(x, y + 4, 14, 16, 0, 0, Math.PI * 2);
    ctx.stroke();
}


// Industrial rubber matting floor — coin-dot bump pattern
function drawRubberMattingFloor(floorY) {
    // Dark rubber base — fills all the way to bottom of canvas
    ctx.fillStyle = '#222';
    ctx.fillRect(-GX, floorY, CANVAS_W, CANVAS_H + GY);
    // Coin-dot raised bumps — larger and brighter for visibility
    const sp = 16;
    const startX = -GX - ((-GX) % sp);
    const endY = floorY + CANVAS_H + GY;
    for(let dx = startX; dx < -GX + CANVAS_W; dx += sp) {
        for(let dy = floorY + 8; dy < endY; dy += sp) {
            // Bump base (slightly lighter than rubber)
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath(); ctx.arc(dx, dy, 5, 0, Math.PI * 2); ctx.fill();
            // Highlight on top of bump (makes it look raised)
            ctx.fillStyle = 'rgba(255,255,255,0.07)';
            ctx.beginPath(); ctx.arc(dx - 1, dy - 1, 3, 0, Math.PI * 2); ctx.fill();
        }
    }
    // Leading edge sheen
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(-GX, floorY, CANVAS_W, 3);
}

// Wall/ceiling-mounted CCTV security camera with slow pan
function drawCCTVCamera(mountX, mountY, facingRight) {
    const t = Date.now() / 1000;
    // Slow panning sweep — pivots ~30 degrees back and forth
    const panAngle = Math.sin(t * 0.4) * 0.45;
    const dir = facingRight ? 1 : -1;

    ctx.save();
    ctx.translate(mountX, mountY);

    // Wall-mount L-bracket — plate bolted flat to back wall, arm extends forward
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(-5, -8, 10, 14); // vertical plate bolted to wall
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(-5, -8, 10, 3); // top highlight on plate
    // Bracket bolts (on the wall plate)
    ctx.fillStyle = '#777';
    ctx.beginPath(); ctx.arc(0, -5, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, 2, 2, 0, Math.PI * 2); ctx.fill();
    // Bolt highlight
    ctx.fillStyle = '#999';
    ctx.beginPath(); ctx.arc(-0.5, -5.5, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-0.5, 1.5, 0.8, 0, Math.PI * 2); ctx.fill();

    // Pivot arm — angled down and out from bracket
    ctx.save();
    ctx.rotate(panAngle);

    // Arm
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(dir * 16, 10);
    ctx.stroke();

    // Camera body — boxy rectangle at end of arm
    const camX = dir * 16;
    const camY = 10;
    const camW = 18;
    const camH = 10;

    // Camera housing
    ctx.fillStyle = '#2a2a2a';
    ctx.save();
    ctx.translate(camX, camY);

    // Main body
    ctx.fillRect(dir > 0 ? -2 : -camW + 2, -camH / 2, camW, camH);
    // Front face (lens end) — slightly lighter
    ctx.fillStyle = '#333';
    const frontX = dir > 0 ? camW - 4 : -camW + 2;
    ctx.fillRect(frontX, -camH / 2, 4, camH);

    // Lens — dark circle with glint
    const lensX = dir > 0 ? camW - 2 : -camW + 4;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(lensX, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    // Lens glint
    ctx.fillStyle = 'rgba(180,200,255,0.5)';
    ctx.beginPath();
    ctx.arc(lensX + dir * 0.5, -1, 1, 0, Math.PI * 2);
    ctx.fill();

    // Recording indicator LED — red blinking dot
    const ledOn = Math.floor(t * 1.5) % 2 === 0;
    if(ledOn) {
        ctx.fillStyle = '#ff2020';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 4;
    } else {
        ctx.fillStyle = '#440000';
        ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.arc(dir > 0 ? 2 : -4, -camH / 2 + 2, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Cable dangling from back of camera
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const cableStartX = dir > 0 ? -2 : 2;
    ctx.moveTo(cableStartX, 0);
    ctx.quadraticCurveTo(cableStartX - dir * 6, 8, cableStartX - dir * 3, 14);
    ctx.stroke();

    ctx.restore(); // camera body translate
    ctx.restore(); // pan rotation

    ctx.restore(); // main translate
}

// Ceiling surface strip — draws a visible ceiling at the top of the room
function drawCeilingSurface(ceilingY) {
    ceilingY = ceilingY || 18;
    // Main ceiling slab — dark concrete
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(-GX, -GY, CANVAS_W, ceilingY + GY);
    // Bottom edge — shadow where ceiling meets wall
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-GX, ceilingY, CANVAS_W, 4);
    // Subtle texture lines across ceiling
    ctx.strokeStyle = 'rgba(60,60,60,0.6)';
    ctx.lineWidth = 0.5;
    for(let i = -GY; i < ceilingY; i += 6) {
        ctx.beginPath();
        ctx.moveTo(-GX, i);
        ctx.lineTo(-GX + CANVAS_W, i);
        ctx.stroke();
    }
    // Water stain patches
    ctx.fillStyle = 'rgba(50,45,35,0.35)';
    ctx.beginPath();
    ctx.ellipse(200, ceilingY - 6, 40, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(45,40,30,0.25)';
    ctx.beginPath();
    ctx.ellipse(500, ceilingY - 4, 30, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
}

// Recessed fluorescent ceiling fixture with downward glow
function drawFluorescentLight(cx, ceilingY, len) {
    len = len || 80;
    const hw = len / 2;
    const fy = ceilingY;

    // Housing — dark metal shell flush with ceiling bottom
    ctx.fillStyle = '#2c2c2c';
    ctx.fillRect(cx - hw - 5, fy - 7, len + 10, 8);

    // Inner recess panel
    ctx.fillStyle = '#1e1e1e';
    ctx.fillRect(cx - hw - 2, fy - 6, len + 4, 6);

    // Diffuser panel (frosted plastic)
    ctx.fillStyle = '#c8d8f0';
    ctx.fillRect(cx - hw, fy - 5, len, 5);

    // Bright tube glow — two thin tubes
    ctx.fillStyle = '#e8f2ff';
    ctx.fillRect(cx - hw + 4, fy - 5, len - 8, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx - hw + 6, fy - 4, len - 12, 1);

    // Hot spots at tube ends
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(cx - hw + 4, fy - 5, 8, 2);
    ctx.fillRect(cx + hw - 12, fy - 5, 8, 2);

    // End caps — metallic
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(cx - hw - 5, fy - 7, 5, 8);
    ctx.fillRect(cx + hw, fy - 7, 5, 8);
    // Cap highlight
    ctx.fillStyle = 'rgba(120,120,120,0.5)';
    ctx.fillRect(cx - hw - 5, fy - 7, 2, 8);
    ctx.fillRect(cx + hw, fy - 7, 2, 8);

    // Soft downward illumination cone
    const glow = ctx.createLinearGradient(cx, fy, cx, fy + 80);
    glow.addColorStop(0, 'rgba(200,220,255,0.13)');
    glow.addColorStop(0.5, 'rgba(200,220,255,0.05)');
    glow.addColorStop(1, 'rgba(200,220,255,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(cx - hw - 30, fy, len + 60, 80);

    // Subtle lens flare dot at center
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(cx, fy - 2, 6, 2, 0, 0, Math.PI * 2);
    ctx.fill();
}

// Grimy overhead air duct — rectangular duct running along ceiling
function drawGrimyAirDuct(ductX, ceilingY, ductW) {
    ceilingY = ceilingY || 18;
    ductW = ductW || 140;
    const ductH = 22;
    const dy = ceilingY;

    // Duct body — dull galvanized metal
    ctx.fillStyle = '#5a5a58';
    ctx.fillRect(ductX, dy, ductW, ductH);
    // Top edge (flush with ceiling)
    ctx.fillStyle = '#4e4e4c';
    ctx.fillRect(ductX, dy, ductW, 3);
    // Bottom face highlight
    ctx.fillStyle = '#686864';
    ctx.fillRect(ductX + 2, dy + ductH - 4, ductW - 4, 4);

    // Rivets along edges
    ctx.fillStyle = '#777';
    for(let r = ductX + 10; r < ductX + ductW; r += 20) {
        ctx.beginPath();
        ctx.arc(r, dy + 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(r, dy + ductH - 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Grime/grease streaks dripping down from duct
    ctx.fillStyle = 'rgba(40,35,20,0.35)';
    const drips = [0.1, 0.3, 0.55, 0.78, 0.92];
    for(let d = 0; d < drips.length; d++) {
        const dx = ductX + drips[d] * ductW;
        const dripLen = 8 + (d * 7) % 14;
        ctx.fillRect(dx - 1, dy + ductH, 2, dripLen);
        // Wider grime blob at base
        ctx.beginPath();
        ctx.ellipse(dx, dy + ductH + dripLen, 3, 2, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // Yellowed grease buildup on duct surface
    ctx.fillStyle = 'rgba(80,70,30,0.2)';
    ctx.fillRect(ductX + 5, dy + 4, ductW * 0.6, ductH - 8);
    ctx.fillStyle = 'rgba(60,50,20,0.15)';
    ctx.fillRect(ductX + ductW * 0.5, dy + 6, ductW * 0.4, ductH - 10);

    // Vent slats on bottom face
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    for(let s = ductX + 15; s < ductX + ductW - 10; s += 8) {
        ctx.beginPath();
        ctx.moveTo(s, dy + ductH - 5);
        ctx.lineTo(s + 4, dy + ductH - 1);
        ctx.stroke();
    }

    // Shadow beneath duct
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(ductX - 2, dy + ductH, ductW + 4, 6);
}

// Giant rotating overhead industrial ceiling fan — side-view perspective
function drawIndustrialFan(cx, cy, radius) {
    const t = Date.now() / 1000;
    const bladeCount = 5;
    const rotSpeed = 1.8; // radians per second
    const angle = t * rotSpeed;
    const ceilingY = cy - radius * 0.3;

    ctx.save();

    // Downrod from ceiling to motor
    const rodTop = ceilingY;
    const rodBottom = cy;
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx, rodTop);
    ctx.lineTo(cx, rodBottom);
    ctx.stroke();
    // Rod highlight
    ctx.strokeStyle = 'rgba(120,120,120,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 1, rodTop);
    ctx.lineTo(cx - 1, rodBottom);
    ctx.stroke();

    // Ceiling canopy (flush-mount plate at ceiling)
    ctx.fillStyle = '#4a4a4a';
    ctx.beginPath();
    ctx.ellipse(cx, rodTop, 12, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Motor housing — foreshortened ellipse (viewed from below-side)
    const motorW = radius * 0.16;
    const motorH = radius * 0.10;
    ctx.fillStyle = '#505050';
    ctx.beginPath();
    ctx.ellipse(cx, cy, motorW, motorH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5a5a5a';
    ctx.beginPath();
    ctx.ellipse(cx - 1, cy - 1, motorW * 0.7, motorH * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Rotating blades — foreshortened perspective
    // In side view, blades sweep left-right and appear thin vertically
    const squash = 0.22; // vertical foreshortening
    for(let i = 0; i < bladeCount; i++) {
        const bladeAngle = angle + (i / bladeCount) * Math.PI * 2;
        const bladeX = Math.cos(bladeAngle) * radius;
        const bladeY = Math.sin(bladeAngle) * radius * squash;

        // Blade opacity varies with depth (back blades dimmer)
        const depth = Math.sin(bladeAngle);
        const alpha = 0.35 + depth * 0.25;
        const shade = Math.floor(55 + depth * 15);

        ctx.save();
        ctx.translate(cx, cy);

        // Blade body — tapered, perspective-correct
        ctx.beginPath();
        ctx.moveTo(0, -2);
        ctx.lineTo(bladeX * 0.15, bladeY * 0.15 - 2);
        ctx.lineTo(bladeX, bladeY - 1.5);
        ctx.lineTo(bladeX * 1.02, bladeY);
        ctx.lineTo(bladeX, bladeY + 1.5);
        ctx.lineTo(bladeX * 0.15, bladeY * 0.15 + 2);
        ctx.lineTo(0, 2);
        ctx.closePath();
        ctx.fillStyle = `rgba(${shade},${shade},${shade},${alpha.toFixed(2)})`;
        ctx.fill();

        // Blade edge highlight
        if(depth > 0) {
            ctx.strokeStyle = `rgba(140,140,140,${(alpha * 0.5).toFixed(2)})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(bladeX * 0.2, bladeY * 0.2 - 1.8);
            ctx.lineTo(bladeX * 0.9, bladeY * 0.9 - 1.3);
            ctx.stroke();
        }

        ctx.restore();
    }

    // Motion blur ring — subtle sweep to sell rotation
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#888';
    ctx.lineWidth = radius * 0.06;
    ctx.beginPath();
    ctx.ellipse(cx, cy, radius * 0.85, radius * squash * 0.85, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Redraw motor hub on top of blades
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(cx, cy, motorW * 0.6, motorH * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

// === LANDSCAPE EDGE DRAWING HELPERS ===
// Draws a bolted gasket matching the level 5 hallway style at any position
function drawGasket(x, y, radius) {
    const r = radius || 18;
    ctx.fillStyle = '#999';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(x, y, r * 0.78, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(x, y, r * 0.44, 0, Math.PI * 2);
    ctx.fill();
    const boltCount = r > 14 ? 6 : 4;
    for (let b = 0; b < boltCount; b++) {
        const angle = (b / boltCount) * Math.PI * 2;
        const bx = x + Math.cos(angle) * (r * 0.67);
        const by = y + Math.sin(angle) * (r * 0.67);
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(bx, by, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Draws a wooden door matching the hallway style (brown frame, dark panel, gold knob)
function drawEdgeDoor(x, y, w, h) {
    ctx.fillStyle = '#654321';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#4a3a1a';
    ctx.fillRect(x + 4, y + 5, w - 8, h - 5);
    // Panel inset
    ctx.strokeStyle = '#3a2a0a';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 8, y + 10, w - 16, h / 2 - 15);
    ctx.strokeRect(x + 8, y + h / 2, w - 16, h / 2 - 10);
    // Gold doorknob
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(x + w - 12, y + h / 2, 3, 0, Math.PI * 2);
    ctx.fill();
}

// Death Star trapezoidal blast door — used for supercomputer room entry/exit
// side: 'right' (pipe room, door on right) or 'left' (megacomputer, door on left)
// openPct: 0 (closed) to 1 (fully open) for blade animation
// showKeypad: whether to draw keypad panel
// unlocked: door lock state
function drawDeathStarBlastDoor(x, y, w, h, side, openPct, showKeypad, unlocked) {
    const t = Date.now();
    const frameW = 14;
    const trapInset = 12; // trapezoidal taper amount

    // Outer trapezoidal frame — dark gunmetal
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    if (side === 'right') {
        ctx.moveTo(x - frameW - 4, y - 24 + trapInset);
        ctx.lineTo(x + w + frameW + 4, y - 24);
        ctx.lineTo(x + w + frameW + 4, y + h + 8);
        ctx.lineTo(x - frameW - 4, y + h + 8 - trapInset);
    } else {
        ctx.moveTo(x - frameW - 4, y - 24);
        ctx.lineTo(x + w + frameW + 4, y - 24 + trapInset);
        ctx.lineTo(x + w + frameW + 4, y + h + 8 - trapInset);
        ctx.lineTo(x - frameW - 4, y + h + 8);
    }
    ctx.closePath();
    ctx.fill();

    // Inner frame plate — slightly lighter
    ctx.fillStyle = '#222';
    ctx.beginPath();
    if (side === 'right') {
        ctx.moveTo(x - frameW, y - 20 + trapInset * 0.8);
        ctx.lineTo(x + w + frameW, y - 20);
        ctx.lineTo(x + w + frameW, y + h + 4);
        ctx.lineTo(x - frameW, y + h + 4 - trapInset * 0.8);
    } else {
        ctx.moveTo(x - frameW, y - 20);
        ctx.lineTo(x + w + frameW, y - 20 + trapInset * 0.8);
        ctx.lineTo(x + w + frameW, y + h + 4 - trapInset * 0.8);
        ctx.lineTo(x - frameW, y + h + 4);
    }
    ctx.closePath();
    ctx.fill();

    // Side frame pillars with brushed steel gradient
    const leftPillarX = (side === 'right') ? x - frameW : x - frameW;
    const rightPillarX = x + w;
    // Left pillar
    const lpGrad = ctx.createLinearGradient(leftPillarX, 0, leftPillarX + frameW, 0);
    lpGrad.addColorStop(0, '#2a2a2a');
    lpGrad.addColorStop(0.5, '#444');
    lpGrad.addColorStop(1, '#2a2a2a');
    ctx.fillStyle = lpGrad;
    ctx.fillRect(leftPillarX, y - 2, frameW, h + 4);
    // Right pillar
    const rpGrad = ctx.createLinearGradient(rightPillarX, 0, rightPillarX + frameW, 0);
    rpGrad.addColorStop(0, '#2a2a2a');
    rpGrad.addColorStop(0.5, '#444');
    rpGrad.addColorStop(1, '#2a2a2a');
    ctx.fillStyle = rpGrad;
    ctx.fillRect(rightPillarX, y - 2, frameW, h + 4);

    // Top header plate
    ctx.fillStyle = '#333';
    ctx.fillRect(x - 2, y - 20, w + 4, 18);
    // Hazard chevrons on header
    for (let ch = 0; ch < Math.floor(w / 14); ch++) {
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(x + 4 + ch * 14, y - 18, 7, 14);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x + 9 + ch * 14, y - 18, 5, 14);
    }

    // Exposed wiring conduits on left pillar
    const wireColors = ['#ff3333', '#00ccff', '#ffd700', '#00ff88'];
    for (let wi = 0; wi < 4; wi++) {
        const wy = y + 10 + wi * (h / 5);
        ctx.strokeStyle = wireColors[wi];
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(leftPillarX - 6, wy);
        ctx.quadraticCurveTo(leftPillarX - 2, wy + 6, leftPillarX + 2, wy);
        ctx.stroke();
        // Small connector dot
        ctx.fillStyle = wireColors[wi];
        ctx.beginPath();
        ctx.arc(leftPillarX - 6, wy, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Blinking indicator lights on right pillar
    for (let li = 0; li < 5; li++) {
        const ly = y + 8 + li * (h / 6);
        const blinkOn = Math.sin(t / 350 + li * 1.3) > 0;
        ctx.fillStyle = blinkOn ? '#00ff88' : '#0a2a0a';
        ctx.beginPath();
        ctx.arc(rightPillarX + frameW + 5, ly, 3, 0, Math.PI * 2);
        ctx.fill();
        if (blinkOn) {
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(rightPillarX + frameW + 5, ly, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
    // Red warning light at top center
    const redBlink = Math.sin(t / 500) > 0;
    ctx.fillStyle = redBlink ? '#ff3333' : '#2a0a0a';
    ctx.beginPath();
    ctx.arc(x + w / 2, y - 24 + (side === 'right' ? trapInset / 2 : trapInset / 2), 4, 0, Math.PI * 2);
    ctx.fill();
    if (redBlink) {
        ctx.shadowColor = '#ff3333';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(x + w / 2, y - 24 + trapInset / 2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Door opening / blade animation
    if (openPct > 0.02) {
        // Dark recessed interior behind door
        ctx.fillStyle = '#050505';
        ctx.fillRect(x, y, w, h);
        // Green LED edge strips inside
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 10;
        ctx.fillRect(x + 1, y, 2, h);
        ctx.fillRect(x + w - 3, y, 2, h);
        ctx.shadowBlur = 0;
    }

    // Blade door panels — split top/bottom, retract into frame
    const bladeTopH = (h / 2) * (1 - openPct);
    const bladeBotH = (h / 2) * (1 - openPct);
    if (bladeTopH > 1) {
        // Top blade
        const tGrad = ctx.createLinearGradient(x, y, x, y + bladeTopH);
        tGrad.addColorStop(0, '#666');
        tGrad.addColorStop(0.3, '#888');
        tGrad.addColorStop(0.7, '#777');
        tGrad.addColorStop(1, '#555');
        ctx.fillStyle = tGrad;
        ctx.fillRect(x, y, w, bladeTopH);
        // Reinforcement ribs
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(x + 3, y + bladeTopH - 4, w - 6, 3);
        ctx.fillRect(x + 3, y + 4, w - 6, 3);
        // Center seam
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + w / 2, y);
        ctx.lineTo(x + w / 2, y + bladeTopH);
        ctx.stroke();
        // Cyan LED strip at seam edge
        ctx.fillStyle = unlocked ? '#00ff88' : '#00ccff';
        ctx.shadowColor = unlocked ? '#00ff88' : '#00ccff';
        ctx.shadowBlur = 4;
        ctx.fillRect(x + 4, y + bladeTopH - 2, w - 8, 2);
        ctx.shadowBlur = 0;
    }
    if (bladeBotH > 1) {
        const botY = y + h - bladeBotH;
        // Bottom blade
        const bGrad = ctx.createLinearGradient(x, botY, x, botY + bladeBotH);
        bGrad.addColorStop(0, '#555');
        bGrad.addColorStop(0.3, '#777');
        bGrad.addColorStop(0.7, '#888');
        bGrad.addColorStop(1, '#666');
        ctx.fillStyle = bGrad;
        ctx.fillRect(x, botY, w, bladeBotH);
        // Reinforcement ribs
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(x + 3, botY + 1, w - 6, 3);
        ctx.fillRect(x + 3, botY + bladeBotH - 7, w - 6, 3);
        // Center seam
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + w / 2, botY);
        ctx.lineTo(x + w / 2, botY + bladeBotH);
        ctx.stroke();
        // Cyan LED strip at seam edge
        ctx.fillStyle = unlocked ? '#00ff88' : '#00ccff';
        ctx.shadowColor = unlocked ? '#00ff88' : '#00ccff';
        ctx.shadowBlur = 4;
        ctx.fillRect(x + 4, botY, w - 8, 2);
        ctx.shadowBlur = 0;
    }

    // Keypad panel
    if (showKeypad) {
        const kpSide = (side === 'right') ? rightPillarX + frameW + 8 : leftPillarX - 28;
        const kpY = y + 30;
        // Dark mounting plate
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(kpSide - 2, kpY - 6, 24, 44);
        ctx.fillStyle = '#111';
        ctx.fillRect(kpSide, kpY - 4, 20, 40);
        // Screen
        ctx.fillStyle = unlocked ? '#002200' : '#002211';
        ctx.fillRect(kpSide + 2, kpY - 2, 16, 10);
        ctx.fillStyle = unlocked ? '#00ff88' : '#00ccff';
        ctx.font = 'bold 6px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(unlocked ? 'OPEN' : 'LOCK', kpSide + 10, kpY + 6);
        // Button grid
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 3; c++) {
                const bOn = Math.sin(t / 300 + r * 2 + c) > 0.3;
                ctx.fillStyle = unlocked ? (bOn ? '#00ff88' : '#003311') : (bOn ? '#00ccff' : '#004455');
                ctx.fillRect(kpSide + 2 + c * 6, kpY + 12 + r * 8, 4, 6);
            }
        }
        // Status indicator
        const indColor = unlocked ? '#00ff88' : '#ff3333';
        ctx.fillStyle = indColor;
        ctx.shadowColor = indColor;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(kpSide + 10, kpY - 10, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// Right-side gasket + boss door at pipe termination (levels 1-5 pipe rooms)
// Pipe inserts into gasket hole — matching level 5 hallway style (dark center = depth)
function drawPipeRoomRightWall(gasketY) {
    if (GX <= 5) return;

    // Bolted gasket at x=700 wall — dark center opening creates depth illusion
    // Pipe ends 6px before gasket center; #444 center = hole pipe enters
    drawGasket(700, gasketY);

    // Boss door
    if (level >= 1) {
        // Door matching hallway door size (50x60), at right edge
        const doorX = 686, doorY = 340, doorW = 50, doorH = 60;
        if (bossDoor.state === 'open' || bossDoor.openPct > 0) {
            // Open door frame — wide dark opening boss emerges from
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(doorX, doorY, doorW, doorH);
            // Swung door (perspective: narrow slice on the right)
            const swingW = doorW * (1 - bossDoor.openPct) * 0.8;
            if (swingW > 2) {
                ctx.fillStyle = '#654321';
                ctx.fillRect(doorX + doorW - swingW, doorY + 2, swingW, doorH - 4);
                ctx.fillStyle = '#4a3a1a';
                ctx.fillRect(doorX + doorW - swingW + 3, doorY + 6, swingW - 6, doorH - 12);
            }
            // Door frame molding
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.strokeRect(doorX - 1, doorY - 1, doorW + 2, doorH + 2);
            // Door frame header
            ctx.fillStyle = '#666';

        } else {

}

// Edge door for level 6 room transitions (matching room aesthetic)
function drawLevel6EdgeDoor(side, roomStyle) {
    if (GX <= 5) return;
    const x = side === 'left' ? -6 : 670;
    const doorW = 40;
    const doorH = 80;
    const doorY = 320;

    if (roomStyle === 'dark') {
        // Dark steel door for megacomputer/dark rooms
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(x, doorY, doorW, doorH);
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(x + 3, doorY + 4, doorW - 6, doorH - 4);
        ctx.strokeStyle = '#4a4a4a';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 6, doorY + 8, doorW - 12, doorH / 2 - 12);
        ctx.strokeRect(x + 6, doorY + doorH / 2, doorW - 12, doorH / 2 - 8);
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(side === 'left' ? x + doorW - 10 : x + 10, doorY + doorH / 2, 3, 0, Math.PI * 2);
        ctx.fill();
    } else if (roomStyle === 'red') {
        // Wooden door with red tint for entryway
        ctx.fillStyle = '#5a2a1a';
        ctx.fillRect(x, doorY, doorW, doorH);
        ctx.fillStyle = '#4a1a0a';
        ctx.fillRect(x + 4, doorY + 5, doorW - 8, doorH - 5);
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(side === 'left' ? x + doorW - 10 : x + 10, doorY + doorH / 2, 3, 0, Math.PI * 2);
        ctx.fill();
    } else {
        // Standard wooden door for pipe room
        drawEdgeDoor(x, doorY, doorW, doorH);
    }
}

            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.fillRect(-n.w/2 + 2, -n.h/2 + 2, n.w, n.h);

            }

}

        const pipeY = 210;

        // Outer bevel ring (mounted in wall)
        ctx.fillStyle = '#999';
        ctx.beginPath();
        ctx.arc(npc.x, gasketY, 18, 0, Math.PI * 2);
        ctx.fill();

        // Inner gasket plate (recessed)
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(npc.x, gasketY, 14, 0, Math.PI * 2);
        ctx.fill();

        // Center pipe opening
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.arc(npc.x, gasketY, 8, 0, Math.PI * 2);
        ctx.fill();

        // Round bolts around the bevel (6 bolts evenly spaced)
        for(let b = 0; b < 6; b++) {
            const angle = (b / 6) * Math.PI * 2;
            const boltX = npc.x + Math.cos(angle) * 12;
            const boltY = gasketY + Math.sin(angle) * 12;

            // Bolt head
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.arc(boltX, boltY, 3, 0, Math.PI * 2);

            ctx.beginPath();
            ctx.arc(boltX, boltY, 1.5, 0, Math.PI * 2);
            ctx.fill();

        // Wall shadow — pipe protrudes from wall, casts shadow to right/below
        ctx.strokeStyle = 'rgba(0,0,0,0.22)';
        ctx.lineWidth = 20;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(npc.x + 5, gasketY + 8);
        ctx.lineTo(npc.x + 5, pipeY);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(0,0,0,0.18)';
        ctx.lineWidth = 20;
        ctx.lineCap = 'butt';
        ctx.beginPath();
        ctx.moveTo(npc.x + 25, pipeY + 29);
        ctx.lineTo(694, pipeY + 29);
        ctx.stroke();

        // Pipe starts from inner gasket opening
        ctx.strokeStyle = npc.color.hex;
        ctx.lineWidth = 14;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(npc.x, gasketY + 8);
        ctx.lineTo(npc.x, pipeY);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(npc.x - 4, gasketY + 8);
        ctx.lineTo(npc.x - 4, pipeY);
        ctx.stroke();

        ctx.strokeStyle = npc.color.hex;
        ctx.lineWidth = 14;
        ctx.beginPath();
        ctx.moveTo(npc.x, pipeY);
        ctx.quadraticCurveTo(npc.x, pipeY + 25, npc.x + 25, pipeY + 25);
        ctx.lineTo(694, pipeY + 25);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(npc.x + 21, pipeY + 25);
        ctx.lineTo(694, pipeY + 25);
        ctx.stroke();

        // Animated flow effect on horizontal pipe section
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 6;
        ctx.setLineDash([12, 18]);
        ctx.lineDashOffset = -Date.now() / 150;
        ctx.beginPath();
        ctx.moveTo(npc.x + 25, pipeY + 25);
        ctx.lineTo(694, pipeY + 25);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // Diagonal swell — colored bars on vertical pipe above valve (hidden while PM is fixing)
        if(npc.needsDoc && npc.crackStartTime && npc.state !== 'fixing') {
            const crackTime = Date.now() - npc.crackStartTime;
            const pct = Math.min(crackTime / 15000, 1);
            ctx.fillStyle = npc.color.hex;
            ctx.globalAlpha = 0.4 + pct * 0.6;
            const sz = 18 + pct * 28;
            for(let i = 0; i < 3; i++) {
                ctx.fillRect(npc.x - sz / 2 + (i - 1) * 5, pipeY - 55 + i * 8, sz, 8);
            }
            ctx.globalAlpha = 1;
        }

        // Hand wheel turn-valve on horizontal pipe section (right of elbow)
        drawHandWheelValve(npc.x + 60, pipeY + 25, npc, true);

        // Color-coordinated step-ladder (drawn behind NPC)
        drawStepLadder(npc.x, npc.y, npc.color);
        drawNPC(npc);
    }

    drawMulletPro(level5.mulletPro.x, level5.mulletPro.y, level5.mulletPro.facing, level5.mulletPro.hasDoc);

    if(level5.mulletPro.hasDoc && level5.mulletPro.docColor) {
        drawHeldDoc(level5.mulletPro.x, level5.mulletPro.y, level5.mulletPro.docColor.name);
    }

    // Overhead ceiling fixtures (drawn after pipes so they render in front)
    drawIndustrialFan(420, 52, 80);
    // CCTV on back wall, right side — mid-height, pointing left toward PMs
    drawCCTVCamera(640, 185, false);

    // Right edge door prompt
    if(player.x >= 600) {
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(660 - 85, 308, 170, 24);
        ctx.fillStyle = '#ffd700';
        ctx.fillText('[ ACTION ] HALLWAY \u2192', 660, 325);
    }
}

// SECTION 10: Level 5 Scene Drawing Functions (Part 2)
function drawLevel5FurnaceRoom() {
    ctx.fillStyle = '#2b2520';
    ctx.fillRect(-GX, -GY, CANVAS_W, CANVAS_H);
    
    ctx.fillStyle = '#1a1815';
    ctx.fillRect(-GX, 400, CANVAS_W, CANVAS_H);
    
    for(let i = -4; i < 24; i++) {
        for(let j = 0; j < 3; j++) {
            ctx.strokeStyle = '#0a0a08';
            ctx.lineWidth = 1;
            ctx.strokeRect(i * 35, 400 + j * 33, 35, 33);
        }
    }
    
    const furnace = level5.furnaceRoom.furnace;
    level5.furnaceRoom.furnace.glowPhase += 0.05;
    const glowIntensity = Math.sin(level5.furnaceRoom.furnace.glowPhase) * 0.3 + 0.7;
    
    const gradient = ctx.createRadialGradient(furnace.x, furnace.y, 20, furnace.x, furnace.y, 120);
    gradient.addColorStop(0, `rgba(255,100,0,${glowIntensity * 0.6})`);
    gradient.addColorStop(0.5, `rgba(255,50,0,${glowIntensity * 0.3})`);
    gradient.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(furnace.x, furnace.y, 120, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(furnace.x - 60, furnace.y - 40, 120, 80);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(furnace.x - 50, furnace.y - 30, 100, 60);
    
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(furnace.x - 40, furnace.y - 20, 80, 40);
    
    const isFlaming = Date.now() - furnace.flameTime < 2000;
    if(isFlaming) {
        const flameAlpha = Math.max(0, 1 - (Date.now() - furnace.flameTime) / 2000);
        for(let i = 0; i < 5; i++) {
            const flameY = furnace.y - 10 + Math.sin(frame * 0.3 + i) * 8;
            const flameH = 30 + Math.cos(frame * 0.2 + i) * 10;
            ctx.fillStyle = `rgba(255,${100 + i * 30},0,${flameAlpha * 0.8})`;
            ctx.fillRect(furnace.x - 30 + i * 15, flameY, 8, flameH);
        }
    } else {
        ctx.fillStyle = `rgba(255,100,0,${glowIntensity})`;
        ctx.fillRect(furnace.x - 35, furnace.y - 15, 70, 30);
    }

    // Analog number counter — padlock-style tumbler dial showing docs remaining
    const counterX = furnace.x + 50;
    const counterY = furnace.y - 10;
    const docsRemaining = 6 - level5.docsCollected;
    // Counter housing — dark metal box
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(counterX - 14, counterY - 16, 28, 32);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(counterX - 14, counterY - 16, 28, 32);
    // Inner number window — recessed slot
    ctx.fillStyle = '#111';
    ctx.fillRect(counterX - 10, counterY - 10, 20, 20);
    // Number display — single digit, side-facing tumbler style
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(counterX - 8, counterY - 8, 16, 16);
    // Tumbler number
    ctx.fillStyle = docsRemaining > 0 ? '#ff6600' : '#00ff88';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(docsRemaining.toString(), counterX, counterY);
    ctx.textBaseline = 'alphabetic';
    // Tumbler groove lines (top and bottom of digit window)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(counterX - 8, counterY - 4); ctx.lineTo(counterX + 8, counterY - 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(counterX - 8, counterY + 4); ctx.lineTo(counterX + 8, counterY + 4); ctx.stroke();
    // Mounting screws
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(counterX - 10, counterY - 12, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(counterX + 10, counterY - 12, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(counterX - 10, counterY + 12, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(counterX + 10, counterY + 12, 2, 0, Math.PI * 2); ctx.fill();
    // Screw slots
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for(let sc of [[-10,-12],[10,-12],[-10,12],[10,12]]) {
        ctx.beginPath();
        ctx.moveTo(counterX + sc[0] - 1.5, counterY + sc[1]);
        ctx.lineTo(counterX + sc[0] + 1.5, counterY + sc[1]);
        ctx.stroke();
    }

    ctx.fillStyle = '#654321';
    ctx.fillRect(level5.furnaceRoom.leftDoor.x - 10, level5.furnaceRoom.leftDoor.y, 50, 60);
    ctx.fillStyle = '#4a3a1a';
    ctx.fillRect(level5.furnaceRoom.leftDoor.x - 5, level5.furnaceRoom.leftDoor.y + 5, 40, 50);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(level5.furnaceRoom.leftDoor.x + 30, level5.furnaceRoom.leftDoor.y + 30, 3, 0, Math.PI * 2);
    ctx.fill();

    if(Math.abs(player.x - level5.furnaceRoom.leftDoor.x) < 50) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('← HALLWAY', level5.furnaceRoom.leftDoor.x + 15, level5.furnaceRoom.leftDoor.y - 10);
    }
    
    if(Math.abs(player.x - furnace.x) < 90 && !player.holding && !level5.redKeyOnGround) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('FURNACE', furnace.x, furnace.y - 60);
    }
    if(Math.abs(player.x - furnace.x) < 90 && player.holding) {
        ctx.fillStyle = 'rgba(0,0,0,0.82)';
        ctx.fillRect(furnace.x - 130, furnace.y - 76, 260, 24);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('[ ACTION ] - BURN DOC', furnace.x, furnace.y - 58);
    }

    // Draw golden key on the ground (dropped from furnace after burning red doc)
    if(level5.redKeyOnGround) {
        const kx = furnace.x, ky = 385;
        // Glow effect
        ctx.fillStyle = 'rgba(255,215,0,0.25)';
        ctx.beginPath();
        ctx.arc(kx, ky, 20, 0, Math.PI * 2);
        ctx.fill();
        // Key ring (red keychain)
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(kx - 6, ky - 6, 6, 0, Math.PI * 2);
        ctx.stroke();
        // Key shaft
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(kx, ky - 2);
        ctx.lineTo(kx + 14, ky - 2);
        ctx.stroke();
        // Key teeth
        ctx.beginPath();
        ctx.moveTo(kx + 10, ky - 2);
        ctx.lineTo(kx + 10, ky + 4);
        ctx.moveTo(kx + 14, ky - 2);
        ctx.lineTo(kx + 14, ky + 4);
        ctx.stroke();
        // Pickup prompt
        if(Math.abs(player.x - furnace.x) < 60 && !player.holding) {
            ctx.fillStyle = 'rgba(0,0,0,0.82)';
            ctx.fillRect(kx - 120, ky - 46, 240, 24);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('[ ACTION ] - PICK UP KEY', kx, ky - 28);
        }
    }

    // Concealed right door — passage to cloning room (visible when unlocked)
    const rdX = 640, rdY = 340, rdW = 50, rdH = 60;
    if (level6.cloningDoorUnlocked) {
        // Open passage with dark interior and green LED edge
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(rdX, rdY, rdW, rdH);
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 6;
        ctx.fillRect(rdX, rdY, 2, rdH);
        ctx.shadowBlur = 0;
        // Subtle frame outline
        ctx.strokeStyle = '#3a3a3a';
        ctx.lineWidth = 2;
        ctx.strokeRect(rdX, rdY, rdW, rdH);

        if (player.x > 600) {
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(rdX + rdW/2 - 55, rdY - 20, 110, 18);
            ctx.fillStyle = '#00ff88';
            ctx.fillText('CLONING LAB →', rdX + rdW/2, rdY - 6);
        }
    }
}

// Yellow cat drawing — sits, looks around, walks toward player
function drawYellowCat(x, y, facing, state) {
    const t = Date.now();
    const tailWag = Math.sin(t / 300) * 18;
    ctx.save();
    ctx.translate(x, y);
    if(facing === 'right') ctx.scale(-1, 1);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 2, 10, 3, 0, 0, Math.PI * 2); ctx.fill();

    // Tail (behind body)
    ctx.strokeStyle = '#d4a017'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(8, -4);
    ctx.quadraticCurveTo(20 + Math.cos(t/400)*4, -10, 16 + Math.cos(t/400)*8, -20 + Math.sin(t/400)*5);
    ctx.stroke();
    ctx.strokeStyle = '#f5c842'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(8, -4);
    ctx.quadraticCurveTo(20 + Math.cos(t/400)*4, -10, 16 + Math.cos(t/400)*8, -20 + Math.sin(t/400)*5);
    ctx.stroke();

    // Body
    ctx.fillStyle = '#d4a017';
    ctx.beginPath(); ctx.ellipse(0, -6, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
    // Belly highlight
    ctx.fillStyle = '#f5d060';
    ctx.beginPath(); ctx.ellipse(0, -5, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Back stripe
    ctx.strokeStyle = '#b8861e'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-4, -12); ctx.lineTo(-3, -2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, -13); ctx.lineTo(1, -2); ctx.stroke();

    // Head
    ctx.fillStyle = '#d4a017';
    ctx.beginPath(); ctx.arc(-1, -18, 9, 0, Math.PI * 2); ctx.fill();

    // Ears
    ctx.fillStyle = '#d4a017';
    ctx.beginPath(); ctx.moveTo(-9, -24); ctx.lineTo(-4, -30); ctx.lineTo(0, -23); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(7, -24); ctx.lineTo(10, -31); ctx.lineTo(12, -23); ctx.closePath(); ctx.fill();
    // Inner ear
    ctx.fillStyle = '#e8a0a0';
    ctx.beginPath(); ctx.moveTo(-8, -25); ctx.lineTo(-4, -29); ctx.lineTo(-1, -24); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(8, -25); ctx.lineTo(10, -30); ctx.lineTo(11, -24); ctx.closePath(); ctx.fill();

    // Eyes — blink occasionally
    const blink = Math.floor(t / 3000) % 8 === 0 && (t % 3000) < 150;
    ctx.fillStyle = '#2a8a2a';
    if(blink) {
        ctx.fillRect(-6, -20, 4, 1);
        ctx.fillRect(2, -20, 4, 1);
    } else {
        ctx.beginPath(); ctx.arc(-4, -19, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -19, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-4, -19, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -19, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(-3.3, -19.6, 0.7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(3.7, -19.6, 0.7, 0, Math.PI * 2); ctx.fill();
    }

    // Nose + mouth
    ctx.fillStyle = '#e88080';
    ctx.beginPath(); ctx.moveTo(-1, -15); ctx.lineTo(1, -15); ctx.lineTo(0, -14); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#b86060'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(-2, -12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(2, -12); ctx.stroke();

    // Whiskers
    ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-2, -15); ctx.lineTo(-12, -14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2, -15); ctx.lineTo(-11, -12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, -15); ctx.lineTo(12, -14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, -15); ctx.lineTo(11, -12); ctx.stroke();

    // Legs (animated when walking)
    const legAnim = state === 'walking' ? Math.sin(t / 120) * 5 : 0;
    ctx.fillStyle = '#d4a017';
    ctx.fillRect(-8, -2, 5, 6 + legAnim);
    ctx.fillRect(-2, -2, 5, 6 - legAnim);
    // Paws
    ctx.fillStyle = '#e8c040';
    ctx.beginPath(); ctx.ellipse(-5.5, 4 + legAnim, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0.5, 4 - legAnim, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
}

// Office plant — tropical floor plant (snake plant / monstera style)
function drawOfficePlant(x, y) {
    // Terracotta pot
    ctx.fillStyle = '#c1683a';
    ctx.beginPath();
    ctx.moveTo(x - 16, y);
    ctx.lineTo(x - 12, y - 22);
    ctx.lineTo(x + 12, y - 22);
    ctx.lineTo(x + 16, y);
    ctx.closePath(); ctx.fill();
    // Pot rim
    ctx.fillStyle = '#d4774a';
    ctx.fillRect(x - 17, y - 24, 34, 5);
    // Pot detail band
    ctx.strokeStyle = '#a85428'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x - 15, y - 10); ctx.lineTo(x + 15, y - 10); ctx.stroke();
    // Soil
    ctx.fillStyle = '#4a3020';
    ctx.beginPath();
    ctx.ellipse(x, y - 23, 11, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Large tropical leaves
    const leaves = [
        {ox: -6, oy: -28, angle: -0.7, len: 42, w: 10},
        {ox: 6, oy: -32, angle: 0.5, len: 46, w: 11},
        {ox: 0, oy: -26, angle: -1.4, len: 36, w: 9},
        {ox: -4, oy: -36, angle: 0.2, len: 50, w: 12},
        {ox: 8, oy: -28, angle: 1.1, len: 38, w: 9},
    ];
    for(let l of leaves) {
        ctx.save();
        ctx.translate(x + l.ox, y + l.oy);
        ctx.rotate(l.angle);
        // Leaf body
        const leafGrad = ctx.createLinearGradient(0, 0, 0, -l.len);
        leafGrad.addColorStop(0, '#228b22');
        leafGrad.addColorStop(0.5, '#2ea52e');
        leafGrad.addColorStop(1, '#1a6e1a');
        ctx.fillStyle = leafGrad;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-l.w, -l.len * 0.4, -l.w * 0.8, -l.len * 0.7, 0, -l.len);
        ctx.bezierCurveTo(l.w * 0.8, -l.len * 0.7, l.w, -l.len * 0.4, 0, 0);
        ctx.fill();
        // Midrib
        ctx.strokeStyle = '#1a6e1a'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l.len); ctx.stroke();
        // Monstera splits (on larger leaves)
        if(l.len > 40) {
            ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-l.w*0.5, -l.len*0.5); ctx.lineTo(-l.w*0.6, -l.len*0.65); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(l.w*0.5, -l.len*0.6); ctx.lineTo(l.w*0.7, -l.len*0.75); ctx.stroke();
        }
        ctx.restore();
    }
}

// Blue futon — low Japanese-style sofa bed
function drawBlueFuton(x, y) {

    ctx.fillRect(x + 40, y + 2, 8, 8);

    ctx.fillRect(x - 48, y - 20, 96, 18);
    // Base cushion top highlight

    ctx.fillRect(x - 48, y - 20, 96, 4);
    // Seat cushion dividers
    ctx.strokeStyle = '#163880'; ctx.lineWidth = 1;
    for(let c = 0; c < 3; c++) {
        ctx.beginPath(); ctx.moveTo(x - 16 + c * 16, y - 20); ctx.lineTo(x - 16 + c * 16, y - 2); ctx.stroke();
    }
    // Backrest
    ctx.fillStyle = futonColor;
    ctx.fillRect(x - 50, y - 50, 14, 32);

    ctx.fillRect(x - 50, y - 50, 14, 5);

    for(let b = 0; b < 3; b++) {
        ctx.beginPath(); ctx.arc(x - 43, y - 42 + b * 10, 2, 0, Math.PI * 2); ctx.fill();
    }
    // Throw pillow — right side of seat, away from head end
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(x + 22, y - 18, 16, 14);
    ctx.fillStyle = '#ffa500';
    ctx.strokeStyle = '#cc8800'; ctx.lineWidth = 0.8;
    ctx.strokeRect(x + 24, y - 16, 12, 10);
    // Piping trim
    ctx.fillStyle = '#4a90d9';
    ctx.fillRect(x - 48, y - 2, 96, 3);
    // Armrest left

    ctx.fillRect(x - 50, y - 22, 8, 22);
    ctx.fillStyle = futonHighlight;
    ctx.fillRect(x - 50, y - 22, 8, 4);
    // Armrest right
    ctx.fillStyle = futonColor;
    ctx.fillRect(x + 42, y - 22, 8, 22);
    ctx.fillStyle = futonHighlight;
    ctx.fillRect(x + 42, y - 22, 8, 4);
}

// Draw boss reclining on futon after a nap
// Futon center passed as fx,fy (560,360). Seat cushion: y=fy-20..fy-2, x=fx-48..fx+48.
function drawRecliningBoss(fx, fy) {
    const skin = '#f5c89a';
    const shirtColor = '#ffffff';  // boss white dress shirt
    const shirtShade = '#e0e0e0';  // shirt shadow side
    const tieColor   = '#1a1a1a';  // black tie
    const pantsColor = '#2b2b2b';  // dark slacks
    const shoeColor  = '#1a1a1a';  // dark dress shoes
    const cy = fy - 11; // vertical center of seat cushion

    // Head pillow (cream) at left end of cushion
    ctx.fillStyle = '#f0ede0';
    ctx.fillRect(fx - 46, cy - 8, 24, 16);
    ctx.strokeStyle = '#c8c4b0'; ctx.lineWidth = 0.8;
    ctx.strokeRect(fx - 46, cy - 8, 24, 16);
    ctx.lineWidth = 1;

    // Dark slacks — right two-thirds of figure
    ctx.fillStyle = pantsColor;
    ctx.fillRect(fx + 2, cy - 7, 46, 14);
    // Trouser crease
    ctx.strokeStyle = '#444'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(fx + 2, cy); ctx.lineTo(fx + 48, cy); ctx.stroke();
    ctx.lineWidth = 1;

    // Dark dress shoes at right end
    ctx.fillStyle = shoeColor;
    ctx.fillRect(fx + 44, cy - 7, 14, 6);
    ctx.fillRect(fx + 44, cy + 1, 14, 6);
    // Shoe shine highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(fx + 46, cy - 6, 5, 2);
    ctx.fillRect(fx + 46, cy + 2, 5, 2);

    // White dress shirt torso
    ctx.fillStyle = shirtColor;
    ctx.fillRect(fx - 26, cy - 8, 34, 16);
    // Shirt shadow edge
    ctx.fillStyle = shirtShade;
    ctx.fillRect(fx + 6, cy - 8, 2, 16);
    // Black tie running down center
    ctx.fillStyle = tieColor;
    ctx.fillRect(fx - 11, cy - 8, 3, 16);

    // Shirt sleeves alongside body (skin at cuffs)
    ctx.fillStyle = shirtColor;
    ctx.fillRect(fx - 24, cy - 10, 30, 4);  // top arm
    ctx.fillRect(fx - 24, cy + 6,  30, 4);  // bottom arm
    // Skin hands
    ctx.fillStyle = skin;
    ctx.fillRect(fx + 4, cy - 10, 4, 4);
    ctx.fillRect(fx + 4, cy + 6,  4, 4);

    // Dark hair (back of head) — boss has hair, not a hood
    const hx = fx - 34, hy = cy;
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(hx + 4, hy - 2, 9, 0, Math.PI * 2); ctx.fill();

    // Face (skin) — boss face viewed from side
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(hx, hy, 8, 0, Math.PI * 2); ctx.fill();
    // Eyes closed
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(hx - 2, hy + 1, 2.5, Math.PI * 0.1, Math.PI * 0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(hx + 2, hy + 1, 2.5, Math.PI * 0.1, Math.PI * 0.9); ctx.stroke();
    ctx.lineWidth = 1;

    // ZZZ bubbles pulsing up from head
    const t = Date.now() / 1000;
    const zz = [{ch:'Z', ox:8, oy:-11}, {ch:'Zz', ox:13, oy:-21}, {ch:'ZZZ', ox:17, oy:-33}];
    ctx.textAlign = 'left';
    for(let i = 0; i < zz.length; i++) {
        const a = Math.max(0, Math.sin((t * 0.55 + i * 0.38) * Math.PI));
        ctx.fillStyle = `rgba(140,170,255,${(a * 0.75).toFixed(2)})`;
        ctx.font = 'bold 8px Arial';
        ctx.fillText(zz[i].ch, hx + zz[i].ox, hy + zz[i].oy);
    }
}

function drawOfficeRoom(officeName) {
    const office = level5.hallway.offices.find(o => o.name === officeName);
    const color = office.color;
    
    ctx.fillStyle = '#d4c8b0';
    ctx.fillRect(-GX, -GY, CANVAS_W, 300 + GY);
    
    // Color-coded carpet — prominent tint matching office manager color
    ctx.fillStyle = color.hex;
    ctx.globalAlpha = 0.55;
    ctx.fillRect(-GX, 300, CANVAS_W, CANVAS_H);
    ctx.globalAlpha = 1;

    for(let i = -4; i < 24; i++) {
        ctx.strokeStyle = color.hex;
        ctx.globalAlpha = 0.35;
        ctx.lineWidth = 1;
        ctx.strokeRect(i * 35, 300, 35, 200);
        ctx.globalAlpha = 1;
    }
    
    // Window view - realistic outdoor scene
    // Sky with gradient
    const skyGradient = ctx.createLinearGradient(180, 40, 180, 120);
    skyGradient.addColorStop(0, '#87CEEB');
    skyGradient.addColorStop(1, '#b0d8f0');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(180, 40, 340, 200);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(250, 70, 20, 0, Math.PI * 2);
    ctx.arc(270, 70, 25, 0, Math.PI * 2);
    ctx.arc(290, 70, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(420, 90, 18, 0, Math.PI * 2);
    ctx.arc(435, 90, 22, 0, Math.PI * 2);
    ctx.arc(450, 90, 18, 0, Math.PI * 2);
    ctx.fill();

    // Window frame - wooden
    ctx.strokeStyle = '#4a3a1a';
    ctx.lineWidth = 8;
    ctx.strokeRect(180, 40, 340, 200);

    // Window curtains/blinds
    ctx.fillStyle = color.hex;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(160, 35, 15, 210);
    ctx.fillRect(525, 35, 15, 210);
    ctx.globalAlpha = 1;

    // Curtain texture
    ctx.strokeStyle = color.hex;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 2;
    for(let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(163 + i * 3, 40);
        ctx.lineTo(163 + i * 3, 240);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(528 + i * 3, 40);
        ctx.lineTo(528 + i * 3, 240);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Personal outdoor scene unique to each PM's office
    const t = Date.now();
    const colorIndex = COLORS.indexOf(color);
    const wL = 190, wT = 45, wW = 320, wBot = 235;
    const gndY = wT + (wBot - wT) * 0.55;
    const gndH = wBot - gndY;

    ctx.save();
    ctx.beginPath();
    ctx.rect(185, 42, 330, 196);
    ctx.clip();

    if(colorIndex === 0) {
        // === RED: Apple tree with axe, roosting birds ===
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(wL, wT, wW, gndY - wT);
        ctx.fillStyle = '#4a8c3f';
        ctx.fillRect(wL, gndY, wW, gndH);
        ctx.fillStyle = '#3d7a34';
        ctx.fillRect(wL, gndY, wW, 4);
        // Tree trunk — original proportions
        const tx = 350, ty = gndY - 20;
        ctx.fillStyle = '#6b4226';
        ctx.fillRect(tx - 12, ty - 50, 24, 70);
        ctx.strokeStyle = '#5a3520'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(tx - 6, ty - 45); ctx.lineTo(tx - 5, ty + 15); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx + 5, ty - 40); ctx.lineTo(tx + 6, ty + 10); ctx.stroke();
        // Leafy canopy — full original size
        ctx.fillStyle = '#2d7a1e';
        ctx.beginPath(); ctx.arc(tx, ty - 70, 48, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#35881f';
        ctx.beginPath(); ctx.arc(tx - 26, ty - 55, 32, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx + 26, ty - 55, 32, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#228b22';
        ctx.beginPath(); ctx.arc(tx, ty - 90, 35, 0, Math.PI * 2); ctx.fill();
        // Apples
        ctx.fillStyle = '#e74c3c';
        const apples = [[-20,-82],[15,-92],[0,-68],[-28,-98],[28,-76],[6,-104],[-14,-72],[22,-88]];
        for(let ap of apples) { ctx.beginPath(); ctx.arc(tx+ap[0], ty+ap[1], 5, 0, Math.PI*2); ctx.fill(); }
        ctx.strokeStyle = '#4a3520'; ctx.lineWidth = 0.8;
        for(let ap of apples) { ctx.beginPath(); ctx.moveTo(tx+ap[0], ty+ap[1]-5); ctx.lineTo(tx+ap[0]+2, ty+ap[1]-9); ctx.stroke(); }
        // Fallen apples on the ground beneath tree
        const fallenApples5 = [[-35, 5], [-12, 9], [14, 4], [32, 7]];
        for(let fa of fallenApples5) {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath(); ctx.ellipse(tx + fa[0], gndY + fa[1] + 4, 6, 2, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#d63031';
            ctx.beginPath(); ctx.arc(tx + fa[0], gndY + fa[1], 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath(); ctx.arc(tx + fa[0] - 1, gndY + fa[1] - 1.5, 2, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#4a3520'; ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.moveTo(tx + fa[0], gndY + fa[1] - 5); ctx.lineTo(tx + fa[0] + 1.5, gndY + fa[1] - 8); ctx.stroke();
        }
        // One apple rolled closer toward the window
        const rolledX5 = tx + 90, rolledY5 = gndY + gndH * 0.55;
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.beginPath(); ctx.ellipse(rolledX5, rolledY5 + 5, 7, 2.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.arc(rolledX5, rolledY5, 5.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(rolledX5 - 1.5, rolledY5 - 1.5, 2.2, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#4a3520'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(rolledX5, rolledY5 - 5.5); ctx.lineTo(rolledX5 + 1.5, rolledY5 - 8.5); ctx.stroke();
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.ellipse(rolledX5 + 2, rolledY5 - 9, 3, 1.2, 0.5, 0, Math.PI * 2); ctx.fill();
        // Axe in trunk — hidden after CEO letter or RED email opened
        if(!level5.ceoLetterOpened && !level5.redEmailRead) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#8B6914';
        ctx.save(); ctx.translate(tx + 16, ty - 12); ctx.rotate(0.6);
        ctx.fillRect(0, -2, 35, 5); ctx.restore();
        ctx.fillStyle = '#cc2222';
        ctx.save(); ctx.translate(tx + 16, ty - 12); ctx.rotate(0.6);
        ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-8, 0); ctx.lineTo(0, 10); ctx.lineTo(5, 0); ctx.closePath(); ctx.fill();
        ctx.restore();
        }
        // Birds — fly out of tree and back in
        for(let b = 0; b < 4; b++) {
            const birdPeriod = 4000 + b * 1500;
            const birdCycle = ((t + b * 1700) % birdPeriod) / birdPeriod;
            let bx, by, isFlying;
            if(birdCycle < 0.15) {
                bx = tx + (b - 1.5) * 18;
                by = ty - 70 + b * 8;
                isFlying = false;
            } else if(birdCycle < 0.45) {
                const flyPct = (birdCycle - 0.15) / 0.3;
                bx = tx + (b - 1.5) * 18 + flyPct * (b < 2 ? -70 : 70);
                by = ty - 75 - flyPct * 30 + Math.sin(flyPct * Math.PI) * 18;
                isFlying = true;
            } else if(birdCycle < 0.55) {
                const soarPct = (birdCycle - 0.45) / 0.1;
                bx = tx + (b < 2 ? -70 : 70) + (b - 1.5) * 18 + soarPct * (b < 2 ? -10 : 10);
                by = ty - 105 + Math.sin(soarPct * Math.PI) * 6;
                isFlying = true;
            } else if(birdCycle < 0.85) {
                const retPct = (birdCycle - 0.55) / 0.3;
                const farX = tx + (b < 2 ? -80 : 80) + (b - 1.5) * 18;
                bx = farX + (tx + (b - 1.5) * 18 - farX) * retPct;
                by = ty - 105 + retPct * 35 + Math.sin(retPct * Math.PI) * 12;
                isFlying = true;
            } else {
                bx = tx + (b - 1.5) * 18;
                by = ty - 70 + b * 8;
                isFlying = false;
            }
            if(bx > wL + 10 && bx < wL + wW - 10 && by > wT + 5 && by < wBot - 10) {
                if(isFlying) {
                    const wf = Math.sin(t / 60 + b * 3) * 7;
                    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(bx-7,by+wf*0.5); ctx.lineTo(bx,by); ctx.lineTo(bx+7,by+wf*0.5); ctx.stroke();
                } else {
                    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.2;
                    ctx.beginPath(); ctx.moveTo(bx-3,by-1); ctx.lineTo(bx,by); ctx.lineTo(bx+3,by-1); ctx.stroke();
                }
                ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(bx, by+1, 2, 0, Math.PI*2); ctx.fill();
            }
        }
    } else if(colorIndex === 1) {
        // === GREEN: Grass lawn with riding lawnmower ===
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(wL, gndY, wW, gndH);
        for(let s = 0; s < 10; s++) {
            ctx.fillStyle = s % 2 === 0 ? '#45a049' : '#4CAF50';
            ctx.fillRect(wL, gndY + s * (gndH / 10), wW, gndH / 10);
        }
        // Decorative hedged bushes with depth and leaf detail
        const bushes5 = [
            {x: wL + 10, w: 30, h: 20},
            {x: wL + 55, w: 35, h: 22},
            {x: wL + 115, w: 28, h: 18},
            {x: wL + 165, w: 32, h: 20},
            {x: wL + 220, w: 30, h: 19},
            {x: wL + 272, w: 28, h: 17}
        ];
        for(let b of bushes5) {
            const bcx = b.x + b.w / 2, bcy = gndY;
            // Bush shadow
            ctx.fillStyle = '#1e5c20';
            ctx.beginPath(); ctx.ellipse(bcx, bcy + 4, b.w / 2 + 3, b.h * 0.25, 0, 0, Math.PI * 2); ctx.fill();
            // Main body
            ctx.fillStyle = '#2e7d32';
            ctx.beginPath(); ctx.ellipse(bcx, bcy - b.h * 0.3, b.w / 2, b.h * 0.5, 0, 0, Math.PI * 2); ctx.fill();
            // Side clusters
            ctx.fillStyle = '#338e38';
            ctx.beginPath(); ctx.arc(bcx - b.w * 0.25, bcy - b.h * 0.2, b.w * 0.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(bcx + b.w * 0.25, bcy - b.h * 0.25, b.w * 0.2, 0, Math.PI * 2); ctx.fill();
            // Top highlight
            ctx.fillStyle = '#43a047';
            ctx.beginPath(); ctx.ellipse(bcx - 2, bcy - b.h * 0.45, b.w * 0.25, b.h * 0.2, -0.3, 0, Math.PI * 2); ctx.fill();
            // Leaf texture dots

    } else if(colorIndex === 2) {
